<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار تصدير Excel العربي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background: #f8fafc; }
        button { padding: 15px 30px; font-size: 1.2rem; background: #0d9488; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0f766e; }
    </style>
</head>
<body>
    <h2>اختبار تحقق اللغة العربية في التصدير (XLSX)</h2>
    <p>البيانات المضمنة: محمد أحمد, خالد الرواجفة, عيادة الباطنية, حساسية من البنسلين</p>
    <button onclick="testExport()">تصدير الملف التجريبي</button>

    <script>
        function testExport() {
            const dataArray = [{
                "اسم العيادة": "عيادة الباطنية",
                "اسم المريض": "محمد أحمد",
                "الطبيب": "د. خالد الرواجفة",
                "الحالة": "مكتمل",
                "الموعد": "10:30 ص",
                "تاريخ التقرير": "2026-06-04",
                "إجمالي المرضى": 15,
                "إجمالي المواعيد": 20,
                "عدد الأطباء": 3,
                "طاقم العمل": 5,
                "ملاحظات": "حساسية من البنسلين"
            }];

            const wb = window.XLSX.utils.book_new();
            wb.Workbook = { Views: [{ RTL: true }] }; // Force RTL view
            const ws = window.XLSX.utils.json_to_sheet(dataArray);
            
            window.XLSX.utils.book_append_sheet(wb, ws, "نتائج الاختبار");
            window.XLSX.writeFile(wb, "اختبار_اللغة_العربية.xlsx");
        }
    </script>
</body>
</html>
