<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON OS | لوحة التحكم العليا</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; /* أزرق ملكي هادئ */
            --bg: #f8fafc;     /* خلفية فاتحة مريحة */
            --dark-text: #1e293b;
            --sidebar-bg: #ffffff;
            --accent: #059669;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--dark-text);
            margin: 0;
            overflow: hidden;
        }

        /* شاشة الدخول - بسيطة ومرتبة */
        #superLoginPage {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        /* الهيكل العام */
        #superWrapper {
            display: none;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #e2e8f0;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .nav-link {
            color: #64748b;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            font-weight: 600;
            text-decoration: none;
        }

        .nav-link i { margin-left: 12px; }

        .nav-link:hover, .nav-link.active {
            background: #eff6ff;
            color: var(--primary);
        }

        /* بطاقة المطعم - مرتبة */
        .restaurant-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .restaurant-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .form-control {
            border: 1.5px solid #e2e8f0 !important;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: none;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
        }

        .res-link-box {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            border: 1px solid #e2e8f0;
            color: var(--primary);
        }

        .section { display: none; }
        .section.active { display: block; }

        .powered-by {
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
            margin-top: auto;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div id="superLoginPage">
        <div class="login-box">
            <h3 class="fw-bold mb-4">ARGON <span style="color:var(--primary)">OS</span></h3>
            <input type="text" id="adminUser" class="form-control" placeholder="اسم المستخدم">
            <input type="password" id="adminPass" class="form-control" placeholder="كلمة المرور">
            <button class="btn btn-primary w-100" onclick="accessSuperAdmin()">دخول النظام</button>
            <div class="mt-4 small text-muted">Powered by Argon</div>
        </div>
    </div>

    <div id="superWrapper">
        <div class="sidebar">
            <div class="mb-5 px-3">
                <h4 class="fw-bold">ARGON <span class="text-primary">OS</span></h4>
                <small class="text-muted">نظام الإدارة المركزية</small>
            </div>
            
            <div class="nav-link active" onclick="showSection('active-sec', this)">
                <i class="fas fa-list"></i> قائمة المطاعم
            </div>
            <div class="nav-link" onclick="showSection('add-sec', this)">
                <i class="fas fa-plus"></i> إضافة مطعم جديد
            </div>

            <div class="nav-link text-danger mt-auto" onclick="location.reload()">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </div>
            
            <div class="powered-by">
                Powered by <b>Argon</b>
            </div>
        </div>

        <div class="main-content">
            <div id="active-sec" class="section active">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold">المطاعم النشطة</h4>
                    <span id="resCount" class="badge bg-primary rounded-pill">0</span>
                </div>
                <div id="activeList"></div>
            </div>

            <div id="add-sec" class="section">
                <h4 class="fw-bold mb-4">إنشاء شريك جديد</h4>
                <div class="row">
                    <div class="col-md-5">
                        <div class="restaurant-card">
                            <input type="text" id="newId" class="form-control" placeholder="المعرف (ID)">
                            <input type="text" id="newName" class="form-control" placeholder="اسم المطعم">
                            <input type="text" id="newPhone" class="form-control" placeholder="رقم الواتساب">
                            <input type="password" id="newPass" class="form-control" value="123456">
                            <button class="btn btn-primary w-100" onclick="createNewRestaurant()">حفظ وتفعيل</button>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div id="generatedLinks" class="restaurant-card" style="display: none;">
                            <h6 class="fw-bold mb-3 text-success"><i class="fas fa-check-circle"></i> تم الإنشاء بنجاح</h6>
                            <label class="small text-muted">لوحة التحكم:</label>
                            <div class="res-link-box mb-3" id="linkDash"></div>
                            <label class="small text-muted">رابط الزبائن:</label>
                            <div class="res-link-box" id="linkMenu"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCR598ICldRETDxUVXgSHCqgvy_fET8Afk",
            authDomain: "argon-system-pro.firebaseapp.com",
            databaseURL: "https://argon-system-pro-default-rtdb.firebaseio.com",
            projectId: "argon-system-pro",
            storageBucket: "argon-system-pro.firebasestorage.app",
            messagingSenderId: "1017089181583",
            appId: "1:1017089181583:web:78929d28042cd9662c2dfa",
            measurementId: "G-P5BBDVQ437"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function accessSuperAdmin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if (u === "admin" && p === "123456") {
                document.getElementById('superLoginPage').style.display = "none";
                document.getElementById('superWrapper').style.display = "flex";
                loadData();
            } else { alert("خطأ في البيانات"); }
        }

        function loadData() {
            db.ref('restaurants').on('value', (snap) => {
                const list = document.getElementById('activeList');
                list.innerHTML = "";
                let count = 0;
                const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', '');

                snap.forEach((child) => {
                    count++;
                    const id = child.key;
                    const val = child.val().settings || {};
                    list.innerHTML += `
                        <div class="restaurant-card d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="fw-bold mb-1">${val.name || 'مجهول'}</h6>
                                <small class="text-muted">ID: ${id} | ${val.phone || ''}</small>
                            </div>
                            <div>
                                <a href="${baseUrl}dashboard.html?id=${id}" target="_blank" class="btn btn-sm btn-light border"><i class="fas fa-eye"></i></a>
                                <button class="btn btn-sm btn-light border text-danger" onclick="deleteRes('${id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
                document.getElementById('resCount').innerText = count;
            });
        }

        function createNewRestaurant() {
            const id = document.getElementById('newId').value.trim();
            const name = document.getElementById('newName').value.trim();
            const phone = document.getElementById('newPhone').value.trim();
            const password = document.getElementById('newPass').value;

            if (!id || !name) return alert("عبي البيانات");

            db.ref('restaurants/' + id + '/settings').set({ name, phone, password, status: "active" })
            .then(() => {
                const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', '');
                document.getElementById('linkDash').innerText = `${baseUrl}dashboard.html?id=${id}`;
                document.getElementById('linkMenu').innerText = `${baseUrl}index.html?id=${id}`;
                document.getElementById('generatedLinks').style.display = 'block';
            });
        }

        function deleteRes(id) {
            if(confirm('حذف المطعم؟')) db.ref('restaurants/' + id).remove();
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
