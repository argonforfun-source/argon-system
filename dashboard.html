<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON — لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* التنسيقات الأساسية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --g1: #d4a843;
            --g2: #f5cc6a;
            --g3: #a07820;
            --bg: #06060f;
            --card: #0d0d1a;
            --card2: #131320;
            --border: #1c1c2e;
            --text: #ede8f5;
            --muted: #5a5470;
            --red: #e84050;
            --green: #28c070;
            --blue: #4888f0;
            --purple: #9060e8;
            --accent: var(--g1)
        }

        body {
            font-family: 'Cairo',sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh
        }

        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh
        }

        aside {
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px
        }

        .nav-btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 8px;
            cursor: pointer;
            border: none;
            background: none;
            transition: .3s
        }

            .nav-btn.active {
                background: linear-gradient(45deg,var(--g3),var(--g1));
                color: var(--bg)
            }

        main {
            padding: 30px;
            overflow-y: auto
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
            margin-bottom: 40px
        }

        .stat-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            position: relative
        }

        .stat-val {
            font-size: 28px;
            font-weight: 800;
            margin: 10px 0
        }

        .card-table {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right
        }

        th {
            padding: 18px 20px;
            background: var(--card2);
            color: var(--muted);
            font-size: 13px
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px
        }

        .status-pill {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700
        }

        .st-new {
            background: rgba(72,136,240,0.1);
            color: var(--blue)
        }

        .st-done {
            background: rgba(40,192,112,0.1);
            color: var(--green)
        }
    </style>
</head>
<body>

    <div class="app">
        <aside>
            <div style="font-size:24px;font-weight:900;color:var(--g1);margin-bottom:40px"><i class="fas fa-crown"></i> ARGON</div>
            <nav>
                <button class="nav-btn active"><i class="fas fa-shopping-bag"></i> الطلبات</button>
            </nav>
        </aside>

        <main>
            <header style="display:flex;justify-content:space-between;margin-bottom:30px">
                <div><h1>إدارة الطلبات</h1><p id="conn-status" style="color:var(--red)">جاري الاتصال...</p></div>
            </header>

            <div class="stats-grid">
                <div class="stat-card"><div>إجمالي الطلبات</div><div class="stat-val" id="stat-total">0</div></div>
                <div class="stat-card"><div>المبيعات</div><div class="stat-val" id="stat-sales">0.00</div></div>
            </div>

            <div class="card-table">
                <table>
                    <thead><tr><th>رقم الطلب</th><th>الوقت</th><th>التفاصيل</th><th>المبلغ</th><th>الحالة</th><th>إجراء</th></tr></thead>
                    <tbody id="orders-list"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // 1. استخدام الرابط الصحيح من الصورة الثانية
        const firebaseConfig = {
            databaseURL: "https://argonforfun-source-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. استخراج ID المطعم من الرابط (dashboard.html?id=1)
        const params = new URLSearchParams(window.location.search);
        const RID = params.get('id') || "1";

        // مراقبة حالة الاتصال
        db.ref(".info/connected").on("value", (snap) => {
            const status = document.getElementById('conn-status');
            if (snap.val() === true) {
                status.innerText = "● متصل"; status.style.color = "#28c070";
            } else {
                status.innerText = "○ فصل الاتصال - جاري المحاولة..."; status.style.color = "#e84050";
            }
        });

        // 3. دالة جلب الطلبات ومعالجة بيانات undefined
        function loadOrders() {
            db.ref(`restaurants/${RID}/orders`).on('value', snap => {
                const data = snap.val() || {};
                const list = document.getElementById('orders-list');
                let html = '';
                let totalSales = 0;
                let count = 0;

                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    count++;
                    totalSales += (parseFloat(o.total) || 0);

                    // معالجة العناصر داخل الطلب لمنع ظهور undefined
                    const itemsSummary = o.items ? Object.values(o.items).map(i => `${i.name || 'صنف'} x ${i.qty || 1}`).join(', ') : 'لا توجد تفاصيل';

                    html += `
                <tr>
                    <td>#${id.slice(-4)}</td>
                    <td>${o.createdAt ? new Date(o.createdAt).toLocaleTimeString('ar-JO') : '---'}</td>
                    <td style="max-width:250px;font-size:12px;color:var(--muted)">${itemsSummary}</td>
                    <td style="color:var(--g1);font-weight:bold">${(parseFloat(o.total) || 0).toFixed(2)} JOD</td>
                    <td><span class="status-pill ${o.status === 'done' ? 'st-done' : 'st-new'}">${o.status === 'done' ? 'مكتمل' : 'جديد'}</span></td>
                    <td>
                        ${o.status !== 'done' ? `<button onclick="doneOrder('${id}')" style="background:var(--g1);border:none;padding:5px 10px;border-radius:5px;cursor:pointer">إتمام</button>` : '✅'}
                    </td>
                </tr>`;
                });

                list.innerHTML = html || '<tr><td colspan="6" style="text-align:center">لا توجد طلبات حالياً</td></tr>';
                document.getElementById('stat-total').innerText = count;
                document.getElementById('stat-sales').innerText = totalSales.toFixed(2);
            });
        }

        function doneOrder(id) {
            db.ref(`restaurants/${RID}/orders/${id}`).update({ status: 'done' });
        }

        loadOrders();
    </script>
</body>
</html>
