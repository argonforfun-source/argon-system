<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON — لوحة التحكم الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* التنسيقات الفاخرة المعتمدة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --g1: #d4a843;
            --g2: #f5cc6a;
            --g3: #a07820;
            --bg: #06060f;
            --card: #0d0d1a;
            --card2: #131320;
            --border: #1c1c2e;
            --text: #ede8f5;
            --muted: #5a5470;
            --red: #e84050;
            --green: #28c070;
            --blue: #4888f0;
            --accent: var(--g1)
        }

        body {
            font-family: 'Cairo',sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        .hdr {
            background: rgba(10,10,20,.95);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 65px
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        .sb {
            width: 240px;
            background: var(--card);
            border-left: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            flex-direction: column
        }

        .nav {
            padding: 14px 20px;
            cursor: pointer;
            color: var(--muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: .3s
        }

            .nav.on {
                color: var(--g1);
                background: rgba(212,168,67,.08);
                border-right: 3px solid var(--g1)
            }

        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto
        }

        .srow {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
            margin-bottom: 30px
        }

        .sc {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            text-align: center
        }

        .sc-num {
            font-size: 35px;
            font-weight: 900
        }

        .ocard {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            animation: slideIn 0.3s ease-out
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .ocard::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--g1)
        }

        .oh {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .oitems {
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            color: var(--muted);
            line-height: 1.8
        }

        .btn-done {
            background: var(--g1);
            color: #000;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer
        }
    </style>
</head>
<body>

    <div id="app">
        <header class="hdr">
            <div style="display:flex;align-items:center;gap:15px">
                <div style="width:40px;height:40px;background:var(--g1);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:900">A</div>
                <h2 id="res-name">ARGON SYSTEM</h2>
            </div>
            <div id="conn-status" style="font-size:12px;font-weight:bold">جاري التحقق...</div>
        </header>

        <div class="main">
            <nav class="sb">
                <div class="nav on"><i class="fas fa-receipt"></i> الطلبات الواردة</div>
            </nav>

            <main class="content">
                <div class="srow">
                    <div class="sc"><div class="sc-num" id="stat-active" style="color:var(--g1)">0</div><div style="color:var(--muted)">طلبات نشطة</div></div>
                    <div class="sc"><div class="sc-num" id="stat-sales" style="color:var(--green)">0.00</div><div style="color:var(--muted)">إيراد اليوم (JOD)</div></div>
                    <div class="sc"><div class="sc-num" id="stat-total" style="color:var(--blue)">0</div><div style="color:var(--muted)">إجمالي الطلبات</div></div>
                </div>

                <div id="orders-list">
                </div>
            </main>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // الإعدادات المباشرة
        const firebaseConfig = { databaseURL: "https://argonforfun-source-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const RID = urlParams.get('id') || "1";

        // معالجة عرض الأرقام
        function fNum(n) { return (parseFloat(n) || 0).toFixed(2); }

        // التنصت على الطلبات
        db.ref(`restaurants/${RID}/orders`).on('value', snap => {
            const orders = snap.val() || {};
            const list = document.getElementById('orders-list');
            let html = '';
            let activeCount = 0;
            let totalSales = 0;
            let totalAll = 0;

            // تحويل الكائن إلى مصفوفة للترتيب
            const keys = Object.keys(orders).reverse();
            totalAll = keys.length;

            keys.forEach(id => {
                const o = orders[id];

                // حساب المبيعات للطلبات المكتملة فقط
                if (o.status === 'done') {
                    totalSales += (parseFloat(o.total) || 0);
                } else {
                    activeCount++;

                    // معالجة عرض الأصناف بدقة (سواء كانت مصفوفة أو كائن)
                    let itemsText = "لا توجد تفاصيل";
                    if (o.items) {
                        const itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
                        itemsText = itemsArr.map(i => `${i.name || i.n || 'صنف'} x ${i.qty || i.q || 1}`).join(' + ');
                    }

                    html += `
                <div class="ocard">
                    <div class="oh">
                        <span style="font-weight:bold;color:var(--g1)">طلب #${id.slice(-4)}</span>
                        <span style="font-size:12px;color:var(--muted)">${o.time || o.createdAt ? new Date(o.time || o.createdAt).toLocaleTimeString('ar-JO') : ''}</span>
                    </div>
                    <div class="oitems">${itemsText}</div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:15px">
                        <div style="font-weight:bold;color:var(--green)">${fNum(o.total)} JOD</div>
                        <button class="btn-done" onclick="markDone('${id}')">إتمام ✅</button>
                    </div>
                </div>`;
                }
            });

            list.innerHTML = html || '<div style="text-align:center;padding:50px;color:var(--muted)">بانتظار طلبات جديدة...</div>';
            document.getElementById('stat-active').innerText = activeCount;
            document.getElementById('stat-sales').innerText = fNum(totalSales);
            document.getElementById('stat-total').innerText = totalAll;
        });

        function markDone(id) {
            db.ref(`restaurants/${RID}/orders/${id}`).update({ status: 'done' });
        }

        // حالة الاتصال
        db.ref(".info/connected").on("value", snap => {
            const s = document.getElementById('conn-status');
            if (snap.val()) { s.innerText = "● متصل"; s.style.color = "var(--green)"; }
            else { s.innerText = "○ غير متصل"; s.style.color = "var(--red)"; }
        });
    </script>
</body>
</html>
