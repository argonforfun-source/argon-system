<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم أرغون الذكية | نظام السحاب</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --side: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: #e2e8f0; --muted: #64748b; }
        body.dark-mode { --side: #020617; --bg: #0b0f1a; --text: #ffffff; --card: #1e293b; --border: #334155; --muted: #cbd5e1; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: var(--side); color: white; display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        .argon-logo { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .argon-logo h4 { color: #60a5fa; font-weight: 800; margin: 0; }
        .menu-item { padding: 14px 25px; cursor: pointer; color: #94a3b8; border-right: 4px solid transparent; transition: 0.3s; display: flex; align-items: center; margin: 4px 10px; border-radius: 8px; }
        .menu-item.active, .menu-item:hover { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border-right-color: var(--accent); }
        .main-content { flex: 1; padding: 35px; overflow-y: auto; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: slideIn 0.4s ease-out; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px 25px; position: relative; overflow: hidden; }
        input, select { background: var(--card) !important; color: var(--text) !important; border: 1.5px solid var(--border) !important; border-radius: 12px !important; }
        #previewModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .phone-frame { width: 360px; height: 720px; background: #fff; border: 12px solid #334155; border-radius: 45px; overflow: hidden; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="dark-mode">

<div class="wrapper">
    <div class="sidebar">
        <div class="argon-logo"><h4>ARGON</h4><small id="resIdDisplay">ID: --</small></div>
        <div class="p-4 text-center">
            <h5 id="sideName" class="fw-bold mb-2 text-white">تحميل...</h5>
        </div>
        <div class="sidebar-menu flex-grow-1">
            <div class="menu-item active" onclick="showSec('dash', this)"><i class="fas fa-chart-pie"></i> الجرد العام</div>
            <div class="menu-item" onclick="showSec('menu', this)"><i class="fas fa-list-ul"></i> المنيو</div>
            <div class="menu-item" onclick="showSec('settings', this)"><i class="fas fa-sliders"></i> الإعدادات</div>
        </div>
        <div class="p-4 pt-0">
            <button class="btn btn-outline-info w-100 mb-3 btn-sm rounded-3 fw-bold" onclick="document.body.classList.toggle('dark-mode')">🌓 المظهر</button>
            <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-lg" onclick="openPreview()">👀 معاينة المباشر</button>
        </div>
        <div class="text-center p-2 opacity-50"><small>Powered by Argon © 2026</small></div>
    </div>

    <div class="main-content">
        <div id="dash" class="page-section active">
            <h3 class="fw-extrabold mb-4">📊 ملخص النشاط</h3>
            <div class="row g-4">
                <div class="col-md-4"><div class="stat-card"><h6>💰 المبيعات (تقديري)</h6><h2 id="statSales">0.00</h2></div></div>
                <div class="col-md-4"><div class="stat-card"><h6>🍴 أصناف المنيو</h6><h2 id="statItems" class="text-warning">0</h2></div></div>
            </div>
        </div>

        <div id="menu" class="page-section">
            <h3 class="fw-bold mb-4">🍴 قائمة الطعام</h3>
            <div class="card p-4 border-0 shadow-sm mb-4 rounded-4" style="background: var(--card)">
                <div class="row g-3">
                    <div class="col-md-4"><label>اسم الصنف</label><input type="text" id="itemName" class="form-control"></div>
                    <div class="col-md-2"><label>السعر</label><input type="number" id="itemPrice" class="form-control"></div>
                    <div class="col-md-4"><label>رابط الصورة</label><input type="text" id="itemImg" class="form-control"></div>
                    <div class="col-md-2 d-flex align-items-end"><button class="btn btn-primary w-100 fw-bold" onclick="addItem()">إضافة</button></div>
                </div>
            </div>
            <div id="menuGrid" class="row g-4"></div>
        </div>

        <div id="settings" class="page-section">
            <h3 class="fw-bold mb-4">⚙️ الإعدادات</h3>
            <div class="card p-4 col-md-8 border-0 shadow-sm rounded-4" style="background: var(--card)">
                <div class="mb-3"><label>اسم المطعم</label><input type="text" id="resNameInp" class="form-control"></div>
                <div class="mb-3"><label>رقم هاتف الواتساب (مثال: 962790000000)</label><input type="text" id="resPhoneInp" class="form-control"></div>
                <button class="btn btn-success w-100 py-3 fw-bold rounded-pill" onclick="saveSets()">حفظ الإعدادات</button>
            </div>
        </div>
    </div>
</div>

<div id="previewModal">
    <div class="text-center">
        <button class="btn btn-danger mb-2 fw-bold" onclick="closePreview()">إغلاق X</button>
        <div class="phone-frame"><iframe id="prevFrame" style="width:100%;height:100%;border:none;"></iframe></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8",
        authDomain: "argon-system.firebaseapp.com",
        projectId: "argon-system",
        storageBucket: "argon-system.firebasestorage.app",
        messagingSenderId: "858120444233",
        appId: "1:858120444233:web:4bda38dfa451b9eb26e298",
        databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const RES_ID = urlParams.get("id") || "1";
    document.getElementById('resIdDisplay').innerText = "ID: " + RES_ID;

    // جلب البيانات حياً من Firebase
    db.ref('restaurants/' + RES_ID).on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const sets = data.settings || { name: "تحميل...", phone: "" };
        const products = data.products || {};

        document.getElementById('sideName').innerText = sets.name;
        document.getElementById('resNameInp').value = sets.name;
        document.getElementById('resPhoneInp').value = sets.phone || "";
        
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = "";
        let count = 0;
        for (let key in products) {
            count++;
            const m = products[key];
            grid.innerHTML += `
                <div class="col-md-3">
                    <div class="card p-3 border-0 shadow-sm h-100" style="background:var(--card)">
                        <img src="${m.img}" style="height:120px; object-fit:cover; border-radius:10px;" class="mb-2">
                        <div class="fw-bold text-center">${m.name}</div>
                        <div class="text-primary fw-bold text-center mb-2">${m.price} د.أ</div>
                        <button class="btn btn-sm btn-outline-danger w-100" onclick="deleteItem('${key}')">حذف</button>
                    </div>
                </div>`;
        }
        document.getElementById('statItems').innerText = count;
    });

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;
        if(!name) return;
        db.ref('restaurants/' + RES_ID + '/products').push({ name, price, img });
        document.getElementById('itemName').value = ''; document.getElementById('itemPrice').value = ''; document.getElementById('itemImg').value = '';
    }

    function deleteItem(key) { if(confirm("حذف؟")) db.ref('restaurants/' + RES_ID + '/products/' + key).remove(); }

    function saveSets() {
        db.ref('restaurants/' + RES_ID + '/settings').update({
            name: document.getElementById('resNameInp').value,
            phone: document.getElementById('resPhoneInp').value
        }).then(() => alert("تم الحفظ"));
    }

    function showSec(id, btn) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        btn.classList.add('active');
    }

    function openPreview() {
        document.getElementById('prevFrame').src = `index.html?id=${RES_ID}`;
        document.getElementById('previewModal').style.display = 'flex';
    }
    function closePreview() { document.getElementById('previewModal').style.display = 'none'; }
</script>
</body>
</html>
