<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON — لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* التنسيق الأساسي */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --g1: #d4a843;
            --bg: #06060f;
            --card: #0d0d1a;
            --border: #1c1c2e;
            --text: #ede8f5;
            --muted: #5a5470
        }

        body {
            font-family: 'Cairo',sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh
        }

        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh
        }

        aside {
            background: var(--card);
            border-left: 1px solid var(--border);
            padding: 20px
        }

        main {
            padding: 30px;
            overflow-y: auto
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            text-align: center
        }

        .stat-val {
            font-size: 32px;
            font-weight: 900;
            color: var(--g1)
        }

        .ocard {
            background: #131326;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-right: 5px solid var(--g1);
            animation: fadeIn 0.5s
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-done {
            background: var(--g1);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer
        }
    </style>
</head>
<body>

    <div class="app">
        <aside>
            <h2 style="color:var(--g1);margin-bottom:30px"><i class="fas fa-crown"></i> ARGON</h2>
            <div id="conn-status" style="font-size:12px;color:red">جاري المحاولة...</div>
        </aside>

        <main>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px">
                <div class="stat-card"><div>طلبات نشطة</div><div class="stat-val" id="active-count">0</div></div>
                <div class="stat-card"><div>المبيعات</div><div class="stat-val" id="sales-total">0.00</div></div>
            </div>

            <h3 style="margin-bottom:20px">الطلبات الحالية</h3>
            <div id="orders-container">
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // الإعدادات - تأكد من مطابقة هذا الرابط لعنوان قاعدة بياناتك في لوحة Firebase
        const firebaseConfig = {
            databaseURL: "https://argonforfun-source-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // استلام رقم المطعم من الرابط (id=1)
        const urlParams = new URLSearchParams(window.location.search);
        const RES_ID = urlParams.get('id') || "1";

        // مراقبة الاتصال
        db.ref(".info/connected").on("value", (snap) => {
            const status = document.getElementById('conn-status');
            if (snap.val() === true) {
                status.innerText = "● متصل"; status.style.color = "#28c070";
            } else {
                status.innerText = "○ فصل الاتصال"; status.style.color = "red";
            }
        });

        // وظيفة عرض الطلبات
        function loadOrders() {
            db.ref(`restaurants/${RES_ID}/orders`).on('value', (snapshot) => {
                const orders = snapshot.val() || {};
                const container = document.getElementById('orders-container');
                let html = '';
                let active = 0;
                let sales = 0;

                Object.keys(orders).reverse().forEach(key => {
                    const o = orders[key];
                    if (o.status !== 'done') {
                        active++;
                        // معالجة أسماء العناصر والكميات (qty أو q)
                        let itemsList = "";
                        if (o.items) {
                            const items = Array.isArray(o.items) ? o.items : Object.values(o.items);
                            itemsList = items.map(i => `${i.name || i.n} (x${i.qty || i.q || 1})`).join(' + ');
                        }

                        html += `
                    <div class="ocard">
                        <div style="display:flex;justify-content:space-between">
                            <strong>طلب #${key.slice(-4)}</strong>
                            <small style="color:var(--muted)">${o.time || ''}</small>
                        </div>
                        <div style="margin:10px 0;color:#bbb">${itemsList}</div>
                        <div style="display:flex;justify-content:space-between;align-items:center">
                            <span style="color:var(--g1);font-weight:900">${(parseFloat(o.total) || 0).toFixed(2)} JOD</span>
                            <button class="btn-done" onclick="markAsDone('${key}')">إتمام الطلب</button>
                        </div>
                    </div>`;
                    } else {
                        sales += (parseFloat(o.total) || 0);
                    }
                });

                container.innerHTML = html || '<p style="text-align:center;color:var(--muted)">لا توجد طلبات جديدة</p>';
                document.getElementById('active-count').innerText = active;
                document.getElementById('sales-total').innerText = sales.toFixed(2);
            }, (error) => {
                console.error("خطأ في القراءة:", error);
            });
        }

        function markAsDone(key) {
            db.ref(`restaurants/${RES_ID}/orders/${key}`).update({ status: 'done' });
        }

        // البدء
        loadOrders();
    </script>
</body>
</html>
