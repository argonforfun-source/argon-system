<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم أرغون الذكية | الإصدار الاحترافي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --side: #0f172a; --accent: #3b82f6; --bg: #f8fafc; 
            --text: #0f172a; --card: #ffffff; --border: #e2e8f0;
            --muted: #64748b; --order-bg: #f1f5f9;
        }
        body.dark-mode { 
            --side: #020617; --bg: #0b0f1a; --text: #ffffff; 
            --card: #1e293b; --border: #334155; --muted: #cbd5e1;
            --order-bg: #0f172a;
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: var(--side); color: white; display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        .argon-logo { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .argon-logo h4 { color: #60a5fa; font-weight: 800; margin: 0; }
        .menu-item { padding: 14px 25px; cursor: pointer; color: #94a3b8; border-right: 4px solid transparent; transition: 0.3s; display: flex; align-items: center; margin: 4px 10px; border-radius: 8px; }
        .menu-item.active, .menu-item:hover { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border-right-color: var(--accent); }
        .menu-item i { width: 35px; }
        .main-content { flex: 1; padding: 35px; overflow-y: auto; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: slideIn 0.4s; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px 25px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .order-card { background: var(--card); border: 2px solid var(--border); border-radius: 20px; padding: 20px; transition: 0.3s; position: relative; }
        .order-id { position: absolute; top: -12px; left: 20px; background: var(--accent); color: white; padding: 2px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .item-row { background: var(--order-bg); padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; font-weight: 600; }
        .trash-btn { cursor: pointer; color: #f43f5e; transition: 0.2s; }
        .trash-btn:hover { transform: scale(1.2); }
        #previewModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .phone-frame { width: 360px; height: 720px; background: #fff; border: 12px solid #334155; border-radius: 45px; overflow: hidden; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="dark-mode">

<div class="wrapper">
    <div class="sidebar">
        <div class="argon-logo"><h4>ARGON PRO</h4><small id="resIdDisplay">ID: --</small></div>
        <div class="p-3 text-center">
            <h5 id="sideName" class="fw-bold mb-1">المطعم</h5>
            <div id="shopStatus" class="badge bg-success">متصل الآن</div>
        </div>
        <div class="flex-grow-1">
            <div class="menu-item active" onclick="showSec('dash', this)"><i class="fas fa-chart-pie"></i> الجرد العام</div>
            <div class="menu-item" onclick="showSec('liveOrders', this)"><i class="fas fa-receipt"></i> الطلبات الحية</div>
            <div class="menu-item" onclick="showSec('menu', this)"><i class="fas fa-utensils"></i> إدارة المنيو</div>
            <div class="menu-item" onclick="showSec('trash', this)" style="color:#fb7185"><i class="fas fa-trash-alt"></i> المحذوفات</div>
            <div class="menu-item" onclick="showSec('settings', this)"><i class="fas fa-cog"></i> الإعدادات</div>
        </div>
        <div class="p-4">
            <button class="btn btn-outline-info w-100 mb-2 btn-sm" onclick="document.body.classList.toggle('dark-mode')">🌓 المظهر</button>
            <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold" onclick="openPreview()">👀 معاينة المنيو</button>
        </div>
    </div>

    <div class="main-content">
        <div id="dash" class="page-section active">
            <h3 class="fw-bold mb-4">📊 ملخص الجرد</h3>
            <div class="row g-4">
                <div class="col-md-4"><div class="stat-card"><h6>💰 المبيعات</h6><h2 id="statSales">0.00</h2><small>د.أ</small></div></div>
                <div class="col-md-4"><div class="stat-card"><h6>✅ منجزة</h6><h2 id="statDone" class="text-success">0</h2><small>طلب</small></div></div>
                <div class="col-md-4"><div class="stat-card"><h6>🗑️ المحذوفات</h6><h2 id="statTrash" class="text-danger">0</h2><small>عنصر</small></div></div>
            </div>
        </div>

        <div id="liveOrders" class="page-section">
            <h3 class="fw-bold mb-4">🔔 الطلبات الواردة</h3>
            <div id="ordersGrid" class="row g-4"></div>
        </div>

        <div id="menu" class="page-section">
            <h3 class="fw-bold mb-4">🍴 إضافة أصناف</h3>
            <div class="card p-4 border-0 shadow-sm mb-4 rounded-4">
                <div class="row g-3">
                    <div class="col-md-3"><input type="text" id="itemName" class="form-control" placeholder="اسم الوجبة"></div>
                    <div class="col-md-2"><input type="number" id="itemPrice" class="form-control" placeholder="السعر"></div>
                    <div class="col-md-5"><input type="text" id="itemImg" class="form-control" placeholder="رابط الصورة"></div>
                    <div class="col-md-2"><button class="btn btn-primary w-100 fw-bold" onclick="addItem()">إضافة +</button></div>
                </div>
            </div>
            <div id="menuGrid" class="row g-4"></div>
        </div>

        <div id="trash" class="page-section">
            <h3 class="fw-bold mb-4 text-danger">🗑️ سلة المهملات</h3>
            <div class="card p-4 border-0 shadow-sm rounded-4">
                <div id="trashList"></div>
            </div>
        </div>

        <div id="settings" class="page-section">
            <h3 class="fw-bold mb-4">⚙️ الإعدادات</h3>
            <div class="card p-4 col-md-6 border-0 shadow-sm rounded-4">
                <label class="mb-2">اسم المطعم</label><input type="text" id="resNameInp" class="form-control mb-3">
                <label class="mb-2">رقم هاتف المطعم (للطلبات)</label><input type="text" id="resPhoneInp" class="form-control mb-4" placeholder="07XXXXXXXX">
                <button class="btn btn-success w-100 py-3 fw-bold rounded-pill" onclick="saveSets()">حفظ الإعدادات</button>
            </div>
        </div>
    </div>
</div>

<div id="previewModal">
    <div class="text-center">
        <button class="btn btn-danger mb-2 fw-bold" onclick="closePreview()">إغلاق X</button>
        <div class="phone-frame"><iframe id="prevFrame" style="width:100%;height:100%;border:none;"></iframe></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const resId = urlParams.get("id") || "1";
    
    const DB = {
        sets: 'res_sets_' + resId,
        menu: 'res_menu_' + resId,
        orders: 'res_orders_' + resId,
        trash: 'res_trash_' + resId
    };

    function init() {
        const sets = JSON.parse(localStorage.getItem(DB.sets)) || {name: "مطعم جديد", phone: "07XXXXXXXX"};
        const menu = JSON.parse(localStorage.getItem(DB.menu)) || [];
        const orders = JSON.parse(localStorage.getItem(DB.orders)) || [];
        const trash = JSON.parse(localStorage.getItem(DB.trash)) || [];

        document.getElementById('sideName').innerText = sets.name;
        document.getElementById('resIdDisplay').innerText = "ID: " + resId;
        document.getElementById('resNameInp').value = sets.name;
        document.getElementById('resPhoneInp').value = sets.phone;

        renderMenu(menu);
        renderOrders(orders);
        renderTrash(trash);
        updateStats(orders, menu, trash);
    }

    function renderMenu(menu) {
        document.getElementById('menuGrid').innerHTML = menu.map((m, i) => `
            <div class="col-md-3">
                <div class="card p-3 border-0 shadow-sm h-100 text-center">
                    <img src="${m.img}" style="height:120px; object-fit:cover; border-radius:15px" class="mb-2">
                    <h6 class="fw-bold">${m.name}</h6>
                    <div class="text-primary fw-bold mb-2">${m.price} د.أ</div>
                    <i class="fas fa-trash trash-btn" onclick="moveToTrash('menu', ${i})"></i>
                </div>
            </div>`).join('');
    }

    function renderOrders(orders) {
        document.getElementById('ordersGrid').innerHTML = orders.slice().reverse().map((o, i) => {
            const realIndex = orders.length - 1 - i;
            // عداد الأصناف المكررة
            let itemsSummary = "";
            let counts = {};
            o.itemsList.forEach(item => counts[item] = (counts[item] || 0) + 1);
            for(let name in counts) { itemsSummary += `<div class="item-row"><span>${name}</span> <span>×${counts[name]}</span></div>`; }

            return `
            <div class="col-md-6">
                <div class="order-card" style="opacity:${o.status==='منجز'?'0.6':'1'}">
                    <div class="order-id">طلب #${o.orderNum}</div>
                    <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
                        <div>
                            <h5 class="fw-bold mb-0">${o.customer}</h5>
                            <small class="text-primary fw-bold"><i class="fas fa-phone-alt me-1"></i> ${o.phone}</small>
                        </div>
                        <div class="text-success fw-bold h5">${o.total} د.أ</div>
                    </div>
                    <div class="mb-3">${itemsSummary}</div>
                    <div class="d-flex gap-2">
                        ${o.status!=='منجز' ? `<button class="btn btn-success btn-sm w-100 fw-bold" onclick="completeOrder(${realIndex})">إكمال الطلب</button>` : '<span class="badge bg-light text-dark w-100 py-2">✅ تم التسليم</span>'}
                        <button class="btn btn-outline-danger btn-sm" onclick="moveToTrash('order', ${realIndex})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderTrash(trash) {
        document.getElementById('trashList').innerHTML = trash.length === 0 ? '<p class="text-center text-muted">السلة فارغة</p>' : 
        trash.map((t, i) => `
            <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                <span><b>${t.type === 'menu' ? 'صنف:' : 'طلب:'}</b> ${t.data.name || t.data.customer}</span>
                <button class="btn btn-sm btn-link text-success text-decoration-none fw-bold" onclick="restore(${i})">استعادة</button>
            </div>`).join('');
    }

    function addItem() {
        let m = JSON.parse(localStorage.getItem(DB.menu)) || [];
        m.push({ name: document.getElementById('itemName').value, price: document.getElementById('itemPrice').value, img: document.getElementById('itemImg').value });
        localStorage.setItem(DB.menu, JSON.stringify(m));
        init();
        document.getElementById('itemName').value = ''; document.getElementById('itemPrice').value = '';
    }

    function moveToTrash(type, i) {
        let trash = JSON.parse(localStorage.getItem(DB.trash)) || [];
        let sourceKey = type === 'menu' ? DB.menu : DB.orders;
        let sourceData = JSON.parse(localStorage.getItem(sourceKey));
        
        trash.push({ type: type, data: sourceData[i] });
        sourceData.splice(i, 1);
        
        localStorage.setItem(sourceKey, JSON.stringify(sourceData));
        localStorage.setItem(DB.trash, JSON.stringify(trash));
        init();
    }

    function restore(i) {
        let trash = JSON.parse(localStorage.getItem(DB.trash));
        let item = trash[i];
        let targetKey = item.type === 'menu' ? DB.menu : DB.orders;
        let targetData = JSON.parse(localStorage.getItem(targetKey)) || [];
        
        targetData.push(item.data);
        trash.splice(i, 1);
        
        localStorage.setItem(targetKey, JSON.stringify(targetData));
        localStorage.setItem(DB.trash, JSON.stringify(trash));
        init();
    }

    function completeOrder(i) {
        let o = JSON.parse(localStorage.getItem(DB.orders));
        o[i].status = 'منجز';
        localStorage.setItem(DB.orders, JSON.stringify(o));
        init();
    }

    function saveSets() {
        localStorage.setItem(DB.sets, JSON.stringify({
            name: document.getElementById('resNameInp').value,
            phone: document.getElementById('resPhoneInp').value
        }));
        alert("تم الحفظ!");
        init();
    }

    function updateStats(orders, menu, trash) {
        const total = orders.reduce((s, o) => s + parseFloat(o.total), 0);
        document.getElementById('statSales').innerText = total.toFixed(2);
        document.getElementById('statDone').innerText = orders.filter(o => o.status === 'منجز').length;
        document.getElementById('statTrash').innerText = trash.length;
    }

    function showSec(id, btn) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        btn.classList.add('active');
    }

    function openPreview() {
        document.getElementById('prevFrame').src = `index.html?id=${resId}`;
        document.getElementById('previewModal').style.display = 'flex';
    }
    
    function closePreview() { document.getElementById('previewModal').style.display = 'none'; }

    window.onload = init;
</script>
</body>
</html>
