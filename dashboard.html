<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON — لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --g1: #d4a843;
            --g2: #f5cc6a;
            --g3: #a07820;
            --bg: #06060f;
            --card: #0d0d1a;
            --card2: #131320;
            --border: #1c1c2e;
            --text: #ede8f5;
            --muted: #5a5470;
            --red: #e84050;
            --green: #28c070;
            --blue: #4888f0;
            --shadow: 0 8px 32px rgba(0,0,0,.5);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            padding: 20px
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border)
        }

        .res-name {
            font-size: 24px;
            font-weight: 900;
            color: var(--g1)
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px
        }

        .order-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: 0.3s
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px
        }

        .order-id {
            font-weight: 700;
            color: var(--g1)
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold
        }

        .pending {
            background: rgba(240, 128, 40, 0.1);
            color: #f08028
        }

        .done {
            background: rgba(40, 192, 112, 0.1);
            color: var(--green)
        }

        .customer-info {
            margin-bottom: 15px;
            font-size: 13px;
            color: var(--muted)
        }

        .items-list {
            margin: 15px 0;
            font-size: 14px
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px
        }

        .total-row {
            border-top: 1px solid var(--border);
            padding-top: 10px;
            margin-top: 10px;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            color: var(--g1)
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s
        }

        .btn-done {
            background: var(--green);
            color: #000
        }

        .btn-del {
            background: rgba(232, 64, 80, 0.1);
            color: var(--red)
        }

        #tw {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999
        }
    </style>
</head>
<body>
    <div id="tw"></div>
    <div class="header">
        <div class="res-name" id="resName">جاري التحميل...</div>
        <div id="status-indicator" style="font-size: 12px; color: var(--green)"><i class="fas fa-circle"></i> متصل مباشر</div>
    </div>
    <div class="orders-grid" id="ordersList"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const resId = urlParams.get('id');
        if (!resId) { alert("رقم المطعم غير صحيح"); }

        const firebaseConfig = { databaseURL: "https://argonforfun-source-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // جلب اسم المطعم
        db.ref(`restaurants/${resId}/settings`).on('value', (s) => {
            if (s.val()) document.getElementById('resName').textContent = s.val().name;
        });

        // الإصلاح الجوهري: استقبال جميع الطلبات وعرضها بدون تداخل
        let lastCount = 0;
        db.ref(`restaurants/${resId}/orders`).on('value', (snap) => {
            const list = document.getElementById('ordersList');
            list.innerHTML = '';
            const data = snap.val();

            if (!data) {
                list.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--muted)">لا توجد طلبات حالياً</div>';
                return;
            }

            // تحويل البيانات لمصفوفة لترتيبها
            const orders = Object.entries(data).map(([key, val]) => ({ key, ...val }));

            // تشغيل التنبيه عند وصول طلب جديد
            if (orders.length > lastCount) {
                if (lastCount !== 0) playSound();
                lastCount = orders.length;
            }

            orders.reverse().forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                        <div class="order-header">
                            <span class="order-id">#\${order.key.slice(-4)}</span>
                            <span class="status-badge \${order.status || 'pending'}">\${order.status === 'done' ? 'مكتمل' : 'قيد التنفيذ'}</span>
                        </div>
                        <div class="customer-info">
                            <div><i class="fas fa-user"></i> \${order.customer?.name || 'زبون'}</div>
                            <div><i class="fas fa-table"></i> طاولة: \${order.customer?.table || '---'}</div>
                        </div>
                        <div class="items-list">
                            \${order.items.map(i => `< div class="item-row" ><span>\${i.name} x \${i.qty}</span><span>\${(i.price * i.qty).toFixed(2)}</span></div > `).join('')}
                        </div>
                        <div class="total-row"><span>الإجمالي</span><span>\${order.total.toFixed(2)} JOD</span></div>
                        <button class="btn-action btn-done" onclick="updateStatus('\${order.key}', 'done')">إتمام الطلب</button>
                        <button class="btn-action btn-del" onclick="deleteOrder('\${order.key}')">حذف</button>
                    `;
                list.appendChild(card);
            });
        });

        function updateStatus(key, s) { db.ref(`restaurants/${resId}/orders/\${key}`).update({ status: s }); }
        function deleteOrder(key) { if (confirm('هل تريد حذف الطلب؟')) db.ref(`restaurants/${resId}/orders/\${key}`).remove(); }

        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.type = 'sine'; o.frequency.value = 880;
                g.gain.setValueAtTime(0, ctx.currentTime);
                g.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.1);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                o.start(); o.stop(ctx.currentTime + 1);
            } catch (e) { console.log("Sound error"); }
        }
    </script>
</body>
</html>
