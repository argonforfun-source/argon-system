<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON — لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --g1: #d4a843;
            --g2: #f5cc6a;
            --g3: #a07820;
            --bg: #06060f;
            --card: #0d0d1a;
            --card2: #131320;
            --border: #1c1c2e;
            --text: #ede8f5;
            --muted: #5a5470;
            --red: #e84050;
            --green: #28c070;
            --blue: #4888f0;
            --purple: #9060e8;
            --accent: var(--g1)
        }

        body {
            font-family: 'Cairo',sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh
        }

            body::after {
                content: '';
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse 80% 50% at 50% -20%,rgba(212,168,67,0.1),transparent);
                z-index: -1;
                pointer-events: none
            }

        button, input, select, textarea {
            font-family: inherit;
            color: inherit;
            outline: none
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            transition: .3s
        }

        ul {
            list-style: none
        }

        a {
            text-decoration: none;
            color: inherit
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px
        }

        /* Layout */
        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh
        }

        aside {
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--g1);
            letter-spacing: 2px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .nav-btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 8px
        }

            .nav-btn.active {
                background: linear-gradient(45deg,var(--g3),var(--g1));
                color: var(--bg);
                box-shadow: 0 8px 20px rgba(212,168,67,0.2)
            }

            .nav-btn i {
                font-size: 18px
            }

            .nav-btn:hover:not(.active) {
                color: var(--text);
                background: var(--border)
            }

        main {
            padding: 30px;
            overflow-y: auto;
            position: relative
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px
        }

        .page-title h1 {
            font-size: 24px;
            font-weight: 700
        }

        .page-title p {
            color: var(--muted);
            font-size: 14px
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
            margin-bottom: 40px
        }

        .stat-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden
        }

            .stat-card::before {
                content: '';
                position: absolute;
                top: 0;
                right: 0;
                width: 4px;
                height: 100%;
                background: var(--accent)
            }

        .stat-val {
            font-size: 28px;
            font-weight: 800;
            margin: 10px 0
        }

        .stat-label {
            color: var(--muted);
            font-size: 14px;
            font-weight: 600
        }

        /* Sections */
        .section {
            display: none;
            animation: fadeIn .4s ease
        }

            .section.active {
                display: block
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* Tables */
        .card-table {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right
        }

        th {
            padding: 18px 20px;
            background: var(--card2);
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px
        }

        tr:last-child td {
            border: 0
        }

        .status-pill {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700
        }

        .st-new {
            background: rgba(72,136,240,0.1);
            color: var(--blue)
        }

        .st-done {
            background: rgba(40,192,112,0.1);
            color: var(--green)
        }

        .st-cancel {
            background: rgba(232,64,80,0.1);
            color: var(--red)
        }

        /* Menu Controls */
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px
        }

        .btn-gold {
            background: linear-gradient(45deg,var(--g3),var(--g1));
            color: var(--bg);
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

            .modal.open {
                display: flex
            }

        .modal-content {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 30px;
            position: relative
        }
    </style>
</head>
<body>

    <div class="app">
        <aside>
            <div class="logo"><i class="fas fa-crown"></i> <span>ARGON</span></div>
            <nav>
                <button class="nav-btn active" onclick="showSec('orders',this)"><i class="fas fa-shopping-bag"></i> <span>الطلبات</span></button>
                <button class="nav-btn" onclick="showSec('menu',this)"><i class="fas fa-utensils"></i> <span>المنيو</span></button>
                <button class="nav-btn" onclick="showSec('settings',this)"><i class="fas fa-cog"></i> <span>الإعدادات</span></button>
            </nav>
            <div style="margin-top:auto"><button class="nav-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>تسجيل الخروج</span></button></div>
        </aside>

        <main>
            <header>
                <div class="page-title"><h1 id="sec-title">إدارة الطلبات</h1><p>مرحباً بك في نظام أرجون</p></div>
                <div id="live-indicator" style="display:flex;align-items:center;gap:8px;color:var(--green);font-weight:700;font-size:14px">
                    <span style="width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 1.5s infinite"></span> اتصال مباشر
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">إجمالي الطلبات</div><div class="stat-val" id="stat-total-orders">0</div></div>
                <div class="stat-card" style="--accent:var(--green)"><div class="stat-label">طلبات ناجحة</div><div class="stat-val" id="stat-success-orders">0</div></div>
                <div class="stat-card" style="--accent:var(--blue)"><div class="stat-label">إجمالي المبيعات</div><div class="stat-val" id="stat-sales">0.00</div></div>
                <div class="stat-card" style="--accent:var(--purple)"><div class="stat-label">أصناف المنيو</div><div class="stat-val" id="stat-menu-items">0</div></div>
            </div>

            <div id="sec-orders" class="section active">
                <div class="card-table">
                    <table>
                        <thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>الطاولة</th><th>المبلغ</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                        <tbody id="orders-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="sec-menu" class="section">
                <div class="menu-header">
                    <select id="menu-cat-filter" class="form-control" style="width:150px;background:var(--card2);border:1px solid var(--border);border-radius:8px" onchange="loadMenu()"><option value="all">الكل</option></select>
                    <button class="btn-gold" onclick="openMenuModal()"><i class="fas fa-plus"></i> إضافة صنف</button>
                </div>
                <div class="card-table">
                    <table>
                        <thead><tr><th>الصورة</th><th>الاسم</th><th>التصنيف</th><th>السعر</th><th>إجراءات</th></tr></thead>
                        <tbody id="menu-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="sec-settings" class="section">
                <div class="stat-card" style="max-width:600px;margin:0 auto;--accent:var(--g1)">
                    <h3 style="margin-bottom:20px">إعدادات المطعم</h3>
                    <div style="display:grid;gap:15px">
                        <div><label>اسم المطعم</label><input type="text" id="s-name" class="form-control" style="width:100%;background:var(--card2);border:1px solid var(--border);padding:10px;border-radius:8px"></div>
                        <div><label>رقم الواتساب</label><input type="text" id="s-phone" class="form-control" style="width:100%;background:var(--card2);border:1px solid var(--border);padding:10px;border-radius:8px"></div>
                        <div><label>العملة</label><input type="text" id="s-cur" class="form-control" style="width:100%;background:var(--card2);border:1px solid var(--border);padding:10px;border-radius:8px"></div>
                        <button class="btn-gold" style="width:100%;justify-content:center" onclick="saveSettings()">حفظ</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="order-modal" class="modal"><div class="modal-content" style="max-width:600px"><div id="order-detail-content"></div><div style="display:flex;gap:10px;margin-top:20px"><button class="nav-btn" onclick="cm('order-modal')" style="background:var(--border);flex:1;justify-content:center">إغلاق</button><div id="order-actions" style="display:flex;gap:10px;flex:2"></div></div></div></div>

    <div id="menu-modal" class="modal">
        <div class="modal-content">
            <h2 id="m-title" style="margin-bottom:20px">إضافة صنف</h2><input type="hidden" id="m-id"><div style="display:grid;gap:15px">
                <input type="text" id="m-name" placeholder="الاسم" class="form-control" style="width:100%;background:var(--card2);border:1px solid var(--border);padding:10px;border-radius:8px">
                <input type="text" id="m-cat" placeholder="التصنيف" class="form-control" style="width:100%;background:var(--card2);border:1px solid var(--border);padding:10px;border-radius:8px">
                <input type="number" id="m-price" placeholder="السعر" class="form-control" style="width:100%;background:var(--card2);border:1px solid var(--border);padding:10px;border-radius:8px">
                <input type="text" id="m-img" placeholder="رابط الصورة" class="form-control" style="width:100%;background:var(--card2);border:1px solid var(--border);padding:10px;border-radius:8px">
                <div style="display:flex;gap:10px"><button onclick="cm('menu-modal')" style="flex:1">إلغاء</button><button class="btn-gold" onclick="saveMenuItem()" style="flex:2;justify-content:center">حفظ</button></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const RID = params.get('id');
        const firebaseConfig = { databaseURL: "https://argonforfun-source-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let RSettings = { currency: 'JOD' };
        let AllOrders = [];

        // دالة آمنة لتحويل الأرقام
        function fixNum(num) {
            let n = parseFloat(num);
            return isNaN(n) ? "0.00" : n.toFixed(2);
        }

        function showSec(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        db.ref(`restaurants/${RID}/settings`).on('value', s => {
            RSettings = s.val() || { currency: 'JOD' };
            document.getElementById('s-name').value = RSettings.name || '';
            document.getElementById('s-phone').value = RSettings.phone || '';
            document.getElementById('s-cur').value = RSettings.currency || 'JOD';
        });

        function loadOrders() {
            db.ref(`restaurants/${RID}/orders`).on('value', s => {
                try {
                    const data = s.val() || {};
                    AllOrders = Object.keys(data).map(k => ({ id: k, ...data[k] })).reverse();
                    renderOrders();
                    updateStats();
                } catch (e) { console.error("Error loading orders:", e); }
            });
        }

        function renderOrders() {
            const list = document.getElementById('orders-list');
            if (!list) return;
            list.innerHTML = AllOrders.map(o => {
                const statusClass = o.status === 'done' ? 'st-done' : (o.status === 'cancel' ? 'st-cancel' : 'st-new');
                const statusText = o.status === 'done' ? 'مكتمل' : (o.status === 'cancel' ? 'ملغي' : 'جديد');
                return `
          <tr>
            <td style="font-weight:700">#${o.id.slice(-5)}</td>
            <td style="font-size:12px;color:var(--muted)">${o.time ? new Date(o.time).toLocaleString('ar-EG') : '-'}</td>
            <td><span style="background:var(--border);padding:4px 10px;border-radius:6px">${o.table || 'سفري'}</span></td>
            <td style="color:var(--g1);font-weight:700">${fixNum(o.total)} ${RSettings.currency}</td>
            <td><span class="status-pill ${statusClass}">${statusText}</span></td>
            <td><button onclick="viewOrder('${o.id}')" style="color:var(--g1)"><i class="fas fa-eye"></i></button></td>
          </tr>`;
            }).join('');
        }

        function viewOrder(id) {
            const o = AllOrders.find(x => x.id === id);
            if (!o) return;
            const itemsHtml = (o.items || []).map(i => `
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
          <div><b>${i.n}</b> <span style="color:var(--muted)">× ${i.q}</span></div>
          <div>${fixNum(i.p * i.q)}</div>
        </div>`).join('');

            document.getElementById('order-detail-content').innerHTML = `
        <h2 style="text-align:center;color:var(--g1);margin-bottom:15px">طلب #${id.slice(-5)}</h2>
        <div style="margin-bottom:20px">${itemsHtml}</div>
        <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;border-top:1px solid var(--g1);padding-top:10px">
          <span>الإجمالي:</span><span style="color:var(--g1)">${fixNum(o.total)} ${RSettings.currency}</span>
        </div>`;

            document.getElementById('order-actions').innerHTML = o.status === 'new' ? `
        <button class="nav-btn" style="background:var(--red);color:#fff;flex:1;justify-content:center" onclick="updateStatus('${id}','cancel')">إلغاء</button>
        <button class="nav-btn" style="background:var(--green);color:#fff;flex:1;justify-content:center" onclick="updateStatus('${id}','done')">إتمام</button>` : '';

            document.getElementById('order-modal').classList.add('open');
        }

        function updateStatus(id, st) {
            db.ref(`restaurants/${RID}/orders/${id}/status`).set(st).then(() => cm('order-modal'));
        }

        function loadMenu() {
            db.ref(`restaurants/${RID}/menu`).on('value', s => {
                const data = s.val() || {};
                const items = Object.keys(data).map(k => ({ id: k, ...data[k] }));
                const filter = document.getElementById('menu-cat-filter').value;
                const cats = [...new Set(items.map(i => i.category))];

                let options = '<option value="all">الكل</option>';
                cats.forEach(c => options += `<option value="${c}" ${c === filter ? 'selected' : ''}>${c}</option>`);
                document.getElementById('menu-cat-filter').innerHTML = options;

                const filtered = filter === 'all' ? items : items.filter(i => i.category === filter);
                document.getElementById('menu-list').innerHTML = filtered.map(i => `
          <tr>
            <td><img src="${i.image}" style="width:40px;height:40px;border-radius:8px;object-fit:cover"></td>
            <td><b>${i.name}</b></td>
            <td>${i.category}</td>
            <td style="color:var(--g1);font-weight:700">${fixNum(i.price)}</td>
            <td>
              <button onclick="openMenuModal('${i.id}')" style="margin-left:10px"><i class="fas fa-edit"></i></button>
              <button onclick="delMenu('${i.id}')" style="color:var(--red)"><i class="fas fa-trash"></i></button>
            </td>
          </tr>`).join('');
                document.getElementById('stat-menu-items').innerText = items.length;
            });
        }

        function openMenuModal(id = null) {
            if (id) {
                db.ref(`restaurants/${RID}/menu/${id}`).once('value', s => {
                    const i = s.val();
                    document.getElementById('m-id').value = id;
                    document.getElementById('m-name').value = i.name;
                    document.getElementById('m-cat').value = i.category;
                    document.getElementById('m-price').value = i.price;
                    document.getElementById('m-img').value = i.image;
                    document.getElementById('menu-modal').classList.add('open');
                });
            } else {
                document.getElementById('m-id').value = '';
                document.getElementById('m-name').value = '';
                document.getElementById('m-price').value = '';
                document.getElementById('menu-modal').classList.add('open');
            }
        }

        function saveMenuItem() {
            const id = document.getElementById('m-id').value || db.ref(`restaurants/${RID}/menu`).push().key;
            db.ref(`restaurants/${RID}/menu/${id}`).set({
                name: document.getElementById('m-name').value,
                category: document.getElementById('m-cat').value,
                price: parseFloat(document.getElementById('m-price').value) || 0,
                image: document.getElementById('m-img').value
            }).then(() => cm('menu-modal'));
        }

        function delMenu(id) { if (confirm('حذف الصنف؟')) db.ref(`restaurants/${RID}/menu/${id}`).remove(); }

        function saveSettings() {
            db.ref(`restaurants/${RID}/settings`).update({
                name: document.getElementById('s-name').value,
                phone: document.getElementById('s-phone').value,
                currency: document.getElementById('s-cur').value
            }).then(() => alert('تم الحفظ'));
        }

        function updateStats() {
            const success = AllOrders.filter(o => o.status === 'done');
            const sales = success.reduce((a, b) => a + (parseFloat(b.total) || 0), 0);
            document.getElementById('stat-total-orders').innerText = AllOrders.length;
            document.getElementById('stat-success-orders').innerText = success.length;
            document.getElementById('stat-sales').innerText = fixNum(sales);
        }

        function cm(id) { document.getElementById(id).classList.remove('open'); }
        function logout() { window.location.href = 'index.html'; }

        loadOrders();
        loadMenu();
    </script>
</body>
</html>
