<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم أرغون الذكية | نظام الاحتراف</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --side: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: #e2e8f0; }
        body.dark-mode { --side: #020617; --bg: #0b0f1a; --text: #ffffff; --card: #1e293b; --border: #334155; }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: var(--side); color: white; display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        .menu-item { padding: 14px 25px; cursor: pointer; color: #94a3b8; border-right: 4px solid transparent; transition: 0.3s; display: flex; align-items: center; margin: 4px 10px; border-radius: 8px; }
        .menu-item.active, .menu-item:hover { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border-right-color: var(--accent); }
        .main-content { flex: 1; padding: 35px; overflow-y: auto; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s; }

        /* تصحيح الحقول والنصوص في الداكن */
        input, select, textarea { 
            background: var(--card) !important; 
            color: var(--text) !important; 
            border: 1px solid var(--border) !important; 
        }
        input::placeholder { color: #94a3b8 !important; opacity: 0.8; }
        .card { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 15px; }
        
        .order-card { border-left: 5px solid var(--accent); margin-bottom: 15px; padding: 15px; background: var(--card); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="dark-mode">

<div class="wrapper">
    <div class="sidebar">
        <div class="p-4 text-center border-bottom border-secondary">
            <h4 class="fw-bold text-primary">ARGON PRO</h4>
            <small id="resIdDisplay" class="text-muted">ID: --</small>
        </div>
        <div class="sidebar-menu flex-grow-1 mt-3">
            <div class="menu-item active" onclick="showSec('dash', this)"><i class="fas fa-chart-pie me-2"></i> الجرد العام</div>
            <div class="menu-item" onclick="showSec('liveOrders', this)"><i class="fas fa-bolt me-2"></i> الطلبات الحية <span id="orderBadge" class="badge bg-danger ms-auto">0</span></div>
            <div class="menu-item" onclick="showSec('menu', this)"><i class="fas fa-utensils me-2"></i> إدارة المنيو</div>
            <div class="menu-item" onclick="showSec('settings', this)"><i class="fas fa-cog me-2"></i> الإعدادات</div>
        </div>
        <div class="p-3">
            <button class="btn btn-outline-info w-100 mb-2" onclick="document.body.classList.toggle('dark-mode')">🌓 تبديل المظهر</button>
        </div>
    </div>

    <div class="main-content">
        <div id="dash" class="page-section active">
            <h3 class="fw-bold mb-4">📊 الجرد العام</h3>
            <div class="row g-3">
                <div class="col-md-4"><div class="card p-4"><h6>إجمالي الطلبات</h6><h2 id="totalOrders">0</h2></div></div>
                <div class="col-md-4"><div class="card p-4"><h6>أصناف المنيو</h6><h2 id="totalItems">0</h2></div></div>
            </div>
        </div>

        <div id="liveOrders" class="page-section">
            <h3 class="fw-bold mb-4 text-primary">🔔 الطلبات الحية (الآن)</h3>
            <div id="ordersContainer"></div>
        </div>

        <div id="menu" class="page-section">
            <h3 class="fw-bold mb-4">🍴 إدارة الأصناف</h3>
            <div class="card p-4 mb-4">
                <div class="row g-2">
                    <div class="col-md-4"><input type="text" id="itemName" class="form-control" placeholder="اسم الوجبة"></div>
                    <div class="col-md-2"><input type="number" id="itemPrice" class="form-control" placeholder="السعر"></div>
                    <div class="col-md-4"><input type="text" id="itemImg" class="form-control" placeholder="رابط الصورة"></div>
                    <div class="col-md-2"><button class="btn btn-primary w-100" onclick="addItem()">إضافة +</button></div>
                </div>
            </div>
            <div id="menuGrid" class="row g-3"></div>
        </div>

        <div id="settings" class="page-section">
            <h3 class="fw-bold mb-4">⚙️ الإعدادات</h3>
            <div class="card p-4 col-md-6">
                <label class="mb-2">اسم المطعم</label><input type="text" id="resNameInp" class="form-control mb-3">
                <label class="mb-2">رقم الواتساب</label><input type="text" id="resPhoneInp" class="form-control mb-3">
                <button class="btn btn-success w-100" onclick="saveSets()">حفظ</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8",
        authDomain: "argon-system.firebaseapp.com",
        projectId: "argon-system",
        storageBucket: "argon-system.firebasestorage.app",
        messagingSenderId: "858120444233",
        appId: "1:858120444233:web:4bda38dfa451b9eb26e298",
        databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const RES_ID = new URLSearchParams(window.location.search).get("id") || "1";
    document.getElementById('resIdDisplay').innerText = "ID: " + RES_ID;

    // جلب البيانات
    db.ref('restaurants/' + RES_ID).on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const products = data.products || {};
        const orders = data.orders || {};

        // تحديث المنيو
        const menuGrid = document.getElementById('menuGrid');
        menuGrid.innerHTML = "";
        let pCount = 0;
        for(let key in products) {
            pCount++;
            menuGrid.innerHTML += `<div class="col-md-3"><div class="card p-2 text-center">
                <img src="${products[key].img}" height="100" style="object-fit:cover;border-radius:10px">
                <h6 class="mt-2">${products[key].name}</h6>
                <button class="btn btn-danger btn-sm" onclick="deleteItem('${key}')">حذف</button>
            </div></div>`;
        }
        document.getElementById('totalItems').innerText = pCount;

        // تحديث الطلبات
        const ordersContainer = document.getElementById('ordersContainer');
        ordersContainer.innerHTML = "";
        let oCount = 0;
        for(let key in orders) {
            oCount++;
            const o = orders[key];
            ordersContainer.innerHTML += `<div class="order-card card">
                <div class="d-flex justify-content-between">
                    <strong>📦 طلب جديد</strong>
                    <span class="text-muted">${o.time}</span>
                </div>
                <div class="my-2">${o.items}</div>
                <button class="btn btn-sm btn-success" onclick="doneOrder('${key}')">إتمام الطلب</button>
            </div>`;
        }
        document.getElementById('orderBadge').innerText = oCount;
        document.getElementById('totalOrders').innerText = oCount;
        
        document.getElementById('resNameInp').value = data.settings?.name || "";
        document.getElementById('resPhoneInp').value = data.settings?.phone || "";
    });

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;
        db.ref('restaurants/' + RES_ID + '/products').push({name, price, img});
    }

    function deleteItem(key) { db.ref('restaurants/' + RES_ID + '/products/' + key).remove(); }
    function doneOrder(key) { db.ref('restaurants/' + RES_ID + '/orders/' + key).remove(); }
    
    function saveSets() {
        db.ref('restaurants/' + RES_ID + '/settings').update({
            name: document.getElementById('resNameInp').value,
            phone: document.getElementById('resPhoneInp').value
        });
        alert("تم الحفظ");
    }

    function showSec(id, btn) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        btn.classList.add('active');
    }
</script>
</body>
</html>
