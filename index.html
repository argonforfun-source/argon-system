<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو المطعم الذكي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); padding-bottom: 100px; }
        
        /* هزة السلة */
        @keyframes basketShake {
            0% { transform: scale(1); }
            25% { transform: scale(1.2) rotate(-10deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            75% { transform: scale(1.2) rotate(-10deg); }
            100% { transform: scale(1); }
        }
        .shake { animation: basketShake 0.4s ease-in-out; }

        /* إشعار تمت الاضافة */
        #toastNotice {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); color: white; padding: 10px 25px;
            border-radius: 50px; z-index: 9999; display: none; font-weight: bold;
            animation: fadeInOut 2s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -20px); }
            20% { opacity: 1; transform: translate(-50%, 0); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        .cart-btn {
            position: fixed; bottom: 30px; left: 30px;
            width: 70px; height: 70px; background: var(--main);
            color: white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 1.5rem;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); border: none; z-index: 1000;
        }
        .item-card { border: none; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .add-btn { background: var(--main); border: none; border-radius: 12px; font-weight: bold; }
        .cart-count { position: absolute; top: 0; right: 0; background: #ef4444; color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="toastNotice">✅ تمت الإضافة للسلة</div>

    <div class="container py-4">
        <h2 id="resName" class="text-center fw-900 mb-4">تحميل المنيو...</h2>
        <div id="itemsGrid" class="row g-3"></div>
    </div>

    <button class="cart-btn" id="mainBasket" onclick="showCart()">
        <i class="fas fa-shopping-basket"></i>
        <div class="cart-count" id="cartCount">0</div>
    </button>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const resId = urlParams.get("id") || "1";
    let cart = [];

    // جلب البيانات (سنستخدم الـ LocalStorage حالياً للتجربة)
    const DB_MENU = 'res_menu_' + resId;
    const DB_SETS = 'res_sets_' + resId;

    function loadMenu() {
        const sets = JSON.parse(localStorage.getItem(DB_SETS)) || {name: "مطعمنا"};
        const menu = JSON.parse(localStorage.getItem(DB_MENU)) || [];
        
        document.getElementById('resName').innerText = sets.name;
        document.body.style.setProperty('--main', sets.themeColor || '#3b82f6');

        document.getElementById('itemsGrid').innerHTML = menu.map((item, i) => `
            <div class="col-6">
                <div class="card item-card h-100">
                    <img src="${item.img}" class="card-img-top" style="height:140px; object-fit:cover">
                    <div class="card-body p-2 text-center">
                        <h6 class="fw-bold mb-1">${item.name}</h6>
                        <p class="text-primary fw-bold mb-2">${item.price} د.أ</p>
                        <button class="btn btn-primary btn-sm w-100 add-btn" onclick="addToCart('${item.name}', ${item.price})">إضافة +</button>
                    </div>
                </div>
            </div>`).join('');
    }

    function addToCart(name, price) {
        cart.push({name, price});
        
        // 1. تحديث العداد
        document.getElementById('cartCount').innerText = cart.length;

        // 2. هزة السلة (Animation)
        const basket = document.getElementById('mainBasket');
        basket.classList.remove('shake');
        void basket.offsetWidth; // إعادة تشغيل الانيميشن
        basket.classList.add('shake');

        // 3. هزة التلفون (Haptic Feedback)
        if (navigator.vibrate) {
            navigator.vibrate(50); // يهز التلفون لمدة 50 ميللي ثانية
        }

        // 4. إظهار الإشعار (Toast)
        const toast = document.getElementById('toastNotice');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function showCart() {
        if(cart.length === 0) { alert("السلة فارغة!"); return; }
        // هنا تفتح المودال الخاص بالدفع وإرسال الطلب
        alert("طلباتك: " + cart.map(i => i.name).join(', '));
    }

    window.onload = loadMenu;
</script>
</body>
</html>
