<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>أرغون | المنيو الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --main: #3b82f6;
            --cyan: #22d3ee;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --bg: #f0f4ff;
            --card: #ffffff;
            --header-bg: linear-gradient(135deg, #1e3a8a, #3b82f6);
            --text: #0f172a;
            --muted: #64748b;
            --border: rgba(0,0,0,0.07);
            --shadow: rgba(0,0,0,0.06);
        }

        [data-theme="dark"] {
            --bg: #070d1a;
            --card: #0f1929;
            --header-bg: linear-gradient(135deg, #0a1628, #1e3a8a);
            --text: #e2e8f0;
            --muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 100px;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--header-bg);
            padding: 0 0 24px;
            position: relative;
            overflow: hidden;
        }

            .header::before {
                content: '';
                position: absolute;
                inset: 0;
                background-image: radial-gradient(circle at 20% 50%, rgba(34,211,238,0.12) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(139,92,246,0.12) 0%, transparent 40%);
                pointer-events: none;
            }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 0;
        }

        .argon-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            padding: 7px 14px;
            border-radius: 20px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }

            .theme-toggle:hover {
                background: rgba(255,255,255,0.18);
            }

        .header-main {
            text-align: center;
            padding: 24px 20px 0;
            position: relative;
        }

        .res-logo-circle {
            width: 72px;
            height: 72px;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 14px;
            backdrop-filter: blur(10px);
        }

        .res-name-header {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .res-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .res-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.76rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .chip-open {
            background: rgba(16,185,129,0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16,185,129,0.3);
        }

        .chip-hours {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* ===== SEARCH ===== */
        .search-wrap {
            padding: 0 16px;
            margin-top: 20px;
        }

        .search-box {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 12px 16px 12px 46px;
            width: 100%;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.25s;
        }

            .search-box::placeholder {
                color: rgba(255,255,255,0.4);
            }

            .search-box:focus {
                background: rgba(255,255,255,0.18);
                border-color: rgba(255,255,255,0.3);
            }

        .search-icon {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .search-container {
            position: relative;
        }

        /* ===== MENU GRID ===== */
        .menu-section {
            padding: 20px 14px 0;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .item-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.25s;
            box-shadow: 0 2px 12px var(--shadow);
            position: relative;
        }

            .item-card:active {
                transform: scale(0.97);
            }

        .item-img-wrap {
            position: relative;
            height: 120px;
            background: #f1f5f9;
            overflow: hidden;
        }

        [data-theme="dark"] .item-img-wrap {
            background: #1a2540;
        }

        .item-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .item-card:hover .item-img {
            transform: scale(1.05);
        }

        .img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .item-body {
            padding: 12px;
        }

        .item-name {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .item-price {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--main);
            margin-bottom: 10px;
        }

        .add-btn {
            width: 100%;
            background: var(--main);
            border: none;
            border-radius: 10px;
            padding: 9px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

            .add-btn:active {
                transform: scale(0.96);
            }

            .add-btn.added {
                background: var(--green);
            }

        /* ===== CART BUTTON ===== */
        .cart-fab {
            position: fixed;
            bottom: 24px;
            left: 20px;
            z-index: 500;
        }

        .cart-btn {
            width: 66px;
            height: 66px;
            background: linear-gradient(135deg, var(--main), #6366f1);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(59,130,246,0.4);
            transition: all 0.3s;
            position: relative;
            border: none;
        }

            .cart-btn:active {
                transform: scale(0.92);
            }

        .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--red);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg);
            font-family: 'IBM Plex Mono', monospace;
        }

        .cart-label {
            position: absolute;
            bottom: -22px;
            white-space: nowrap;
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--main);
            left: 50%;
            transform: translateX(-50%);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

            .modal-overlay.show {
                display: flex;
            }

        .modal-sheet {
            background: var(--card);
            border-radius: 28px 28px 0 0;
            padding: 28px 22px 32px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            background: rgba(0,0,0,0.15);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        [data-theme="dark"] .sheet-handle {
            background: rgba(255,255,255,0.1);
        }

        .sheet-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-input {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            outline: none;
            margin-bottom: 12px;
            text-align: right;
            transition: all 0.2s;
        }

            .modal-input:focus {
                border-color: var(--main);
            }

        /* ===== BILL ===== */
        .bill-box {
            background: var(--bg);
            border-radius: 16px;
            padding: 18px;
            border: 1.5px dashed rgba(59,130,246,0.25);
            margin-bottom: 18px;
        }

        .bill-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .bill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
        }

            .bill-row:last-of-type {
                border-bottom: none;
            }

        .bill-row-name {
            font-size: 0.88rem;
        }

        .bill-row-price {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--main);
        }

        .bill-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            margin-top: 4px;
            border-top: 2px solid rgba(59,130,246,0.15);
        }

        .bill-total-label {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .bill-total-val {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--green);
        }

        .btn-send {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--green), #059669);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(16,185,129,0.3);
        }

            .btn-send:active {
                transform: scale(0.98);
            }

        .btn-next {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--main), #6366f1);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
        }

        .btn-back-link {
            display: block;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 8px;
        }

        .btn-close-modal {
            display: block;
            width: 100%;
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            cursor: pointer;
            padding: 10px;
            margin-top: 4px;
            border: none;
            background: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        /* ===== SUCCESS SCREEN ===== */
        .success-screen {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background: rgba(16,185,129,0.1);
            border: 2px solid rgba(16,185,129,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 16px;
        }

        .success-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--green);
            margin-bottom: 8px;
        }

        .success-sub {
            font-size: 0.88rem;
            color: var(--muted);
        }

        /* ===== CLOSED SCREEN ===== */
        .closed-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #0a1628, #1e3a8a);
            color: white;
        }

        .closed-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .closed-title {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .closed-sub {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        /* ===== EMPTY ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

            .empty-state i {
                font-size: 2.5rem;
                display: block;
                margin-bottom: 12px;
                opacity: 0.3;
            }
    </style>
</head>
<body data-theme="light">

    <div id="mainContent">
        <!-- HEADER -->
        <div class="header">
            <div class="header-top">
                <span class="argon-badge">ARGON MENU</span>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                    🌙 الوضع الليلي
                </button>
            </div>

            <div class="header-main">
                <div class="res-logo-circle">🍽️</div>
                <div class="res-name-header" id="resName">جاري التحميل...</div>
                <div class="res-meta">
                    <span class="res-chip chip-open" id="statusChip">
                        <i class="fas fa-circle" style="font-size:0.4rem"></i> مفتوح الآن
                    </span>
                    <span class="res-chip chip-hours" id="hoursChip" style="display:none">
                        <i class="fas fa-clock" style="font-size:0.7rem"></i>
                        <span id="hoursText"></span>
                    </span>
                </div>
            </div>

            <div class="search-wrap" style="margin-top:18px">
                <div class="search-container">
                    <i class="fas fa-magnifying-glass search-icon"></i>
                    <input type="text" class="search-box" id="searchBox" placeholder="ابحث عن صنف..." oninput="filterMenu()">
                </div>
            </div>
        </div>

        <!-- MENU -->
        <div class="menu-section">
            <div class="section-label">قائمة الطعام</div>
            <div class="menu-grid" id="menuGrid">
                <div class="empty-state" style="grid-column:1/-1">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري تحميل القائمة...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- CART FAB -->
    <div class="cart-fab">
        <button class="cart-btn" onclick="openModal()">
            🛒
            <div class="cart-count" id="cartCount">0</div>
        </button>
        <span class="cart-label" id="cartTotal">0.00 د.أ</span>
    </div>

    <!-- ORDER MODAL -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal-sheet">
            <div class="sheet-handle"></div>

            <!-- STEP 1: INFO -->
            <div id="stepInfo">
                <div class="sheet-title">📋 أدخل بياناتك</div>
                <input type="text" id="custName" class="modal-input" placeholder="اسمك الكريم *">
                <input type="tel" id="custPhone" class="modal-input" placeholder="رقم هاتفك *">
                <textarea id="orderNotes" class="modal-input" rows="2" placeholder="ملاحظات إضافية (اختياري)" style="resize:none"></textarea>
                <button class="btn-next" onclick="goConfirm()">
                    عرض الفاتورة <i class="fas fa-arrow-left me-1"></i>
                </button>
                <button class="btn-close-modal" onclick="closeModal()">إغلاق</button>
            </div>

            <!-- STEP 2: CONFIRM -->
            <div id="stepConfirm" style="display:none">
                <div class="sheet-title">🧾 تأكيد الطلب</div>
                <div class="bill-box" id="billBox"></div>
                <button class="btn-send" onclick="sendOrder()">
                    <i class="fas fa-paper-plane me-2"></i> إرسال الطلب للمطعم
                </button>
                <span class="btn-back-link" onclick="backStep()">← تعديل البيانات</span>
            </div>

            <!-- STEP 3: SUCCESS -->
            <div class="success-screen" id="stepSuccess">
                <div class="success-icon">✅</div>
                <div class="success-title">تم إرسال طلبك!</div>
                <div class="success-sub">شكراً لك، سيتم تحضير طلبك في أقرب وقت</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8",
            authDomain: "argon-system.firebaseapp.com",
            projectId: "argon-system",
            databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        let RES_ID = urlParams.get('id');
        if (!RES_ID) {
            RES_ID = localStorage.getItem('argon_store_id') || '1';
        } else {
            localStorage.setItem('argon_store_id', RES_ID);
        }

        let cart = [];
        let allProducts = [];

        db.ref('restaurants/' + RES_ID).on('value', snap => {
            const data = snap.val();

            if (!data) {
                document.body.innerHTML = `<div class="closed-screen"><div class="closed-icon">❌</div><div class="closed-title">المطعم غير موجود</div><div class="closed-sub">تأكد من الرابط وحاول مرة أخرى</div></div>`;
                return;
            }

            if (data.settings?.status === 'disabled') {
                document.body.innerHTML = `<div class="closed-screen"><div class="closed-icon">🔒</div><div class="closed-title">عذراً، المطعم مغلق</div><div class="closed-sub">سيعود قريباً، شكراً لتفهمك</div></div>`;
                return;
            }

            const sets = data.settings || {};

            // Header
            document.getElementById('resName').textContent = sets.name || 'مطعم أرغون';
            document.title = sets.name || 'أرغون | المنيو';

            // Status
            const statusChip = document.getElementById('statusChip');
            if (sets.status === 'closed') {
                statusChip.className = 'res-chip';
                statusChip.style.background = 'rgba(239,68,68,0.2)';
                statusChip.style.color = '#fca5a5';
                statusChip.style.border = '1px solid rgba(239,68,68,0.3)';
                statusChip.innerHTML = '<i class="fas fa-circle" style="font-size:0.4rem"></i> مغلق مؤقتاً';
            }

            // Hours
            if (sets.hours) {
                document.getElementById('hoursChip').style.display = 'inline-flex';
                document.getElementById('hoursText').textContent = sets.hours;
            }

            // Products
            allProducts = [];
            const products = data.products || {};
            for (let k in products) {
                allProducts.push({ key: k, ...products[k] });
            }

            renderMenu(allProducts);
        });

        function renderMenu(products) {
            const grid = document.getElementById('menuGrid');
            if (!products.length) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-utensils"></i><p>لا توجد أصناف متاحة حالياً</p></div>`;
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="item-card">
                    <div class="item-img-wrap">
                        ${p.img
                    ? `<img src="${p.img}" class="item-img" onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'>🍽️</div>'">`
                    : `<div class="img-placeholder">🍽️</div>`
                }
                    </div>
                    <div class="item-body">
                        <div class="item-name">${p.name}</div>
                        <div class="item-price">${p.price} د.أ</div>
                        <button class="add-btn" onclick="addToCart('${p.name}', ${p.price}, this)">
                            <i class="fas fa-plus"></i> أضف للسلة
                        </button>
                    </div>
                </div>`).join('');
        }

        function filterMenu() {
            const q = document.getElementById('searchBox').value.toLowerCase().trim();
            if (!q) { renderMenu(allProducts); return; }
            renderMenu(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function addToCart(name, price, btn) {
            cart.push({ name, price: parseFloat(price) });
            updateCartUI();

            const original = btn.innerHTML;
            btn.classList.add('added');
            btn.innerHTML = '<i class="fas fa-check"></i> تمت الإضافة';
            setTimeout(() => {
                btn.classList.remove('added');
                btn.innerHTML = original;
            }, 1000);
        }

        function updateCartUI() {
            document.getElementById('cartCount').textContent = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cartTotal').textContent = total.toFixed(2) + ' د.أ';
        }

        function openModal() {
            if (!cart.length) {
                alert('سلة مشترياتك فارغة! أضف أصنافاً أولاً');
                return;
            }
            document.getElementById('orderModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('show');
        }

        function goConfirm() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            if (!name || !phone) { alert('يرجى إدخال الاسم ورقم الهاتف'); return; }

            const counts = {};
            cart.forEach(i => counts[i.name] = (counts[i.name] || { name: i.name, price: i.price, qty: 0 }));
            cart.forEach(i => counts[i.name].qty++);

            const items = Object.values(counts);
            const total = cart.reduce((s, i) => s + i.price, 0);

            document.getElementById('billBox').innerHTML = `
                <div class="bill-title">تفاصيل الفاتورة</div>
                ${items.map(i => `
                    <div class="bill-row">
                        <span class="bill-row-name">${i.qty > 1 ? i.qty + 'x ' : ''}${i.name}</span>
                        <span class="bill-row-price">${(i.price * i.qty).toFixed(2)} د.أ</span>
                    </div>`).join('')}
                <div class="bill-total">
                    <span class="bill-total-label">المجموع الكلي</span>
                    <span class="bill-total-val">${total.toFixed(2)} د.أ</span>
                </div>`;

            document.getElementById('stepInfo').style.display = 'none';
            document.getElementById('stepConfirm').style.display = 'block';
        }

        function backStep() {
            document.getElementById('stepConfirm').style.display = 'none';
            document.getElementById('stepInfo').style.display = 'block';
        }

        function sendOrder() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const notes = document.getElementById('orderNotes').value.trim();
            const total = cart.reduce((s, i) => s + i.price, 0);

            const order = {
                custName: name,
                custPhone: phone,
                notes: notes,
                items: cart.map(i => i.name).join(' + '),
                total: total.toFixed(2),
                orderNo: '#' + Math.floor(1000 + Math.random() * 9000),
                status: 'new',
                time: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }),
                date: new Date().toLocaleDateString('ar-EG')
            };

            db.ref(`restaurants/${RES_ID}/orders`).push(order).then(() => {
                document.getElementById('stepConfirm').style.display = 'none';
                document.getElementById('stepSuccess').style.display = 'block';
                cart = [];
                updateCartUI();
                setTimeout(closeModal, 3000);
                setTimeout(() => {
                    document.getElementById('stepSuccess').style.display = 'none';
                    document.getElementById('stepInfo').style.display = 'block';
                    document.getElementById('custName').value = '';
                    document.getElementById('custPhone').value = '';
                    document.getElementById('orderNotes').value = '';
                }, 3100);
            }).catch(() => alert('حدث خطأ، تحقق من اتصالك بالإنترنت'));
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️ الوضع النهاري';
            } else {
                body.setAttribute('data-theme', 'light');
                btn.textContent = '🌙 الوضع الليلي';
            }
        }

        // Close modal on overlay click
        document.getElementById('orderModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
