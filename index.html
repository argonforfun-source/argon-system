<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو أرغون الذكي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); padding-bottom: 100px; }
        
        /* تأثير هزة السلة */
        @keyframes basketShake {
            0% { transform: scale(1); }
            25% { transform: scale(1.2) rotate(-10deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1); }
        }
        .shake { animation: basketShake 0.4s ease-in-out; }

        /* إشعار التوست */
        #toastNotice {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 12px 30px;
            border-radius: 50px; z-index: 9999; display: none; font-weight: bold;
            animation: slideDown 0.3s;
        }
        @keyframes slideDown { from { top: -50px; } to { top: 20px; } }

        .res-header { padding: 50px 20px; background: var(--main); color: white; border-radius: 0 0 40px 40px; text-align: center; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .item-card { border: none; border-radius: 25px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); background: #fff; height: 100%; transition: 0.3s; }
        .add-btn { background: var(--main); border: none; border-radius: 15px; font-weight: bold; padding: 10px; color: white; }
        .cart-btn {
            position: fixed; bottom: 30px; left: 30px;
            width: 75px; height: 75px; background: var(--main);
            color: white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 1.8rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 4px solid white; z-index: 1000;
        }
        .cart-count { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; width: 28px; height: 28px; border-radius: 50%; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="toastNotice">✅ تمت الإضافة للسلة</div>

    <div id="headerArea" class="res-header">
        <h1 id="resName" class="fw-900 mb-1">...</h1>
        <p id="resStatus" class="opacity-75 mb-0">جاري تحميل المنيو</p>
    </div>

    <div class="container">
        <div id="itemsGrid" class="row g-3"></div>
    </div>

    <button class="cart-btn" id="mainBasket">
        <i class="fas fa-shopping-basket"></i>
        <div class="cart-count" id="cartCount">0</div>
    </button>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    // 1. إعدادات الفايربيز (تأكد أنها نفس الموجودة في لوحة التحكم)
    const firebaseConfig = {
        apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8",
        authDomain: "argon-system.firebaseapp.com",
        projectId: "argon-system",
        storageBucket: "argon-system.firebasestorage.app",
        messagingSenderId: "858120444233",
        appId: "1:858120444233:web:4bda38dfa451b9eb26e298",
        databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. جلب ID المطعم من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const RES_ID = urlParams.get("id") || "1"; 

    let cartCount = 0;

    // 3. جلب البيانات من Firebase (Real-time)
    db.ref('restaurants/' + RES_ID).on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const settings = data.settings || {};
            const products = data.products || {};

            // تحديث الثيم والاسم
            document.getElementById('resName').innerText = settings.name || "مطعم غير معرف";
            document.getElementById('resStatus').innerText = "أهلاً بكم في منيو " + (settings.name || "");
            const themeColor = settings.themeColor || "#3b82f6";
            document.documentElement.style.setProperty('--main', themeColor);
            document.getElementById('headerArea').style.background = themeColor;

            // عرض الأصناف
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = "";
            for (let key in products) {
                const item = products[key];
                grid.innerHTML += `
                    <div class="col-6">
                        <div class="card item-card">
                            <img src="${item.img || 'https://via.placeholder.com/150'}" class="card-img-top" style="height:140px; object-fit:cover">
                            <div class="card-body p-2 text-center">
                                <h6 class="fw-bold mb-1">${item.name}</h6>
                                <p class="text-primary fw-bold mb-2">${item.price} د.أ</p>
                                <button class="btn add-btn w-100" onclick="addToCart()">إضافة +</button>
                            </div>
                        </div>
                    </div>`;
            }
        } else {
            document.getElementById('resName').innerText = "المطعم غير موجود";
        }
    });

    function addToCart() {
        cartCount++;
        document.getElementById('cartCount').innerText = cartCount;

        // الاهتزاز الفيزيائي
        if (navigator.vibrate) navigator.vibrate(60);

        // هزة السلة
        const basket = document.getElementById('mainBasket');
        basket.classList.remove('shake');
        void basket.offsetWidth; 
        basket.classList.add('shake');

        // إشعار التوست
        const toast = document.getElementById('toastNotice');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1500);
    }
</script>
</body>
</html>
