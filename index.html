<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Powered by ARGON</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #E63946; --brand2: #FF6B35; --dark: #1a1a2e;
            --card: #16213e; --text: #eaeaea; --muted: #9ba3b4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        
        header { background: linear-gradient(135deg, var(--brand), var(--brand2)); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #cart-btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: white; padding: 8px 15px; border-radius: 50px; cursor: pointer; display: flex; gap: 8px; align-items: center; }
        
        main { flex: 1; padding: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }
        #search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; margin-bottom: 20px; outline: none; }
        
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .menu-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .menu-card:hover { transform: translateY(-5px); border-color: var(--brand); }
        .card-img { width: 100%; height: 160px; background: #0f3460; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .card-body { padding: 15px; }
        .price { color: var(--brand2); font-weight: 900; font-size: 1.2rem; }
        .add-btn { background: var(--brand); color: white; border: none; padding: 7px 15px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; }

        footer { text-align: center; padding: 30px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }
        .argon-txt { font-weight: 900; background: linear-gradient(135deg, var(--brand), var(--brand2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #error-msg { display: none; color: #ff4d4d; text-align: center; padding: 20px; background: rgba(255,0,0,0.1); border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 id="res-name" style="font-size: 1.2rem;">🍽️ مطعمي</h1>
        <span id="res-hours" style="font-size: 0.8rem; opacity: 0.8;">⏰ جاري التحميل...</span>
    </div>
    <button id="cart-btn">🛒 السلة <b id="cart-count">0</b></button>
</header>

<main>
    <div id="error-msg">⚠️ عذراً، لا يمكن الاتصال بالسيرفر حالياً.</div>
    <input type="text" id="search-box" placeholder="🔎 ابحث عن وجبة..." oninput="search()">
    <div id="loader" style="text-align:center; padding:40px;">⏳ جاري جلب قائمة الطعام...</div>
    <div id="menu-grid"></div>
</main>

<footer>
    <p style="font-size: 0.9rem; color: var(--muted);">Developed by <span class="argon-txt">ARGON</span> &copy; 2026</p>
</footer>

<script>
    const API_BASE = 'https://restaurant-clean-production.up.railway.app/api';
    const RESTAURANT_ID = 1; 
    let menuData = [];

    // بصمة ARGON
    console.log("%c Powered by ARGON ", "background:#E63946; color:#fff; font-weight:bold; padding:5px; border-radius:5px;");

    async function start() {
        try {
            // جلب الإعدادات
            const setRes = await fetch(`${API_BASE}/RestaurantSettings`);
            if(setRes.ok) {
                const s = await setRes.json();
                document.getElementById('res-name').innerText = "🍽️ " + (s.restaurantName || s.RestaurantName || "مطعمي");
                document.getElementById('res-hours').innerText = `⏰ ${s.openTime || '10:00'} - ${s.closeTime || '23:00'}`;
            }

            // جلب المنيو - مع دعم الحالات المختلفة للأسماء
            const menuRes = await fetch(`${API_BASE}/MenuItems?restaurantId=${RESTAURANT_ID}`);
            if(!menuRes.ok) throw new Error();
            
            const rawData = await menuRes.json();
            
            // معالجة البيانات لتفادي اختلاف أسماء الحقول (Id vs id)
            menuData = rawData.map(item => ({
                id: item.menuItemId || item.MenuItemId || item.id,
                name: item.name || item.Name || "صنف بدون اسم",
                price: item.price || item.Price || 0,
                img: item.imageUrl || item.ImageUrl || "",
                cat: item.category || item.Category || ""
            }));

            render(menuData);
            document.getElementById('loader').style.display = 'none';

        } catch (err) {
            console.error("Fetch Error:", err);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function render(items) {
        const grid = document.getElementById('menu-grid');
        if(items.length === 0) {
            grid.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>لا توجد أصناف متاحة حالياً.</p>";
            return;
        }
        grid.innerHTML = items.map(i => `
            <div class="menu-card">
                <div class="card-img">${i.img ? `<img src="${i.img}" style="width:100%;height:100%;object-fit:cover;">` : '🍕'}</div>
                <div class="card-body">
                    <h3 style="font-size:1rem; margin-bottom:10px;">${i.name}</h3>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="price">${i.price} د.أ</span>
                        <button class="add-btn" onclick="alert('تمت الإضافة للسلة')">أضف +</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function search() {
        const txt = document.getElementById('search-box').value.toLowerCase();
        const filtered = menuData.filter(i => i.name.toLowerCase().includes(txt));
        render(filtered);
    }

    start();
</script>
</body>
</html>
