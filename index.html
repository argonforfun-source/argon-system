<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو أرغون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --main: #3b82f6;
            --bg: #f8fafc;
            --card: #fff;
            --text: #1e293b;
            --muted: #64748b
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8
        }

        body {
            font-family: 'Cairo',sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 110px;
            transition: .3s;
            min-height: 100vh
        }

        .header {
            padding: 36px 20px 28px;
            background: var(--main);
            color: #fff;
            text-align: center;
            border-radius: 0 0 28px 28px;
            position: relative;
            box-shadow: 0 4px 15px rgba(59,130,246,.3)
        }

        .theme-toggle {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255,255,255,.2);
            border: none;
            color: #fff;
            padding: 7px 13px;
            border-radius: 50px;
            font-size: .8rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo',sans-serif
        }

        .item-card {
            border: none;
            border-radius: 18px;
            background: var(--card);
            box-shadow: 0 4px 10px rgba(0,0,0,.06);
            overflow: hidden;
            transition: .2s;
            height: 100%;
            color: var(--text);
            border: 1px solid rgba(0,0,0,.05)
        }

        .add-btn {
            background: var(--main);
            color: #fff;
            border: none;
            width: 100%;
            border-radius: 12px;
            padding: 9px;
            font-weight: 900;
            transition: .3s;
            font-family: 'Cairo',sans-serif;
            font-size: 14px;
            cursor: pointer
        }

            .add-btn:active {
                transform: scale(.95)
            }

            .add-btn.in-cart {
                background: #10b981
            }

        .cart-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 64px;
            height: 64px;
            background: var(--main);
            color: #fff;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--card);
            box-shadow: 0 10px 25px rgba(0,0,0,.2);
            z-index: 999;
            cursor: pointer;
            transition: .2s
        }

            .cart-btn:hover {
                transform: scale(1.05)
            }

        .count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: .75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--card);
            font-weight: 900
        }
        /* modal */
        .order-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            backdrop-filter: blur(5px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px
        }

        .modal-inner {
            background: var(--card);
            padding: 24px;
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            color: var(--text);
            max-height: 90vh;
            overflow-y: auto
        }

            .modal-inner input, .modal-inner textarea, .modal-inner select {
                width: 100%;
                padding: 12px 14px;
                margin: 8px 0;
                border: 1px solid rgba(0,0,0,.1);
                border-radius: 12px;
                text-align: center;
                background: var(--bg);
                color: var(--text);
                font-family: 'Cairo',sans-serif;
                font-size: 14px;
                outline: none;
                transition: .2s
            }

                .modal-inner input:focus, .modal-inner select:focus {
                    border-color: var(--main)
                }

        .bill {
            background: rgba(59,130,246,.05);
            border-radius: 16px;
            padding: 18px;
            margin: 12px 0;
            text-align: right;
            border: 1px dashed var(--main)
        }

        .bill-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 7px;
            font-size: .9rem
        }

        .bill-total {
            font-weight: 900;
            color: var(--main);
            font-size: 1.2rem;
            border-top: 2px solid rgba(59,130,246,.2);
            margin-top: 8px;
            padding-top: 8px;
            display: flex;
            justify-content: space-between
        }
        /* loading */
        #loadScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999
        }

        .load-emoji {
            font-size: 56px;
            animation: bounce .8s infinite alternate
        }

        @keyframes bounce {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-14px)
            }
        }

        .load-dots {
            display: flex;
            gap: 8px;
            margin-top: 12px
        }

        .ld {
            width: 8px;
            height: 8px;
            background: var(--main);
            border-radius: 50%;
            animation: dp 1.2s infinite
        }

            .ld:nth-child(2) {
                animation-delay: .2s
            }

            .ld:nth-child(3) {
                animation-delay: .4s
            }

        @keyframes dp {
            0%,80%,100% {
                transform: scale(0);
                opacity: .3
            }

            40% {
                transform: scale(1);
                opacity: 1
            }
        }
        /* closed/success screens */
        #closedScreen, #successScreen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px
        }
        /* toast */
        .toast-wrap {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none
        }

        .toastm {
            background: var(--text);
            color: var(--bg);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 13px;
            font-family: 'Cairo',sans-serif;
            opacity: 0;
            transform: translateY(10px);
            transition: .3s;
            white-space: nowrap
        }

            .toastm.show {
                opacity: 1;
                transform: translateY(0)
            }
    </style>
</head>
<body data-theme="light">

    <!-- LOADING -->
    <div id="loadScreen">
        <div class="load-emoji">🍽️</div>
        <div style="font-size:17px;font-weight:700;color:var(--main);margin-top:14px" id="loadTxt">جاري تحميل القائمة...</div>
        <div class="load-dots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
    </div>

    <!-- CLOSED -->
    <div id="closedScreen" style="display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px">
        <div style="font-size:80px;margin-bottom:20px">🔒</div>
        <h2 style="font-weight:900;color:#ef4444">المطعم مغلق حالياً</h2>
        <p id="closed-msg" style="color:var(--muted)">يرجى المحاولة لاحقاً</p>
    </div>

    <!-- SUCCESS -->
    <div id="successScreen" style="display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px">
        <div style="font-size:80px;margin-bottom:20px">✅</div>
        <h2 style="font-weight:900;color:#10b981">تم إرسال طلبك!</h2>
        <p style="color:var(--muted);margin-bottom:8px" id="suc-id"></p>
        <p style="font-weight:900;font-size:1.2rem;color:var(--main)" id="suc-total"></p>
        <button onclick="resetPage()" class="btn btn-primary mt-4 fw-bold rounded-pill px-5 py-3">🔄 طلب جديد</button>
    </div>

    <!-- MAIN -->
    <div id="mainContent" style="display:none">
        <div class="header">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i> ليلي</button>
            <h1 id="res-name" style="font-weight:900;margin-bottom:4px">...</h1>
            <p id="res-msg" style="opacity:.85;font-size:.88rem;margin:0">أهلاً بك!</p>
        </div>

        <div class="container mt-4">
            <div id="menuGrid" class="row g-3"></div>
        </div>
    </div>

    <!-- CART BTN -->
    <div class="cart-btn" onclick="openModal()">
        <i class="fas fa-shopping-basket"></i>
        <div class="count" id="cartCount">0</div>
    </div>

    <!-- ORDER MODAL -->
    <div id="orderModal" class="order-modal">
        <div class="modal-inner">
            <h5 class="fw-black mb-1">🛍️ تأكيد الطلب</h5>

            <!-- STEP 1 -->
            <div id="step1">
                <input type="text" id="custName" placeholder="اسمك الكريم *">
                <input type="tel" id="custPhone" placeholder="رقم الهاتف *" dir="ltr">
                <input type="text" id="tableNum" placeholder="رقم الطاولة (اختياري)" dir="ltr">
                <select id="orderType">
                    <option value="dine-in">🪑 داخل المطعم</option>
                    <option value="takeaway">🥡 تيك أواي</option>
                    <option value="delivery">🛵 توصيل</option>
                </select>
                <textarea id="orderNotes" rows="2" placeholder="ملاحظات إضافية (اختياري)"></textarea>
                <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill mt-2" onclick="goConfirm()">عرض الفاتورة ←</button>
            </div>

            <!-- STEP 2 -->
            <div id="step2" style="display:none">
                <div class="bill" id="billContent"></div>
                <button class="btn btn-success w-100 py-3 fw-bold rounded-pill mt-2" id="sendBtn" onclick="sendOrder()"><i class="fas fa-paper-plane"></i> إرسال الطلب</button>
                <button class="btn btn-link text-muted w-100 mt-1 btn-sm text-decoration-none" onclick="backToStep1()">← تعديل البيانات</button>
            </div>

            <button class="btn btn-light w-100 mt-2 rounded-pill btn-sm" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <div class="toast-wrap" id="tw"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const FC = { apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8", authDomain: "argon-system.firebaseapp.com", databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app", projectId: "argon-system", storageBucket: "argon-system.firebasestorage.app", messagingSenderId: "858120444233", appId: "1:858120444233:web:4bda38dfa451b9eb26e298" };
        firebase.initializeApp(FC);
        const db = firebase.database();

        // قراءة الـ ID من الرابط
        const urlP = new URLSearchParams(location.search);
        let RES_ID = urlP.get('id') || urlP.get('restaurantId') || urlP.get('r');

        // fallback: localStorage
        if (!RES_ID) { RES_ID = localStorage.getItem('argon_rid') || null; }
        else { localStorage.setItem('argon_rid', RES_ID); }

        let cart = [], resSettings = {};

        // ══════════════════════════════════════
        // INIT
        // ══════════════════════════════════════
        function init() {
            if (!RES_ID) {
                document.getElementById('loadTxt').textContent = 'رابط غير صحيح — المعرف مفقود ⚠️';
                return;
            }

            // Timeout 12 ثانية
            const timer = setTimeout(() => {
                document.getElementById('loadTxt').textContent = 'انتهت مهلة الاتصال — تحقق من إنترنتك 📶';
            }, 12000);

            // نستخدم .on('value') للتحديث الفوري (لو المطعم غير حالته)
            db.ref('restaurants/' + RES_ID).on('value', snap => {
                clearTimeout(timer);
                const data = snap.val();

                if (!data || !data.settings) {
                    document.getElementById('loadTxt').textContent = 'المطعم غير موجود ⚠️';
                    return;
                }

                resSettings = data.settings || {};
                const st = resSettings.status || 'open';

                // إخفاء التحميل
                const ls = document.getElementById('loadScreen');
                ls.style.opacity = '0'; ls.style.transition = '.3s';
                setTimeout(() => ls.style.display = 'none', 320);

                if (st === 'closed' || st === 'disabled') {
                    document.getElementById('closedScreen').style.display = 'flex';
                    document.getElementById('closed-msg').textContent = resSettings.welcomeMsg || 'يرجى المحاولة لاحقاً';
                    document.getElementById('mainContent').style.display = 'none';
                    return;
                }

                document.getElementById('closedScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('res-name').textContent = resSettings.name || 'المطعم';
                document.getElementById('res-msg').textContent = resSettings.welcomeMsg || 'أهلاً بك! اطلب من قائمتنا';
                document.title = (resSettings.name || 'المطعم') + ' — اطلب الآن';

                // تلوين حسب لون المطعم
                if (resSettings.color) {
                    document.documentElement.style.setProperty('--main', resSettings.color);
                }

                buildMenu(data.products || {});
            });
        }

        function buildMenu(products) {
            const grid = document.getElementById('menuGrid');
            const keys = Object.keys(products);
            if (!keys.length) {
                grid.innerHTML = '<div class="col-12 text-center py-5 text-muted"><i class="fas fa-utensils" style="font-size:3rem;opacity:.3;display:block;margin-bottom:14px"></i>القائمة فارغة حالياً</div>';
                return;
            }
            grid.innerHTML = keys.map(k => {
                const p = products[k];
                const inCart = cart.find(c => c.id === k);
                return `<div class="col-6 col-md-4">
          <div class="item-card p-2">
            <img src="${p.img || 'https://via.placeholder.com/150x110/f1f5f9/94a3b8?text=🍽'}"
              style="width:100%;height:110px;object-fit:cover;border-radius:13px"
              onerror="this.src='https://via.placeholder.com/150x110/f1f5f9/94a3b8?text=🍽'">
            <div class="p-1 mt-1">
              <h6 style="font-size:.88rem;font-weight:700;margin-bottom:3px">${p.name}</h6>
              <div style="color:var(--main);font-weight:900;font-size:.95rem;margin-bottom:6px">${parseFloat(p.price || 0).toFixed(2)} د.أ</div>
              <button class="add-btn ${inCart ? 'in-cart' : ''}" onclick="addToCart('${k}','${p.name.replace(/'/g, "\\'")}',${p.price || 0})">
                ${inCart ? `✓ في السلة (${inCart.qty})` : '+  أضف'}
              </button>
            </div>
          </div>
        </div>`;
            }).join('');
        }

        function addToCart(id, name, price) {
            const ex = cart.find(c => c.id === id);
            if (ex) ex.qty++;
            else cart.push({ id, name, price: parseFloat(price) || 0, qty: 1 });
            updateCartCount();
            toast(`✓ "${name}" أُضيف للسلة`);
            // إعادة رسم المنيو لتحديث الأزرار
            db.ref('restaurants/' + RES_ID + '/products').once('value', s => { buildMenu(s.val() || {}); });
        }
        function updateCartCount() {
            const n = cart.reduce((s, c) => s + c.qty, 0);
            const el = document.getElementById('cartCount');
            el.textContent = n;
            el.style.transform = 'scale(1.3)'; setTimeout(() => el.style.transform = '', 200);
        }

        function openModal() {
            if (!cart.length) { toast('سلة المشتريات فارغة!'); return; }
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('orderModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        function backToStep1() { document.getElementById('step1').style.display = 'block'; document.getElementById('step2').style.display = 'none'; }

        function goConfirm() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            if (!name || !phone) { toast('يرجى إدخال الاسم ورقم الهاتف'); return; }
            const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
            const rows = cart.map(c => `<div class="bill-item"><span>${c.name}${c.qty > 1 ? ` ×${c.qty}` : ''}</span><span class="fw-bold">${(c.price * c.qty).toFixed(2)} د.أ</span></div>`).join('');
            document.getElementById('billContent').innerHTML = `
        <h6 class="fw-bold border-bottom pb-2 mb-3">تفاصيل الفاتورة</h6>${rows}
        <div class="bill-total"><span>المجموع:</span><span>${total.toFixed(2)} د.أ</span></div>`;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function sendOrder() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const table = document.getElementById('tableNum').value.trim();
            const type = document.getElementById('orderType').value;
            const notes = document.getElementById('orderNotes').value;
            const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
            // items كنص واضح لسهولة العرض في الداش القديم
            const itemsStr = cart.map(c => c.qty > 1 ? `${c.name} ×${c.qty}` : c.name).join(' + ');
            const orderNo = '#' + Math.floor(1000 + Math.random() * 9000);
            const orderData = {
                custName: name || 'زبون', custPhone: phone,
                tableNum: table, orderType: type, notes,
                items: itemsStr,
                total: total.toFixed(2),
                orderNo, status: 'new',
                time: new Date().toLocaleTimeString('ar-JO', { hour: '2-digit', minute: '2-digit' }),
                date: new Date().toLocaleDateString('ar-JO'),
                timestamp: Date.now()
            };
            db.ref(`restaurants/${RES_ID}/orders`).push(orderData)
                .then(() => {
                    closeModal();
                    document.getElementById('mainContent').style.display = 'none';
                    document.getElementById('suc-id').textContent = 'رقم طلبك: ' + orderNo;
                    document.getElementById('suc-total').textContent = 'الإجمالي: ' + total.toFixed(2) + ' د.أ';
                    document.getElementById('successScreen').style.display = 'flex';
                    cart = []; updateCartCount();
                })
                .catch(e => {
                    toast('❌ خطأ في الإرسال: ' + e.message);
                    btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال الطلب';
                });
        }

        function resetPage() {
            document.getElementById('successScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            ['custName', 'custPhone', 'tableNum', 'orderNotes'].forEach(id => document.getElementById(id).value = '');
            window.scrollTo(0, 0);
        }

        function toggleTheme() {
            const b = document.body, btn = document.getElementById('themeBtn');
            if (b.getAttribute('data-theme') === 'light') { b.setAttribute('data-theme', 'dark'); btn.innerHTML = '<i class="fas fa-sun"></i> نهاري'; }
            else { b.setAttribute('data-theme', 'light'); btn.innerHTML = '<i class="fas fa-moon"></i> ليلي'; }
        }

        function toast(msg) {
            const w = document.getElementById('tw'), t = document.createElement('div');
            t.className = 'toastm'; t.textContent = msg; w.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 2500);
        }

        // إغلاق الـ modal بالضغط على الخلفية
        document.getElementById('orderModal').addEventListener('click', e => { if (e.target === document.getElementById('orderModal')) closeModal(); });

        init();
    </script>
</body>
</html>
