<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">طلب أونلاين</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #3b82f6; --bg: #0f172a; --card: rgba(255,255,255,0.05); --text: #ffffff; }
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; color: var(--text); transition: 0.4s; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; }
        .menu-item-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; height: 100%; overflow: hidden; }
        .menu-item-card:hover { transform: translateY(-5px); border-color: var(--main); }
        .menu-item-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .btn-add { background: var(--main); color: white; border: none; border-radius: 12px; padding: 8px; font-weight: bold; width: 100%; transition: 0.2s; }
        .cart-fab { position: fixed; bottom: 30px; left: 30px; background: var(--main); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); cursor: pointer; z-index: 999; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 24px; height: 24px; font-size: 13px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); transition: 0.3s; }
        .argon-powered { text-align: center; padding: 25px; font-size: 0.85rem; opacity: 0.7; margin-top: auto; }
        .cart-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<nav class="navbar p-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h5 id="restaurantName" class="fw-bold m-0 text-truncate" style="max-width: 200px;">جاري التحميل...</h5>
        <div class="badge bg-primary rounded-pill">منيو شركة أرغون</div>
    </div>
</nav>

<div class="container mb-5">
    <div id="itemsGrid" class="row g-3"></div>
</div>

<div class="cart-fab" onclick="toggleCart()">
    <i class="fas fa-shopping-basket"></i>
    <span class="cart-badge" id="cartCount">0</span>
</div>

<div class="argon-powered">
    Powered by <strong style="color: var(--main);">Argon Company</strong> &copy; 2026
</div>

<div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div id="modalContent" class="modal-content bg-dark text-white p-3">
            <div class="modal-header border-0">
                <h5 class="fw-bold">طلباتك الحالية 🛒</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="cartList"></div>
                <hr class="opacity-10">
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>الإجمالي:</span>
                    <span id="totalAmount">0 د.أ</span>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-primary w-100 py-3 rounded-4 fw-bold" onclick="startOrder()">إرسال الطلب للمطعم</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const resId = params.get("RestaurantId") || params.get("id") || "1"; 
    
    const DB = {
        sets: 'resSets_argon_' + resId,
        menu: 'menu_argon_' + resId,
        orders: 'orders_argon_' + resId
    };

    let cart = [];

    window.onload = () => {
        refreshAll();
        window.addEventListener('storage', (e) => {
            if (e.key === DB.menu || e.key === DB.sets) refreshAll();
        });
    };

    function refreshAll() {
        loadSettings();
        loadMenu();
    }

    function loadSettings() {
        const settings = JSON.parse(localStorage.getItem(DB.sets)) || {name: "مطعم غير معرف"};
        document.getElementById('restaurantName').innerText = settings.name;
        document.getElementById('pageTitle').innerText = settings.name + " - اطلب الآن";
    }

    function loadMenu() {
        const items = JSON.parse(localStorage.getItem(DB.menu)) || [];
        const container = document.getElementById('itemsGrid');
        
        if(items.length === 0) {
            container.innerHTML = '<div class="text-center mt-5 opacity-50">لا توجد وجبات متوفرة لهذا المطعم حالياً</div>';
            return;
        }

        container.innerHTML = items.map((it, idx) => `
            <div class="col-6 col-md-4">
                <div class="menu-item-card p-3 shadow-sm">
                    <img src="${it.img || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                    <h6 class="fw-bold mb-1 text-truncate">${it.name}</h6>
                    <div class="text-primary fw-bold mb-2">${it.price} د.أ</div>
                    <button class="btn-add" onclick="addToCart('${it.name}', ${it.price})">إضافة +</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(name, price) {
        cart.push({name, price});
        updateCartBadge();
    }

    function updateCartBadge() {
        document.getElementById('cartCount').innerText = cart.length;
    }

    function toggleCart() {
        if(cart.length === 0) return alert("سلتك فارغة!");
        const list = document.getElementById('cartList');
        list.innerHTML = cart.map((item, i) => `
            <div class="cart-item">
                <span class="small fw-bold">${item.name}</span>
                <div class="d-flex align-items-center">
                    <span class="me-3 fw-bold">${item.price} د.أ</span>
                    <i class="fas fa-trash text-danger" style="cursor:pointer" onclick="removeFromCart(${i})"></i>
                </div>
            </div>
        `).join('');

        const total = cart.reduce((sum, it) => sum + parseFloat(it.price), 0);
        document.getElementById('totalAmount').innerText = total.toFixed(2) + " د.أ";
        new bootstrap.Modal(document.getElementById('cartModal')).show();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartBadge();
        if(cart.length === 0) {
            bootstrap.Modal.getInstance(document.getElementById('cartModal')).hide();
        } else {
            toggleCart();
        }
    }

    function startOrder() {
        const fullName = prompt("يرجى إدخال اسمك:");
        if (!fullName) return;
        const phone = prompt("رقم الهاتف:");
        if (!phone) return;

        // 1. توليد رقم طلب عشوائي (Ticket Number)
        const orderTicket = Math.floor(1000 + Math.random() * 9000);

        const total = cart.reduce((sum, it) => sum + parseFloat(it.price), 0);
        const orderData = {
            ticket: orderTicket,
            customer: fullName,
            contact: phone,
            items: cart.map(i => i.name).join(' + '),
            total: total.toFixed(2),
            time: new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}),
            status: "جديد"
        };

        // 2. الحفظ في مخزن المطعم الصحيح
        let orders = JSON.parse(localStorage.getItem(DB.orders)) || [];
        orders.push(orderData);
        localStorage.setItem(DB.orders, JSON.stringify(orders));

        // 3. رسالة النجاح مع رقم الطلب والتنبيه بحفظه
        alert(`✅ تم إرسال طلبك بنجاح!\n\nرقم طلبك هو: [ ${orderTicket} ]\n\n⚠️ يرجى حفظ هذا الرقم لاستلام الطلب من المطعم.`);
        
        cart = [];
        updateCartBadge();
        bootstrap.Modal.getInstance(document.getElementById('cartModal')).hide();
    }
</script>
</body>
</html>
