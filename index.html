<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اطلب الآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --red: #d42818;
            --red2: #f03020;
            --warm: #fff8f4;
            --card: #ffffff;
            --border: #ede8e2;
            --text: #1a1208;
            --muted: #8a7c6a;
            --green: #1a9048;
            --gold: #c8941a;
            --shadow: rgba(180,60,0,.08)
        }

        body {
            font-family: 'Cairo',sans-serif;
            background: var(--warm);
            color: var(--text);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px
        }

        /* ─── LOADING ───────────────────────────────── */
        #loadScreen {
            position: fixed;
            inset: 0;
            background: var(--warm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999
        }

        .load-logo {
            font-size: 52px;
            margin-bottom: 16px;
            animation: bounce .8s infinite alternate
        }

        @keyframes bounce {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-12px)
            }
        }

        .load-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--red)
        }

        .load-dots {
            display: flex;
            gap: 8px;
            margin-top: 12px
        }

        .load-dot {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: dotpulse 1.2s infinite
        }

            .load-dot:nth-child(2) {
                animation-delay: .2s
            }

            .load-dot:nth-child(3) {
                animation-delay: .4s
            }

        @keyframes dotpulse {
            0%,80%,100% {
                transform: scale(0);
                opacity: .3
            }

            40% {
                transform: scale(1);
                opacity: 1
            }
        }

        /* ─── CLOSED ────────────────────────────────── */
        #closedScreen {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 40px
        }

        .closed-icon {
            font-size: 80px;
            margin-bottom: 24px
        }

        .closed-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--red);
            margin-bottom: 8px
        }

        .closed-sub {
            font-size: 15px;
            color: var(--muted)
        }

        /* ─── HEADER ────────────────────────────────── */
        #mainContent {
            display: none
        }

        header {
            background: var(--red);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(200,40,0,.2)
        }

        .hdr-inner {
            max-width: 860px;
            margin: 0 auto;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px
        }

        .hdr-logo {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .hdr-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900
        }

        .hdr-name {
            font-size: 17px;
            font-weight: 900
        }

        .cart-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 24px;
            padding: 8px 18px;
            cursor: pointer;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo',sans-serif;
            transition: .2s
        }

            .cart-btn:hover {
                background: rgba(255,255,255,.28)
            }

        .cart-count {
            background: #fff;
            color: var(--red);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900
        }

            .cart-count.bump {
                animation: bump .3s
            }

        @keyframes bump {
            0%,100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.4)
            }
        }

        /* ─── HERO ──────────────────────────────────── */
        .hero {
            background: linear-gradient(150deg,#d42818,#9a1808);
            color: #fff;
            padding: 32px 20px;
            position: relative;
            overflow: hidden
        }

            .hero::before {
                content: '';
                position: absolute;
                right: -40px;
                top: -40px;
                width: 200px;
                height: 200px;
                background: rgba(255,255,255,.05);
                border-radius: 50%
            }

            .hero::after {
                content: '';
                position: absolute;
                left: -20px;
                bottom: -30px;
                width: 140px;
                height: 140px;
                background: rgba(255,255,255,.04);
                border-radius: 50%
            }

        .hero-inner {
            max-width: 860px;
            margin: 0 auto;
            position: relative
        }

        .hero h1 {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 6px
        }

        .hero-msg {
            font-size: 14px;
            opacity: .85;
            margin-bottom: 16px
        }

        .hero-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 13px;
            opacity: .8
        }

            .hero-info span {
                display: flex;
                align-items: center;
                gap: 6px
            }

        /* ─── CONTAINER ─────────────────────────────── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 24px 16px
        }

        /* ─── ORDER INFO ─────────────────────────────── */
        .order-info-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 22px;
            box-shadow: 0 2px 12px var(--shadow)
        }

        .oib-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--red);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .oib-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

            .fg label {
                font-size: 12px;
                color: var(--muted);
                font-weight: 700
            }

        .fi {
            background: var(--warm);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: .2s;
            font-family: 'Cairo',sans-serif;
            width: 100%
        }

            .fi:focus {
                border-color: var(--red);
                background: #fff;
                box-shadow: 0 0 0 3px rgba(212,40,24,.06)
            }

            .fi::placeholder {
                color: #c0b8b0
            }

        /* ─── CATEGORIES ─────────────────────────────── */
        .cats {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 22px;
            scrollbar-width: none
        }

            .cats::-webkit-scrollbar {
                display: none
            }

        .cat {
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            white-space: nowrap;
            transition: .2s;
            flex-shrink: 0;
            font-family: 'Cairo',sans-serif
        }

            .cat:hover, .cat.on {
                background: var(--red);
                border-color: var(--red);
                color: #fff;
                box-shadow: 0 4px 12px rgba(212,40,24,.25)
            }

        /* ─── MENU ──────────────────────────────────── */
        .cat-section {
            margin-bottom: 28px
        }

        .cat-head {
            font-size: 17px;
            font-weight: 800;
            color: var(--red);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 14px
        }

        @media(max-width:520px) {
            .menu-grid {
                grid-template-columns: 1fr
            }
        }

        .mcard {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: .25s;
            cursor: pointer;
            position: relative;
            box-shadow: 0 2px 8px var(--shadow)
        }

            .mcard:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 24px rgba(180,60,0,.12);
                border-color: rgba(212,40,24,.2)
            }

            .mcard.unavail {
                opacity: .5;
                pointer-events: none
            }

        .mimg {
            height: 155px;
            background: linear-gradient(135deg,#fde8d8,#fbd0b8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            position: relative;
            overflow: hidden
        }

            .mimg img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                position: absolute;
                inset: 0
            }

        .mbody {
            padding: 14px
        }

        .mname {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px;
            line-height: 1.3
        }

        .mdesc {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 12px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .mfooter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px
        }

        .mprice {
            font-size: 17px;
            font-weight: 900;
            color: var(--red)
        }

        .madd-btn {
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Cairo',sans-serif;
            transition: .2s;
            flex-shrink: 0
        }

            .madd-btn:hover {
                background: var(--red2);
                transform: scale(1.05)
            }

            .madd-btn.in-cart {
                background: var(--green)
            }

        .unavail-tag {
            font-size: 11px;
            color: var(--muted);
            background: #f4f0ec;
            padding: 5px 12px;
            border-radius: 10px
        }

        .mcard-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--red);
            color: #fff;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 700
        }

        /* ─── CART OVERLAY ──────────────────────────── */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: .25s;
            backdrop-filter: blur(4px)
        }

            .cart-overlay.open {
                opacity: 1;
                pointer-events: all
            }

        .cart-panel {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 360px;
            background: #fff;
            z-index: 201;
            transform: translateX(-105%);
            transition: .3s cubic-bezier(.25,.46,.45,.94);
            display: flex;
            flex-direction: column;
            box-shadow: 6px 0 32px rgba(0,0,0,.12)
        }

        @media(max-width:400px) {
            .cart-panel {
                width: 100%
            }
        }

        .cart-panel.open {
            transform: translateX(0)
        }

        .cart-hdr {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .cart-title {
            font-size: 17px;
            font-weight: 800
        }

        .close-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--warm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            color: var(--muted);
            transition: .2s;
            font-family: 'Cairo',sans-serif
        }

            .close-btn:hover {
                background: var(--red);
                color: #fff;
                border-color: var(--red)
            }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px
        }

        .cart-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted)
        }

            .cart-empty i {
                font-size: 52px;
                margin-bottom: 14px;
                opacity: .25;
                display: block
            }

        .ci {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border)
        }

            .ci:last-child {
                border-bottom: none
            }

        .ci-info {
            flex: 1;
            min-width: 0
        }

        .ci-name {
            font-size: 14px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .ci-price {
            font-size: 13px;
            color: var(--red);
            font-weight: 700
        }

        .qty-ctrl {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0
        }

        .qb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--warm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: .2s;
            font-family: 'Cairo',sans-serif;
            color: var(--text)
        }

            .qb:hover {
                background: var(--red);
                color: #fff;
                border-color: var(--red)
            }

        .qn {
            font-size: 15px;
            font-weight: 800;
            min-width: 20px;
            text-align: center
        }

        .cart-foot {
            padding: 16px;
            border-top: 1px solid var(--border)
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px
        }

        .ct-lbl {
            font-size: 15px;
            font-weight: 700
        }

        .ct-val {
            font-size: 22px;
            font-weight: 900;
            color: var(--red)
        }

        .checkout-btn {
            width: 100%;
            padding: 16px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Cairo',sans-serif;
            transition: .3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

            .checkout-btn:hover:not(:disabled) {
                background: var(--red2);
                transform: translateY(-1px);
                box-shadow: 0 8px 20px rgba(212,40,24,.3)
            }

            .checkout-btn:disabled {
                background: #ddd;
                cursor: not-allowed;
                color: #aaa;
                transform: none;
                box-shadow: none
            }

        /* ─── SUCCESS ────────────────────────────────── */
        #successScreen {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 40px
        }

        .suc-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(26,144,72,.12);
            border: 3px solid var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin: 0 auto 24px;
            animation: pop .5s cubic-bezier(.17,.67,.38,1.45)
        }

        @keyframes pop {
            0% {
                transform: scale(0)
            }

            100% {
                transform: scale(1)
            }
        }

        .suc-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--green);
            margin-bottom: 8px
        }

        .suc-sub {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 24px
        }

        .suc-id {
            display: inline-block;
            background: rgba(26,144,72,.1);
            border: 1px solid rgba(26,144,72,.25);
            color: var(--green);
            padding: 10px 26px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 28px
        }

        .new-btn {
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Cairo',sans-serif;
            transition: .2s
        }

            .new-btn:hover {
                background: var(--red2)
            }

        /* ─── TOAST ─────────────────────────────────── */
        .toast-wrap {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none
        }

        .toast {
            background: #1a1208;
            color: #fff;
            border-radius: 24px;
            padding: 11px 22px;
            font-size: 13px;
            font-family: 'Cairo',sans-serif;
            opacity: 0;
            transform: translateY(16px);
            transition: .3s;
            white-space: nowrap
        }

            .toast.show {
                opacity: 1;
                transform: translateY(0)
            }
    </style>
</head>
<body>

    <div id="loadScreen">
        <div class="load-logo">🍽️</div>
        <div class="load-text">جاري تحميل القائمة...</div>
        <div class="load-dots"><div class="load-dot"></div><div class="load-dot"></div><div class="load-dot"></div></div>
    </div>

    <div id="closedScreen">
        <div class="closed-icon">🔒</div>
        <div class="closed-title">المطعم مغلق حالياً</div>
        <div class="closed-sub" id="closed-msg">يرجى المحاولة لاحقاً</div>
    </div>

    <div id="successScreen">
        <div class="suc-ring">✓</div>
        <div class="suc-title">تم استلام طلبك!</div>
        <div class="suc-sub">سيتم تحضير طلبك في أقرب وقت 🙏</div>
        <div class="suc-id" id="suc-id">طلب #——</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:24px" id="suc-total"></div>
        <button class="new-btn" onclick="resetPage()">⬅️ طلب جديد</button>
    </div>

    <div id="mainContent">
        <header>
            <div class="hdr-inner">
                <div class="hdr-logo">
                    <div class="hdr-icon" id="hdr-icon">🍽️</div>
                    <div class="hdr-name" id="hdr-name">المطعم</div>
                </div>
                <button class="cart-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-basket"></i> السلة
                    <span class="cart-count" id="cart-count">0</span>
                </button>
            </div>
        </header>

        <div class="hero">
            <div class="hero-inner">
                <h1 id="hero-title">أهلاً وسهلاً</h1>
                <div class="hero-msg" id="hero-msg">اطلب من قائمتنا الشهية</div>
                <div class="hero-info">
                    <span id="hero-hours"><i class="fas fa-clock"></i> 08:00 — 23:00</span>
                    <span id="hero-status" style="color:#a0ffb8"><i class="fas fa-check-circle"></i> نقبل الطلبات</span>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="order-info-box">
                <div class="oib-title"><i class="fas fa-user-circle"></i> بياناتك</div>
                <div class="oib-grid">
                    <div class="fg"><label><i class="fas fa-user"></i> اسمك</label><input class="fi" id="cust-name" placeholder="محمد أحمد"></div>
                    <div class="fg"><label><i class="fas fa-phone"></i> رقم هاتفك</label><input class="fi" id="cust-phone" placeholder="+96279xxxxxxx" dir="ltr"></div>
                    <div class="fg">
                        <label><i class="fas fa-tag"></i> نوع الطلب</label>
                        <select class="fi" id="order-type">
                            <option value="dine-in">🪑 داخل المطعم</option>
                            <option value="takeaway">🥡 تيك أواي</option>
                            <option value="delivery">🛵 توصيل</option>
                        </select>
                    </div>
                    <div class="fg"><label><i class="fas fa-chair"></i> رقم الطاولة</label><input class="fi" id="table-num" placeholder="مثال: 5" dir="ltr"></div>
                </div>
                <div class="fg" style="margin-top:12px"><label><i class="fas fa-sticky-note"></i> ملاحظات</label><input class="fi" id="order-notes" placeholder="أي طلبات خاصة..."></div>
            </div>

            <div class="cats" id="cats-row"></div>

            <div id="menu-content"></div>
        </div>
    </div>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-panel" id="cart-panel">
        <div class="cart-hdr">
            <div class="cart-title">🛒 سلة طلباتك</div>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-foot">
            <div class="cart-total-row"><span class="ct-lbl">الإجمالي</span><span class="ct-val" id="cart-total">0.00 JOD</span></div>
            <button class="checkout-btn" id="checkout-btn" onclick="doCheckout()" disabled><i class="fas fa-paper-plane"></i> إرسال الطلب</button>
        </div>
    </div>

    <div class="toast-wrap" id="tw"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const FC = { apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8", authDomain: "argon-system.firebaseapp.com", databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app", projectId: "argon-system" };
        firebase.initializeApp(FC);
        const db = firebase.database();
        const params = new URLSearchParams(location.search);
        const RID = params.get('id') || params.get('restaurantId');
        let cart = [], menu = {}, settings = {}, allCategories = [];

        async function init() {
            if (!RID) { document.getElementById('loadScreen').innerHTML = '<div style="text-align:center;padding:60px;font-family:Cairo,sans-serif"><div style="font-size:40px">⚠️</div><div style="margin-top:12px">رابط غير صحيح — يرجى استخدام الرابط الكامل</div></div>'; return; }
            try {
                const [setSnap, menuSnap] = await Promise.all([
                    db.ref(`restaurants/${RID}/settings`).once('value'),
                    db.ref(`restaurants/${RID}/menu`).once('value')
                ]);
                settings = setSnap.val() || {};
                menu = {}; menuSnap.forEach(c => { menu[c.key] = c.val(); });

                document.getElementById('loadScreen').style.opacity = '0';
                document.getElementById('loadScreen').style.transition = '.4s';
                setTimeout(() => { document.getElementById('loadScreen').style.display = 'none'; }, 420);

                if (settings.status === 'closed') {
                    const cs = document.getElementById('closedScreen'); cs.style.display = 'flex';
                    document.getElementById('closed-msg').textContent = settings.welcomeMsg || 'يرجى المحاولة لاحقاً خلال أوقات الدوام';
                    return;
                }

                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('hdr-icon').textContent = (settings.name || '🍽️').charAt(0);
                document.getElementById('hdr-name').textContent = settings.name || 'المطعم';
                document.getElementById('hero-title').textContent = settings.name || 'أهلاً وسهلاً';
                document.getElementById('hero-msg').textContent = settings.welcomeMsg || 'اطلب من قائمتنا الشهية';
                document.getElementById('hero-hours').innerHTML = `<i class="fas fa-clock"></i> ${settings.openTime || '08:00'} — ${settings.closeTime || '23:00'}`;
                document.getElementById('hero-status').innerHTML = settings.acceptOrders !== false ? '<i class="fas fa-check-circle"></i> نقبل الطلبات' : '<i class="fas fa-times-circle" style="color:#ffaaaa"></i> مغلق';
                document.title = (settings.name || 'المطعم') + ' — اطلب الآن';
                buildMenu();
            } catch (e) {
                document.getElementById('loadScreen').innerHTML = `<div style="text-align:center;padding:60px;font-family:Cairo,sans-serif"><div style="font-size:40px">⚠️</div><div style="margin-top:12px;color:#c00">خطأ في الاتصال</div></div>`;
            }
        }

        function buildMenu(filterCat = null) {
            const items = Object.entries(menu).filter(([, i]) => i.available !== false);
            const cats = [...new Set(items.map(([, i]) => i.category || 'أخرى').filter(Boolean))];
            allCategories = cats;

            const catsEl = document.getElementById('cats-row');
            catsEl.innerHTML = `<button class="cat ${!filterCat ? 'on' : ''}" onclick="buildMenu(null)">🍽️ الكل</button>` +
                cats.map(c => `<button class="cat ${filterCat === c ? 'on' : ''}" onclick="buildMenu('${c}')">${c}</button>`).join('');

            const shown = filterCat ? cats.filter(c => c === filterCat) : cats;
            const content = document.getElementById('menu-content');
            content.innerHTML = '';

            shown.forEach(cat => {
                const catItems = items.filter(([, i]) => (i.category || 'أخرى') === cat);
                if (!catItems.length) return;
                const sec = document.createElement('div'); sec.className = 'cat-section';
                sec.innerHTML = `<div class="cat-head"><i class="fas fa-tag"></i> ${cat}</div>
              <div class="menu-grid">${catItems.map(([k, i]) => {
                    const inCart = cart.find(c => c.id === k);
                    return `<div class="mcard" onclick="addToCart('${k}')">
                  <div class="mimg">${i.image ? `<img src="${i.image}" alt="${i.name}" onerror="this.style.display='none'">` : '🍽️'}</div>
                  <div class="mbody">
                    <div class="mname">${i.name}</div>
                    ${i.description ? `<div class="mdesc">${i.description}</div>` : ''}
                    <div class="mfooter">
                      <div class="mprice">${(i.price || 0).toFixed(2)} JOD</div>
                      <button class="madd-btn ${inCart ? 'in-cart' : ''}" onclick="event.stopPropagation();addToCart('${k}')">
                        ${inCart ? `✓ في السلة (${inCart.qty})` : '+  أضف'}
                      </button>
                    </div>
                  </div>
                </div>`;
                }).join('')}</div>`;
                content.appendChild(sec);
            });
            if (!items.length) { content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">لا توجد أصناف متاحة حالياً</div>'; }
        }

        // --- التكملة لإصلاح مشكلة وصول الطلبات ---

        window.toggleCart = () => {
            document.getElementById('cart-overlay').classList.toggle('open');
            document.getElementById('cart-panel').classList.toggle('open');
        };

        window.addToCart = (id) => {
            const item = menu[id];
            const existing = cart.find(c => c.id === id);
            if (existing) { existing.qty++; }
            else { cart.push({ id, name: item.name, price: item.price, qty: 1 }); }
            updateUI();
            showToast(`تم إضافة ${item.name}`);
        };

        function updateUI() {
            const list = document.getElementById('cart-items');
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('cart-count').textContent = count;
            document.getElementById('cart-count').classList.add('bump');
            setTimeout(() => document.getElementById('cart-count').classList.remove('bump'), 300);

            if (cart.length === 0) {
                list.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-basket"></i><p>السلة فارغة</p></div>';
                document.getElementById('checkout-btn').disabled = true;
            } else {
                list.innerHTML = cart.map((item, idx) => `
                        <div class="ci">
                            <div class="ci-info">
                                <div class="ci-name">${item.name}</div>
                                <div class="ci-price">${(item.price * item.qty).toFixed(2)} JOD</div>
                            </div>
                            <div class="qty-ctrl">
                                <button class="qb" onclick="changeQty(${idx}, -1)">-</button>
                                <span class="qn">${item.qty}</span>
                                <button class="qb" onclick="changeQty(${idx}, 1)">+</button>
                            </div>
                        </div>
                    `).join('');
                document.getElementById('checkout-btn').disabled = false;
            }
            document.getElementById('cart-total').textContent = total.toFixed(2) + " JOD";
            buildMenu();
        }

        window.changeQty = (idx, delta) => {
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            updateUI();
        };

        window.doCheckout = async () => {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            if (!name || !phone) { alert("يرجى إدخال الاسم ورقم الهاتف"); return; }

            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

            const orderID = Math.floor(1000 + Math.random() * 9000);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);

            const orderData = {
                orderID,
                customer: {
                    name, phone,
                    table: document.getElementById('table-num').value,
                    type: document.getElementById('order-type').value,
                    notes: document.getElementById('order-notes').value
                },
                items: cart,
                total: total,
                status: 'pending',
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            try {
                await db.ref(`restaurants/${RID}/orders`).push(orderData);
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('cart-panel').classList.remove('open');
                document.getElementById('cart-overlay').classList.remove('open');
                document.getElementById('successScreen').style.display = 'flex';
                document.getElementById('suc-id').textContent = `طلب #${orderID}`;
                document.getElementById('suc-total').textContent = `الإجمالي: ${total.toFixed(2)} JOD`;
            } catch (e) {
                alert("فشل الإرسال، حاول ثانية");
                btn.disabled = false;
                btn.innerHTML = 'إرسال الطلب';
            }
        };

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.getElementById('tw').appendChild(t);
            setTimeout(() => t.classList.add('show'), 100);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        window.resetPage = () => { location.reload(); };
        init();
    </script>
</body>
</html>
