<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON Medical OS — المختبر المركزي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="lab-styles.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sb-hdr">
            <div class="sb-logo"><i class="fas fa-microscope"></i></div>
            <div>
                <div class="sb-title" id="clinicName">جاري التحميل...</div>
                <div style="font-size:11px;color:var(--muted);font-weight:700">ARGON Laboratory</div>
            </div>
        </div>
        
        <div class="sb-nav">
            <div class="sb-item active" onclick="switchTab('queue')">
                <i class="fas fa-vials"></i><span style="flex:1">طلبات الفحص الحالية</span>
                <span class="sb-badge" id="qBadge">0</span>
            </div>
            <div class="sb-item" onclick="switchTab('catalog')"><i class="fas fa-list-alt"></i><span>قائمة الفحوصات (Catalog)</span></div>
        </div>
        
        <div class="sb-foot">
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
        </div>
    </aside>

    <!-- MAIN APP -->
    <main class="main-wrapper">
        <header class="topbar">
            <div class="page-title"><i class="fas fa-microscope" style="color:var(--purple)"></i> المختبر المركزي</div>
        </header>

        <div class="content-area">

            <!-- 1. QUEUE VIEW -->
            <section id="view-queue" class="view-section active">
                <div class="rx-grid" id="rxGrid">
                    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">جاري التحميل...</div>
                </div>
            </section>

            <!-- 2. CATALOG VIEW -->
            <section id="view-catalog" class="view-section">
                <div class="panel">
                    <div class="panel-hdr">
                        <div class="panel-title"><i class="fas fa-list-alt"></i> قائمة الفحوصات المخبرية</div>
                        <button class="btn btn-primary" onclick="openAddTest()"><i class="fas fa-plus"></i> إضافة فحص</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>اسم الفحص (الرمز)</th><th>المعدل الطبيعي (Range)</th><th>السعر</th><th>إجراءات</th></tr></thead>
                            <tbody id="catTbody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <!-- MODAL: ADD/EDIT TEST (CATALOG) -->
    <div class="modal-bg" id="tstModal">
        <div class="modal">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                <div style="font-size:16px;font-weight:800;color:var(--text)"><i class="fas fa-vial"></i> إضافة / تعديل فحص</div>
                <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px" onclick="closeModal('tstModal')"><i class="fas fa-times"></i></button>
            </div>
            <input type="hidden" id="tstId">
            <div class="fg"><label>اسم الفحص *</label><input type="text" class="fi" id="tstName" placeholder="مثال: Complete Blood Count"></div>
            <div class="fg"><label>الرمز (Code)</label><input type="text" class="fi" id="tstCode" placeholder="مثال: CBC" dir="ltr"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="fg"><label>المعدل الطبيعي (Normal Range)</label><input type="text" class="fi" id="tstRange" dir="ltr" placeholder="4.5 - 10.0"></div>
                <div class="fg"><label>الوحدة (Unit)</label><input type="text" class="fi" id="tstUnit" dir="ltr" placeholder="10^3/uL"></div>
            </div>
            <div class="fg" style="margin-top:12px"><label>السعر (JOD)</label><input type="number" step="0.01" class="fi" id="tstPrice"></div>
            
            <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px">
                <button class="btn btn-outline" onclick="closeModal('tstModal')">إلغاء</button>
                <button class="btn btn-primary" onclick="saveTest()"><i class="fas fa-save"></i> حفظ</button>
            </div>
        </div>
    </div>

    <!-- MODAL: RESULT ENTRY -->
    <div class="modal-bg" id="resModal">
        <div class="modal" style="width:600px;max-width:95%">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                <div style="font-size:16px;font-weight:800;color:var(--text)"><i class="fas fa-microscope"></i> إدخال نتائج الفحوصات</div>
                <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px" onclick="closeModal('resModal')"><i class="fas fa-times"></i></button>
            </div>
            
            <div style="padding:12px;background:var(--purple-l);color:var(--purple);border-radius:12px;margin-bottom:16px;font-weight:800">
                <i class="fas fa-user"></i> المريض: <span id="resPtName"></span>
            </div>

            <!-- Test Selector -->
            <div style="display:flex;gap:10px;margin-bottom:16px">
                <select class="fi" id="resTestSelect" style="flex:1"></select>
                <button class="btn btn-outline" style="color:var(--purple);border-color:var(--purple)" onclick="addResultRow()"><i class="fas fa-plus"></i> إضافة للنتيجة</button>
            </div>

            <!-- Active Results Grid -->
            <div class="result-grid" id="activeResults">
                <!-- Rows injected here -->
            </div>

            <div class="fg">
                <label>ملاحظات فني المختبر</label>
                <textarea class="fi fi-area" id="resNotes" placeholder="أضف أي ملاحظات إضافية حول العينة أو النتائج..."></textarea>
            </div>

            <div class="fg" style="margin-top:16px">
                <label>توجيه المريض بعد النتائج</label>
                <select class="fi" id="resAction">
                    <option value="doctor">عودة إلى الطبيب (تحويل لغرفة الانتظار بأولوية عالية)</option>
                    <option value="completed">إنهاء (النتائج جاهزة والمريض يغادر)</option>
                </select>
            </div>

            <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:24px">
                <button class="btn btn-outline" onclick="closeModal('resModal')">إلغاء</button>
                <button class="btn btn-primary" onclick="saveResults()"><i class="fas fa-check-double"></i> حفظ وإرسال النتائج</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="argon-medical-core.js"></script>
    <script src="lab-app.js"></script>
</body>
</html>
