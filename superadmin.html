<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أرغون OS | نظام الإدارة العليا المدمج</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f1f5f9; /* ثيم فاتح واحترافي */
            --card: #ffffff;
            --text: #1e293b;
            --sidebar: #0f172a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
        }

        /* شاشة الدخول */
        #superLoginPage {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        .login-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* الهيكل الرئيسي */
        #superWrapper {
            display: none;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar);
            padding: 20px;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

            .nav-link:hover, .nav-link.active {
                background: rgba(59, 130, 246, 0.1);
                color: var(--primary);
            }

        /* بطاقة المطعم المحدثة */
        .restaurant-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-right: 5px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .stat-badge {
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #64748b;
            border: 1px solid #e2e8f0;
            margin-left: 5px;
        }

        .link-box {
            background: #f8fafc;
            padding: 8px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #2563eb;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            border: 1px dashed #cbd5e1;
        }

        .status-toggle {
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            border: none;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #cbd5e1 !important;
        }

        .section {
            display: none;
        }

            .section.active {
                display: block;
            }
    </style>
</head>
<body>

    <div id="superLoginPage">
        <div class="login-box">
            <h2 class="fw-black text-primary mb-2">ARGON OS</h2>
            <p class="text-muted mb-4 small">مركز التحكم في النظام</p>
            <input type="text" id="adminUser" class="form-control mb-3" placeholder="اسم المستخدم">
            <input type="password" id="adminPass" class="form-control mb-4" placeholder="كلمة المرور">
            <button class="btn btn-primary w-100 py-2 fw-bold rounded-pill" onclick="accessSuperAdmin()">دخول النظام</button>
        </div>
    </div>

    <div id="superWrapper">
        <div class="sidebar">
            <h3 class="text-primary fw-black text-center mb-5">ARGON</h3>
            <div class="nav-link active" onclick="showSection('active-sec', this)"><i class="fas fa-store me-2"></i> المطاعم النشطة</div>
            <div class="nav-link" onclick="showSection('add-sec', this)"><i class="fas fa-plus me-2"></i> إضافة مطعم جديد</div>
            <div class="nav-link text-danger mt-auto" onclick="location.reload()"><i class="fas fa-sign-out-alt me-2"></i> تسجيل خروج</div>
        </div>

        <div class="main-content">
            <div id="active-sec" class="section active">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">إدارة الشبكة</h3>
                    <span id="resCount" class="badge bg-primary rounded-pill">0 مطاعم</span>
                </div>
                <div id="activeList"></div>
            </div>

            <div id="add-sec" class="section">
                <h3 class="fw-bold mb-4">تجهيز مطعم جديد</h3>
                <div class="card border-0 shadow-sm p-4" style="max-width: 450px; border-radius: 20px;">
                    <div class="mb-3">
                        <label class="small fw-bold">ID المطعم (رقمي)</label>
                        <input type="text" id="newId" class="form-control" placeholder="مثلاً: 105">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">اسم المطعم</label>
                        <input type="text" id="newName" class="form-control" placeholder="أدخل الاسم التجاري">
                    </div>
                    <div class="mb-4">
                        <label class="small fw-bold">كلمة مرور اللوحة</label>
                        <input type="text" id="newPass" class="form-control" value="123456">
                    </div>
                    <button class="btn btn-primary w-100 py-2 fw-bold shadow" onclick="createNewRestaurant()">حفظ وإنشاء النظام</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8",
            authDomain: "argon-system.firebaseapp.com",
            projectId: "argon-system",
            databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const GITHUB_BASE = "https://argonforfun-source.github.io/argon-system/";

        function accessSuperAdmin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if (u === "admin" && p === "123456") {
                document.getElementById('superLoginPage').style.display = "none";
                document.getElementById('superWrapper').style.display = "flex";
                loadData();
            } else { alert("البيانات غير صحيحة!"); }
        }

        function loadData() {
            db.ref('restaurants').on('value', (snap) => {
                const list = document.getElementById('activeList');
                const resCount = document.getElementById('resCount');
                list.innerHTML = "";
                let count = 0;

                snap.forEach((child) => {
                    count++;
                    const id = child.key;
                    const data = child.val();
                    const settings = data.settings || {};
                    const isClosed = settings.status === "closed";

                    const ordersCount = data.completedOrders ? Object.keys(data.completedOrders).length : 0;
                    const productsCount = data.products ? Object.keys(data.products).length : 0;

                    const menuUrl = `${GITHUB_BASE}index.html?id=${id}`;
                    const dashUrl = `${GITHUB_BASE}dashboard.html?id=${id}`;

                    list.innerHTML += `
                            <div class="restaurant-card" style="border-right-color: ${isClosed ? '#ef4444' : '#3b82f6'}">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="w-75">
                                        <div class="d-flex align-items-center mb-2">
                                            <h5 class="fw-bold mb-0 me-3">${settings.name || 'بدون اسم'}</h5>
                                            <button class="status-toggle ${isClosed ? 'bg-danger text-white' : 'bg-success text-white'}"
                                                    onclick="toggleStatus('${id}', '${settings.status}')">
                                                ${isClosed ? 'متوقف' : 'يعمل'}
                                            </button>
                                        </div>
                                        <div class="mb-3">
                                            <span class="stat-badge">ID: ${id}</span>
                                            <span class="stat-badge"><i class="fas fa-box"></i> ${productsCount} صنف</span>
                                            <span class="stat-badge"><i class="fas fa-check-circle"></i> ${ordersCount} طلب</span>
                                        </div>
                                        <div class="link-box">
                                            <span>المنيو: ${menuUrl}</span>
                                            <i class="fas fa-copy cursor-pointer" onclick="copyText('${menuUrl}')"></i>
                                        </div>
                                        <div class="link-box">
                                            <span>اللوحة: ${dashUrl}</span>
                                            <i class="fas fa-copy cursor-pointer" onclick="copyText('${dashUrl}')"></i>
                                        </div>
                                    </div>
                                    <div class="text-end">
                                        <button class="btn btn-sm btn-outline-primary mb-2 d-block w-100" onclick="window.open('${dashUrl}', '_blank')">فتح اللوحة</button>
                                        <button class="btn btn-sm btn-outline-danger d-block w-100" onclick="deleteRes('${id}')">حذف</button>
                                    </div>
                                </div>
                            </div>`;
                });
                resCount.innerText = count + " مطاعم";
            });
        }

        function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === "closed" ? "open" : "closed";
            db.ref(`restaurants/${id}/settings`).update({ status: newStatus });
        }

        function createNewRestaurant() {
            const id = document.getElementById('newId').value;
            const name = document.getElementById('newName').value;
            const password = document.getElementById('newPass').value;
            if (id && name) {
                db.ref('restaurants/' + id + '/settings').set({
                    name: name,
                    password: password,
                    status: "open",
                    created_at: new Date().toISOString()
                }).then(() => {
                    alert("تمت الإضافة وتوليد الروابط");
                    showSection('active-sec', document.querySelector('.nav-link'));
                });
            } else { alert("يرجى إكمال البيانات"); }
        }

        function deleteRes(id) {
            if (confirm('سيتم حذف كافة بيانات المطعم، هل أنت متأكد؟')) {
                db.ref('restaurants/' + id).remove();
            }
        }

        function copyText(txt) {
            navigator.clipboard.writeText(txt);
            alert("تم نسخ الرابط!");
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
