<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أرغون OS | نظام الإدارة العليا</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f8fafc; /* خلفية فاتحة */
            --card: #ffffff; /* بطاقات بيضاء */
            --text: #1e293b; /* نصوص داكنة */
            --sidebar: #0f172a; /* بقاء السايدبار داكن للأناقة */
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
        }

        /* شاشة الدخول المعدلة للثيم الفاتح */
        #superLoginPage {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
        }

        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        #superWrapper {
            display: none;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar);
            padding: 20px;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

            .nav-link:hover, .nav-link.active {
                background: rgba(59, 130, 246, 0.1);
                color: var(--primary);
            }

        /* بطاقة المطعم بالثيم الأبيض */
        .restaurant-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-right: 5px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border-top: 1px solid #f1f5f9;
            border-bottom: 1px solid #f1f5f9;
            border-left: 1px solid #f1f5f9;
            transition: 0.3s;
        }

        .status-btn {
            font-size: 0.8rem;
            padding: 3px 14px;
            border-radius: 20px;
            font-weight: bold;
            border: none;
            margin-right: 10px;
        }

        /* حقول الإدخال للثيم الأبيض */
        .form-control {
            background: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #1e293b !important;
            border-radius: 10px;
            padding: 12px;
        }

        .section {
            display: none;
        }

            .section.active {
                display: block;
            }

        .text-muted {
            color: #64748b !important;
        }
    </style>
</head>
<body>

    <div id="superLoginPage">
        <div class="login-box">
            <h2 class="fw-black text-primary mb-4">ARGON OS</h2>
            <input type="text" id="adminUser" class="form-control mb-3" placeholder="اسم المستخدم (admin)">
            <input type="password" id="adminPass" class="form-control mb-4" placeholder="كلمة المرور (123456)">
            <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm" onclick="accessSuperAdmin()">دخول النظام</button>
        </div>
    </div>

    <div id="superWrapper">
        <div class="sidebar">
            <h3 class="text-primary fw-black text-center mb-5">ARGON</h3>
            <div class="nav-link active" onclick="showSection('active-sec', this)"><i class="fas fa-store me-2"></i> المطاعم النشطة</div>
            <div class="nav-link" onclick="showSection('add-sec', this)"><i class="fas fa-plus me-2"></i> إضافة مطعم</div>
            <div class="nav-link text-danger mt-auto" onclick="location.reload()"><i class="fas fa-sign-out-alt me-2"></i> تسجيل خروج</div>
        </div>
        <div class="main-content">
            <div id="active-sec" class="section active">
                <h3 class="fw-bold mb-4">إدارة الشبكة</h3>
                <div id="activeList"></div>
            </div>
            <div id="add-sec" class="section">
                <h3 class="fw-bold mb-4">إضافة مطعم جديد</h3>
                <div class="card border-0 shadow-sm p-4" style="max-width: 450px; border-radius: 20px;">
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">ID المطعم</label>
                        <input type="text" id="newId" class="form-control" placeholder="أدخل الرقم التعريفي">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">اسم المطعم</label>
                        <input type="text" id="newName" class="form-control" placeholder="اسم المنشأة">
                    </div>
                    <div class="mb-4">
                        <label class="small fw-bold mb-1">كلمة المرور الافتراضية</label>
                        <input type="text" id="newPass" class="form-control" value="123456">
                    </div>
                    <button class="btn btn-primary w-100 py-2 fw-bold" onclick="createNewRestaurant()">حفظ البيانات</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8",
            authDomain: "argon-system.firebaseapp.com",
            projectId: "argon-system",
            storageBucket: "argon-system.firebasestorage.app",
            messagingSenderId: "858120444233",
            appId: "1:858120444233:web:4bda38dfa451b9eb26e298",
            databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function accessSuperAdmin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if (u === "admin" && p === "123456") {
                document.getElementById('superLoginPage').style.display = "none";
                document.getElementById('superWrapper').style.display = "flex";
                loadData();
            } else {
                alert("البيانات غير صحيحة!");
            }
        }

        function loadData() {
            db.ref('restaurants').on('value', (snap) => {
                const list = document.getElementById('activeList');
                list.innerHTML = "";
                snap.forEach((child) => {
                    const id = child.key;
                    const val = child.val().settings || {};
                    const status = val.status || "active";
                    const isClosed = status === "closed";

                    list.innerHTML += `
                            <div class="restaurant-card" style="border-right-color: ${isClosed ? '#ef4444' : '#3b82f6'}">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="mb-1 fw-bold">${val.name || 'بدون اسم'}</h5>
                                        <div class="d-flex align-items-center">
                                            <button class="status-btn ${isClosed ? 'bg-danger text-white' : 'bg-success text-white'}"
                                                    onclick="toggleStatus('${id}', '${status}')">
                                                ${isClosed ? 'متوقف' : 'يعمل حالياً'}
                                            </button>
                                            <small class="text-muted">ID: ${id}</small>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-sm btn-outline-primary" onclick="window.open('dashboard.html?id=${id}', '_blank')">اللوحة</button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteRestaurant('${id}')"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </div>`;
                });
            });
        }

        function toggleStatus(id, currentStatus) {
            const newStatus = (currentStatus === "active" || currentStatus === "open") ? "closed" : "active";
            db.ref(`restaurants/${id}/settings`).update({ status: newStatus });
        }

        function deleteRestaurant(id) {
            if (confirm("هل أنت متأكد من حذف هذا المطعم وكافة بياناته؟")) {
                db.ref('restaurants/' + id).remove();
            }
        }

        function createNewRestaurant() {
            const id = document.getElementById('newId').value;
            const name = document.getElementById('newName').value;
            const password = document.getElementById('newPass').value;
            if (id && name) {
                db.ref('restaurants/' + id + '/settings').set({
                    name: name,
                    password: password,
                    status: "active"
                })
                    .then(() => {
                        alert("تمت إضافة المطعم بنجاح");
                        showSection('active-sec', document.querySelector('.nav-link'));
                    });
            } else {
                alert("يرجى ملء كافة الحقول");
            }
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
