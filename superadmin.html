<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السوبر أدمن - نظام أرغون</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* حافظت على تصميمك الفاخر بالكامل */
        :root {
            --gold: #d4a843;
            --bg: #06060f;
            --card: #0d0d1a;
            --border: #1c1c2e;
            --text: #ede8f5;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #131326;
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-add {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

            .btn-add:hover {
                transform: translateY(-3px);
                box-shadow: 0 5px 15px rgba(212,168,67,0.3);
            }

        .restaurant-item {
            background: #131326;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .links-area {
            margin-top: 10px;
            background: #06060f;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--gold);
        }

        .link-text {
            color: var(--gold);
            font-size: 0.85rem;
            cursor: pointer;
            display: block;
            margin: 5px 0;
        }

            .link-text:hover {
                text-decoration: underline;
            }

        .badge {
            background: #28c070;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; color: var(--gold);"><i class="fas fa-crown"></i> لوحة التحكم بالسوبر أدمن</h2>
            <p style="text-align: center; font-size: 14px;">إضافة مطاعم جديدة وتوليد روابط المنيو العالمية</p>

            <div class="input-group">
                <label>رقم المطعم المميز (ID)</label>
                <input type="text" id="res-id" placeholder="مثال: amir1 أو 101">
            </div>
            <div class="input-group">
                <label>اسم المطعم</label>
                <input type="text" id="res-name" placeholder="أدخل اسم المطعم الكامل">
            </div>
            <div class="input-group">
                <label>رابط الشعار (Logo URL)</label>
                <input type="text" id="res-logo" placeholder="ضع رابط الصورة هنا">
            </div>
            <button class="btn-add" onclick="createNewRestaurant()">تثبيت المطعم وتوليد الروابط <i class="fas fa-plus-circle"></i></button>
        </div>

        <div class="card">
            <h3><i class="fas fa-store"></i> المطاعم المسجلة في النظام</h3>
            <div id="restaurants-display">
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            databaseURL: "https://argonforfun-source-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // جلب الرابط الأساسي للموقع (Netlify) تلقائياً
        const siteUrl = window.location.origin;

        // وظيفة إضافة المطعم مع ضمان ثبات البيانات
        function createNewRestaurant() {
            const id = document.getElementById('res-id').value.trim();
            const name = document.getElementById('res-name').value.trim();
            const logo = document.getElementById('res-logo').value.trim();

            if (!id || !name) {
                alert("الرجاء إدخال رقم واسم المطعم!");
                return;
            }

            // المسار الموحد لضمان قراءة المنيو والداش بورد
            const restaurantData = {
                settings: {
                    name: name,
                    logo: logo || "default_logo.png",
                    status: "open",
                    currency: "JOD",
                    id: id
                },
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            // التثبيت في قاعدة البيانات
            db.ref('restaurants/' + id).set(restaurantData)
                .then(() => {
                    alert("تم تثبيت مطعم " + name + " بنجاح!");
                    document.getElementById('res-id').value = '';
                    document.getElementById('res-name').value = '';
                    document.getElementById('res-logo').value = '';
                })
                .catch((error) => {
                    alert("خطأ في التثبيت: " + error.message);
                });
        }

        // عرض المطاعم وتوليد الروابط التي تفتح من أي مكان
        db.ref('restaurants').on('value', (snapshot) => {
            const display = document.getElementById('restaurants-display');
            display.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                display.innerHTML = '<p style="text-align:center; opacity:0.5;">لا يوجد مطاعم مضافة حالياً</p>';
                return;
            }

            for (let id in data) {
                const res = data[id].settings;
                if (!res) continue;

                // توليد الروابط العالمية
                const menuLink = `${siteUrl}/index.html?id=${id}`;
                const dashboardLink = `${siteUrl}/dashboard.html?id=${id}`;

                display.innerHTML += `
                    <div class="restaurant-item">
                        <div style="flex: 1;">
                            <span class="badge">نشط</span>
                            <h4 style="margin: 10px 0 5px 0;">${res.name} <small>(ID: ${id})</small></h4>

                            <div class="links-area">
                                <span class="link-text" onclick="copyLink('${menuLink}')">
                                    <i class="fas fa-external-link-alt"></i> رابط المنيو: ${menuLink}
                                </span>
                                <span class="link-text" onclick="copyLink('${dashboardLink}')" style="color: #28c070;">
                                    <i class="fas fa-user-shield"></i> رابط اللوحة: ${dashboardLink}
                                </span>
                            </div>
                        </div>
                        <button onclick="deleteRestaurant('${id}')" style="background:none; border:none; color:#ff4d4d; cursor:pointer; padding:10px;">
                            <i class="fas fa-trash-alt fa-lg"></i>
                        </button>
                    </div>
                `;
            }
        });

        function copyLink(text) {
            navigator.clipboard.writeText(text);
            alert("تم نسخ الرابط! يمكنك الآن إرساله أو وضعه في الباركود.");
        }

        function deleteRestaurant(id) {
            if (confirm("هل أنت متأكد من حذف هذا المطعم نهائياً من النظام؟")) {
                db.ref('restaurants/' + id).remove();
            }
        }
    </script>

</body>
</html>
