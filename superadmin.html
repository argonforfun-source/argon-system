<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON OS — المركز الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --g1: #d4a843;
            --g2: #f5cc6a;
            --g3: #a07820;
            --bg: #06060f;
            --card: #0d0d1a;
            --card2: #131320;
            --border: #1c1c2e;
            --text: #ede8f5;
            --muted: #5a5470;
            --red: #e84050;
            --green: #28c070;
            --blue: #4888f0
        }

        body {
            font-family: 'Cairo',sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

            body::after {
                content: '';
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse 80% 50% at 50% -10%,rgba(212,168,67,.08) 0%,transparent 60%);
                pointer-events: none;
                z-index: 0
            }

        #loginPage {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            background: var(--bg)
        }

        .lp-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 60% at 50% 30%,rgba(212,168,67,.1) 0%,transparent 70%)
        }

        .login-card {
            position: relative;
            width: 400px;
            background: linear-gradient(145deg,rgba(18,18,30,.98),rgba(12,12,22,.98));
            border: 1px solid rgba(212,168,67,.25);
            border-radius: 28px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,.7),inset 0 0 0 1px rgba(212,168,67,.05)
        }

        .login-logo {
            font-size: 11px;
            letter-spacing: 8px;
            color: var(--g1);
            font-weight: 700;
            margin-bottom: 8px;
            opacity: .7
        }

        .login-title {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg,var(--g1),var(--g2),var(--g1));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px
        }

        .login-div {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg,transparent,var(--g1),transparent);
            margin: 0 auto 28px
        }

        .li {
            display: block;
            width: 100%;
            background: rgba(255,255,255,.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: .3s;
            font-family: 'Cairo',sans-serif;
            text-align: center;
            margin-bottom: 14px
        }

            .li:focus {
                border-color: rgba(212,168,67,.5);
                background: rgba(212,168,67,.05);
                box-shadow: 0 0 0 4px rgba(212,168,67,.06)
            }

            .li::placeholder {
                color: var(--muted)
            }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg,var(--g3),var(--g1),var(--g2));
            border: none;
            border-radius: 14px;
            color: #000;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Cairo',sans-serif;
            transition: .3s;
            letter-spacing: .5px
        }

            .login-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 30px rgba(212,168,67,.35)
            }

        .login-err {
            color: var(--red);
            font-size: 13px;
            margin-top: 12px;
            display: none
        }

        @keyframes shake {
            0%,100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        .shake {
            animation: shake .3s
        }

        #mainApp {
            display: none;
            min-height: 100vh;
            position: relative;
            z-index: 1
        }

        .hdr {
            background: rgba(10,10,20,.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 66px
        }

        .hdr-logo {
            display: flex;
            align-items: center;
            gap: 14px
        }

        .hdr-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg,var(--g3),var(--g1));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            color: #000;
            letter-spacing: -1px
        }

        .hdr-name {
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg,var(--g1),var(--g2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .hdr-sub {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
            margin-top: -2px
        }

        .hdr-right {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .hdr-clock {
            font-size: 13px;
            color: var(--muted);
            font-family: monospace;
            direction: ltr;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px
        }

        .hdr-badge {
            background: rgba(212,168,67,.1);
            border: 1px solid rgba(212,168,67,.2);
            color: var(--g1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700
        }

        .btn-x {
            padding: 7px 16px;
            border-radius: 10px;
            border: 1px solid;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Cairo',sans-serif;
            font-weight: 600;
            transition: .2s
        }

        .btn-danger {
            background: rgba(232,64,80,.1);
            border-color: rgba(232,64,80,.2);
            color: var(--red)
        }

            .btn-danger:hover {
                background: rgba(232,64,80,.2)
            }

        .body {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 24px
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 16px;
            margin-bottom: 28px
        }

        .sc {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            transition: .3s;
            cursor: default
        }

            .sc:hover {
                transform: translateY(-3px);
                border-color: rgba(212,168,67,.2);
                box-shadow: 0 12px 30px rgba(0,0,0,.3)
            }

        .sc-icon {
            width: 46px;
            height: 46px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 14px
        }

        .sc-num {
            font-size: 38px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 5px
        }

        .sc-lbl {
            font-size: 13px;
            color: var(--muted)
        }

        .sg .sc-icon {
            background: rgba(212,168,67,.12);
            color: var(--g1)
        }

        .sg .sc-num {
            color: var(--g1)
        }

        .sr .sc-icon {
            background: rgba(232,64,80,.1);
            color: var(--red)
        }

        .sr .sc-num {
            color: var(--red)
        }

        .sgr .sc-icon {
            background: rgba(40,192,112,.1);
            color: var(--green)
        }

        .sgr .sc-num {
            color: var(--green)
        }

        .sb .sc-icon {
            background: rgba(72,136,240,.1);
            color: var(--blue)
        }

        .sb .sc-num {
            color: var(--blue)
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px
        }

        .ph {
            background: var(--card2);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border)
        }

        .pt {
            font-size: 15px;
            font-weight: 700;
            color: var(--g1);
            display: flex;
            align-items: center;
            gap: 10px
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 14px;
            padding: 22px 24px;
            border-bottom: 1px solid var(--border)
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 7px
        }

            .fg label {
                font-size: 12px;
                color: var(--muted);
                font-weight: 700;
                letter-spacing: .3px;
                display: flex;
                align-items: center;
                gap: 5px
            }

        .fi {
            background: rgba(255,255,255,.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: .3s;
            font-family: 'Cairo',sans-serif;
            width: 100%
        }

            .fi:focus {
                border-color: rgba(212,168,67,.4);
                background: rgba(212,168,67,.03);
                box-shadow: 0 0 0 3px rgba(212,168,67,.05)
            }

            .fi::placeholder {
                color: var(--muted)
            }

        .factions {
            padding: 16px 24px;
            display: flex;
            gap: 10px
        }

        .btn {
            padding: 11px 22px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo',sans-serif;
            transition: .3s;
            display: inline-flex;
            align-items: center;
            gap: 8px
        }

        .btn-gold {
            background: linear-gradient(135deg,var(--g3),var(--g1));
            color: #000
        }

            .btn-gold:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(212,168,67,.3)
            }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted)
        }

            .btn-outline:hover {
                border-color: rgba(212,168,67,.3);
                color: var(--g1)
            }

        .btn-sm {
            padding: 7px 14px;
            font-size: 12px;
            border-radius: 9px
        }

        .filter-row {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap
        }

        .srch {
            flex: 1;
            min-width: 180px;
            background: rgba(255,255,255,.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 14px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: 'Cairo',sans-serif;
            transition: .2s
        }

            .srch:focus {
                border-color: rgba(212,168,67,.3)
            }

            .srch::placeholder {
                color: var(--muted)
            }

        .fb {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo',sans-serif;
            transition: .2s
        }

            .fb:hover, .fb.on {
                background: rgba(212,168,67,.1);
                border-color: rgba(212,168,67,.3);
                color: var(--g1)
            }

        .tbl-wrap {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th {
            background: rgba(255,255,255,.02);
            padding: 12px 18px;
            text-align: right;
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border)
        }

        td {
            padding: 15px 18px;
            border-bottom: 1px solid rgba(28,28,46,.5);
            font-size: 14px;
            vertical-align: middle
        }

        tr:last-child td {
            border-bottom: none
        }

        tr:hover td {
            background: rgba(212,168,67,.015)
        }

        .rav {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .ra {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            font-weight: 900;
            color: #000;
            flex-shrink: 0
        }

        .rname {
            font-weight: 700
        }

        .rid {
            font-size: 11px;
            color: var(--muted);
            font-family: monospace;
            direction: ltr
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700
        }

            .badge::before {
                content: '';
                width: 6px;
                height: 6px;
                border-radius: 50%
            }

        .bon {
            background: rgba(40,192,112,.1);
            color: var(--green);
            border: 1px solid rgba(40,192,112,.2)
        }

            .bon::before {
                background: var(--green)
            }

        .boff {
            background: rgba(232,64,80,.1);
            color: var(--red);
            border: 1px solid rgba(232,64,80,.2)
        }

            .boff::before {
                background: var(--red)
            }

        .acts {
            display: flex;
            gap: 6px;
            flex-wrap: wrap
        }

        .ab {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo',sans-serif;
            transition: .2s;
            display: inline-flex;
            align-items: center;
            gap: 5px
        }

            .ab:hover {
                background: var(--card2);
                color: var(--text);
                border-color: rgba(212,168,67,.3)
            }

            .ab.ag {
                border-color: rgba(212,168,67,.3);
                color: var(--g1);
                background: rgba(212,168,67,.05)
            }

                .ab.ag:hover {
                    background: rgba(212,168,67,.15)
                }

            .ab.ar {
                border-color: rgba(232,64,80,.2);
                color: var(--red)
            }

                .ab.ar:hover {
                    background: rgba(232,64,80,.1)
                }

            .ab.agr {
                border-color: rgba(40,192,112,.2);
                color: var(--green)
            }

                .ab.agr:hover {
                    background: rgba(40,192,112,.08)
                }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: .25s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px)
        }

            .modal-bg.open {
                opacity: 1;
                pointer-events: all
            }

        .modal {
            background: linear-gradient(145deg,var(--card2),var(--card));
            border: 1px solid rgba(212,168,67,.2);
            border-radius: 24px;
            padding: 36px;
            width: 500px;
            max-width: 96vw;
            transform: scale(.93);
            transition: .25s;
            max-height: 90vh;
            overflow-y: auto
        }

        .modal-bg.open .modal {
            transform: scale(1)
        }

        .mt {
            font-size: 17px;
            font-weight: 800;
            color: var(--g1);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .ma {
            display: flex;
            gap: 10px;
            margin-top: 20px
        }

        .lbox {
            background: rgba(212,168,67,.05);
            border: 1px solid rgba(212,168,67,.15);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px
        }

        .ll {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 7px;
            font-weight: 700;
            letter-spacing: .5px
        }

        .lv {
            font-size: 12px;
            color: var(--g1);
            font-family: monospace;
            direction: ltr;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            word-break: break-all
        }

        .cpb {
            background: rgba(212,168,67,.15);
            border: 1px solid rgba(212,168,67,.2);
            color: var(--g1);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            transition: .2s;
            font-family: 'Cairo',sans-serif
        }

            .cpb:hover {
                background: rgba(212,168,67,.3)
            }

        .qrbox {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            display: inline-block;
            margin-top: 10px
        }

        .qrwrap {
            text-align: center
        }

        .toast-wrap {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none
        }

        .toast {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 22px;
            font-size: 14px;
            font-family: 'Cairo',sans-serif;
            color: var(--text);
            opacity: 0;
            transform: translateY(-16px);
            transition: .35s;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,.4)
        }

            .toast.show {
                opacity: 1;
                transform: translateY(0)
            }

            .toast.ok {
                border-color: rgba(40,192,112,.35);
                color: var(--green)
            }

            .toast.err {
                border-color: rgba(232,64,80,.35);
                color: var(--red)
            }

            .toast.info {
                border-color: rgba(212,168,67,.35);
                color: var(--g1)
            }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted)
        }

            .empty i {
                font-size: 48px;
                margin-bottom: 14px;
                opacity: .3;
                display: block
            }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }

        @media(max-width:900px) {
            .stats {
                grid-template-columns: 1fr 1fr
            }

            .form-grid {
                grid-template-columns: 1fr 1fr
            }
        }

        @media(max-width:600px) {
            .stats {
                grid-template-columns: 1fr 1fr
            }

            .hdr-clock {
                display: none
            }

            .form-grid {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="lp-bg"></div>
        <div class="login-card">
            <div class="login-logo">ARGON SYSTEM v2</div>
            <div class="login-title">المركز الرئيسي</div>
            <div class="login-div"></div>
            <input class="li" type="text" id="lu" placeholder="اسم المستخدم" autocomplete="off">
            <input class="li" type="password" id="lp" placeholder="كلمة المرور" onkeyup="if(event.key==='Enter')doLogin()">
            <button class="login-btn" onclick="doLogin()">دخول النظام ←</button>
            <div class="login-err" id="lerr">❌ بيانات الدخول غير صحيحة</div>
        </div>
    </div>

    <div id="mainApp">
        <header class="hdr">
            <div class="hdr-logo">
                <div class="hdr-icon">A</div>
                <div><div class="hdr-name">ARGON OS</div><div class="hdr-sub">Restaurant Network</div></div>
            </div>
            <div class="hdr-right">
                <div class="hdr-clock" id="clock">00:00:00</div>
                <div class="hdr-badge">⚡ Super Admin</div>
                <button class="btn-x btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </header>

        <div class="body">
            <div class="stats">
                <div class="sc sg"><div class="sc-icon"><i class="fas fa-store"></i></div><div class="sc-num" id="s-tot">0</div><div class="sc-lbl">إجمالي المطاعم</div></div>
                <div class="sc sgr"><div class="sc-icon"><i class="fas fa-check-circle"></i></div><div class="sc-num" id="s-on">0</div><div class="sc-lbl">نشطة الآن</div></div>
                <div class="sc sr"><div class="sc-icon"><i class="fas fa-pause-circle"></i></div><div class="sc-num" id="s-off">0</div><div class="sc-lbl">موقوفة</div></div>
                <div class="sc sb"><div class="sc-icon"><i class="fas fa-calendar-day"></i></div><div class="sc-num" id="s-today">0</div><div class="sc-lbl">مضافة اليوم</div></div>
            </div>

            <div class="panel">
                <div class="ph">
                    <div class="pt"><i class="fas fa-plus-circle"></i> إضافة مطعم جديد</div>
                    <button class="btn btn-sm btn-outline" onclick="toggleAdd()"><i class="fas fa-chevron-down" id="addChev"></i></button>
                </div>
                <div id="addWrap" style="display:none">
                    <div class="form-grid">
                        <div class="fg"><label><i class="fas fa-hashtag"></i> المعرف (ID)</label><input class="fi" id="nId" placeholder="alsham" dir="ltr"></div>
                        <div class="fg"><label><i class="fas fa-store"></i> اسم المطعم *</label><input class="fi" id="nName" placeholder="مطعم الشام"></div>
                        <div class="fg"><label><i class="fas fa-lock"></i> كلمة المرور *</label><input class="fi" id="nPass" type="password" placeholder="••••••••"></div>
                        <div class="fg"><label><i class="fas fa-phone"></i> الواتساب</label><input class="fi" id="nPhone" placeholder="+96279xxxxxxx" dir="ltr"></div>
                        <div class="fg"><label><i class="fas fa-map-marker-alt"></i> العنوان</label><input class="fi" id="nAddr" placeholder="عمان — الأردن"></div>
                        <div class="fg">
                            <label><i class="fas fa-palette"></i> اللون</label>
                            <select class="fi" id="nColor">
                                <option value="#d4a843">ذهبي</option>
                                <option value="#e84040">أحمر</option>
                                <option value="#4080e8">أزرق</option>
                                <option value="#28c070">أخضر</option>
                                <option value="#a040e0">بنفسجي</option>
                                <option value="#e88040">برتقالي</option>
                            </select>
                        </div>
                    </div>
                    <div class="factions">
                        <button class="btn btn-gold" onclick="addRes()"><i class="fas fa-plus"></i> إضافة وتفعيل</button>
                        <button class="btn btn-outline" onclick="clearAdd()"><i class="fas fa-times"></i> مسح</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="ph">
                    <div class="pt"><i class="fas fa-network-wired"></i> شبكة المطاعم</div>
                    <button class="ab" onclick="loadData()"><i class="fas fa-sync-alt"></i> تحديث</button>
                </div>
                <div class="filter-row">
                    <input class="srch" id="srch" placeholder="🔍 بحث بالاسم أو المعرف..." oninput="filterList()">
                    <button class="fb on" id="f-all" onclick="setF('all',this)">الكل</button>
                    <button class="fb" id="f-on" onclick="setF('active',this)">نشط</button>
                    <button class="fb" id="f-off" onclick="setF('closed',this)">موقوف</button>
                </div>
                <div class="tbl-wrap">
                    <table>
                        <thead><tr><th>المطعم</th><th>الهاتف</th><th>العنوان</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
                        <tbody id="resTbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- LINKS MODAL -->
    <div class="modal-bg" id="lModal">
        <div class="modal">
            <div class="mt"><i class="fas fa-link"></i> روابط وQR Code</div>
            <div id="lContent"></div>
            <div class="ma"><button class="btn btn-gold btn-sm" onclick="cm('lModal')">إغلاق</button></div>
        </div>
    </div>

    <!-- PASS MODAL -->
    <div class="modal-bg" id="pModal">
        <div class="modal">
            <div class="mt"><i class="fas fa-key"></i> تغيير كلمة المرور</div>
            <input type="hidden" id="pResId">
            <div class="fg" style="margin-bottom:16px"><label>كلمة المرور الجديدة</label><input class="fi" type="password" id="pVal" placeholder="••••••••"></div>
            <div class="ma">
                <button class="btn btn-gold btn-sm" onclick="doPass()">تغيير</button>
                <button class="btn btn-outline btn-sm" onclick="cm('pModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="toast-wrap" id="tw"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const FC = { apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8", authDomain: "argon-system.firebaseapp.com", databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app", projectId: "argon-system" };
        firebase.initializeApp(FC);
        const db = firebase.database();
        const ADMIN = { u: 'admin', p: 'admin2024' };
        let data = [], curF = 'all';

        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-JO', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) }, 1000);

        function doLogin() {
            const u = document.getElementById('lu').value.trim(), p = document.getElementById('lp').value;
            if (u === ADMIN.u && p === ADMIN.p) {
                document.getElementById('loginPage').style.cssText = 'opacity:0;transition:.4s';
                setTimeout(() => { document.getElementById('loginPage').style.display = 'none'; document.getElementById('mainApp').style.display = 'block'; loadData(); }, 420);
            } else {
                const e = document.getElementById('lerr'); e.style.display = 'block'; e.classList.add('shake');
                setTimeout(() => { e.style.display = 'none'; e.classList.remove('shake'); }, 3000);
            }
        }
        function logout() { document.getElementById('mainApp').style.display = 'none'; document.getElementById('loginPage').style.cssText = 'display:flex;opacity:1'; document.getElementById('lu').value = ''; document.getElementById('lp').value = ''; }

        function loadData() {
            db.ref('restaurants').on('value', snap => {
                data = []; snap.forEach(c => data.push({ id: c.key, ...c.val() }));
                const today = new Date().toDateString();
                document.getElementById('s-tot').textContent = data.length;
                document.getElementById('s-on').textContent = data.filter(r => (r.settings?.status || 'active') !== 'closed').length;
                document.getElementById('s-off').textContent = data.filter(r => r.settings?.status === 'closed').length;
                document.getElementById('s-today').textContent = data.filter(r => r.settings?.createdAt && new Date(r.settings.createdAt).toDateString() === today).length;
                filterList();
            });
        }

        function renderList(d) {
            const tbody = document.getElementById('resTbody');
            if (!d.length) { tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><i class="fas fa-store"></i>لا توجد مطاعم</div></td></tr>`; return; }
            tbody.innerHTML = d.map(r => {
                const s = r.settings || {}; const off = s.status === 'closed'; const c = s.color || '#d4a843';
                return `<tr>
          <td><div class="rav"><div class="ra" style="background:linear-gradient(135deg,${c}88,${c})">${(s.name || '?').charAt(0)}</div><div><div class="rname">${s.name || '—'}</div><div class="rid">${r.id}</div></div></div></td>
          <td style="direction:ltr;font-size:13px;color:var(--muted)">${s.phone || '—'}</td>
          <td style="font-size:12px;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.address || '—'}</td>
          <td><span class="badge ${off ? 'boff' : 'bon'}">${off ? 'موقوف' : 'نشط'}</span></td>
          <td><div class="acts">
            <button class="ab ag" onclick="showLinks('${r.id}','${encodeURIComponent(s.name || '')}')"><i class="fas fa-link"></i> روابط</button>
            <button class="ab" onclick="window.open('dashboard.html?id=${r.id}','_blank')"><i class="fas fa-tachometer-alt"></i> لوحة</button>
            <button class="ab ${off ? 'agr' : 'ar'}" onclick="toggleStatus('${r.id}','${s.status || 'active'}')"><i class="fas fa-${off ? 'play' : 'pause'}"></i>${off ? 'تفعيل' : 'إيقاف'}</button>
            <button class="ab" onclick="opPass('${r.id}')"><i class="fas fa-key"></i></button>
            <button class="ab ar" onclick="delRes('${r.id}','${s.name || ''}')"><i class="fas fa-trash"></i></button>
          </div></td>
        </tr>`;
            }).join('');
        }

        function setF(f, el) { curF = f; document.querySelectorAll('.fb').forEach(b => b.classList.remove('on')); el.classList.add('on'); filterList(); }
        function filterList() {
            const q = document.getElementById('srch').value.toLowerCase();
            let f = data;
            if (curF === 'active') f = f.filter(r => (r.settings?.status || 'active') !== 'closed');
            if (curF === 'closed') f = f.filter(r => r.settings?.status === 'closed');
            if (q) f = f.filter(r => (r.settings?.name || '').toLowerCase().includes(q) || r.id.toLowerCase().includes(q));
            renderList(f);
        }

        function toggleAdd() { const w = document.getElementById('addWrap'), open = w.style.display !== 'none'; w.style.display = open ? 'none' : 'block'; document.getElementById('addChev').className = `fas fa-chevron-${open ? 'down' : 'up'}`; }
        function clearAdd() { ['nId', 'nName', 'nPass', 'nPhone', 'nAddr'].forEach(id => document.getElementById(id).value = ''); }
        function addRes() {
            const id = document.getElementById('nId').value.trim(), name = document.getElementById('nName').value.trim(), pass = document.getElementById('nPass').value;
            if (!id || !name || !pass) { toast('يرجى تعبئة المعرف والاسم وكلمة المرور', 'err'); return; }
            db.ref(`restaurants/${id}`).once('value', snap => {
                if (snap.exists()) { toast('المعرف موجود مسبقاً — اختر آخر', 'err'); return; }
                const phone = document.getElementById('nPhone').value.trim(), addr = document.getElementById('nAddr').value.trim(), color = document.getElementById('nColor').value;
                db.ref(`restaurants/${id}/settings`).set({ name, password: pass, phone, address: addr, color, status: 'active', createdAt: new Date().toISOString() }).then(() => {
                    toast(`✅ "${name}" تمت الإضافة بنجاح`, 'ok'); clearAdd(); toggleAdd(); showLinks(id, name);
                });
            });
        }

        function toggleStatus(id, cur) {
            const n = (cur === 'closed') ? 'active' : 'closed';
            db.ref(`restaurants/${id}/settings`).update({ status: n });
            toast(n === 'closed' ? '⏸ تم إيقاف المطعم' : '▶ تم تفعيل المطعم', n === 'closed' ? 'err' : 'ok');
        }
        function delRes(id, name) {
            if (!confirm(`⚠️ حذف "${name}" نهائياً؟\nكل البيانات والطلبات ستُحذف.`)) return;
            db.ref(`restaurants/${id}`).remove(); toast('تم الحذف', 'err');
        }
        function opPass(id) { document.getElementById('pResId').value = id; document.getElementById('pVal').value = ''; document.getElementById('pModal').classList.add('open'); }
        function doPass() {
            const id = document.getElementById('pResId').value, p = document.getElementById('pVal').value;
            if (!p) { toast('أدخل كلمة المرور', 'err'); return; }
            db.ref(`restaurants/${id}/settings`).update({ password: p }); toast('✅ تم تغيير كلمة المرور', 'ok'); cm('pModal');
        }

        function showLinks(id, name) {
            const nm = decodeURIComponent(name);
            const base = window.location.href.replace(/[^\/]*$/, '');
            const dash = `${base}dashboard.html?id=${id}`, menu = `${base}index.html?id=${id}`;
            const qid = 'qr' + Date.now();
            document.getElementById('lContent').innerHTML = `
        <div style="font-size:15px;font-weight:700;color:var(--g2);margin-bottom:16px">🍽 ${nm}</div>
        <div class="lbox"><div class="ll"><i class="fas fa-tachometer-alt"></i> لوحة تحكم المطعم</div>
          <div class="lv"><span>${dash}</span><button class="cpb" onclick="cp('${dash}')">نسخ</button></div></div>
        <div class="lbox"><div class="ll"><i class="fas fa-qrcode"></i> منيو الزبائن — QR Code</div>
          <div class="lv"><span>${menu}</span><button class="cpb" onclick="cp('${menu}')">نسخ</button></div>
          <div class="qrwrap"><div class="qrbox" id="${qid}"></div>
            <div style="margin-top:10px;display:flex;gap:8px;justify-content:center">
              <button class="cpb" onclick="printQR('${qid}','${nm}','${menu}')"><i class="fas fa-print"></i> طباعة QR</button>
              <button class="cpb" onclick="cp('${menu}')"><i class="fas fa-copy"></i> نسخ الرابط</button>
            </div>
          </div>
        </div>`;
            document.getElementById('lModal').classList.add('open');
            setTimeout(() => { new QRCode(document.getElementById(qid), { text: menu, width: 180, height: 180, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.H }); }, 120);
        }

        function printQR(qid, name, url) {
            const cv = document.getElementById(qid)?.querySelector('canvas');
            if (!cv) { toast('QR لم يُحمَّل بعد', 'err'); return; }
            const w = window.open('', '_blank');
            w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QR - ${name}</title>
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
        <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
        .qr-print{text-align:center;padding:40px;border:2px solid #eee;border-radius:20px;max-width:320px}
        h2{font-size:22px;font-weight:900;margin-bottom:6px}p{color:#888;font-size:13px;margin-bottom:20px}
        img{width:200px;height:200px;border-radius:12px}small{display:block;margin-top:14px;color:#999;font-size:11px;word-break:break-all}</style>
        </head><body><div class="qr-print"><h2>${name}</h2><p>امسح الكود لعرض القائمة وتقديم طلبك</p>
        <img src="${cv.toDataURL()}"><small>${url}</small></div>
        <script>window.onload=()=>window.print()<\/script></body></html>`);
            w.document.close();
        }

        function cp(t) { navigator.clipboard.writeText(t).then(() => toast('✅ تم النسخ', 'ok')); }
        function cm(id) { document.getElementById(id).classList.remove('open'); }
        function toast(msg, type = 'info') {
            const w = document.getElementById('tw'), t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = msg; w.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3200);
        }
    </script>
</body>
</html>
