<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON OS — المركز الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --g1: #d4a843;
            --g2: #f5cc6a;
            --g3: #a07820;
            --bg: #06060f;
            --card: #0d0d1a;
            --card2: #131320;
            --card3: #0a0a16;
            --border: #1c1c2e;
            --border2: #252538;
            --text: #ede8f5;
            --muted: #5a5470;
            --muted2: #3a3450;
            --red: #e84050;
            --green: #28c070;
            --blue: #4888f0;
            --orange: #f08028;
            --shadow: 0 8px 32px rgba(0,0,0,.5);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            min-height: 100vh
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative
        }

            .header h1 {
                font-size: 42px;
                font-weight: 900;
                letter-spacing: 2px;
                background: linear-gradient(to bottom, var(--g2), var(--g1), var(--g3));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 10px
            }

        .grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 40px
        }

        .main-list {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow)
        }

        .form-group {
            margin-bottom: 20px
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px
        }

        input {
            width: 100%;
            background: var(--card2);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            transition: 0.3s
        }

            input:focus {
                outline: none;
                border-color: var(--g1);
                box-shadow: 0 0 0 4px rgba(212,168,67,0.1)
            }

        .btn-main {
            width: 100%;
            background: linear-gradient(45deg, var(--g3), var(--g1));
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: #000;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px
        }

        .res-card {
            background: var(--card2);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: 0.3s
        }

        .res-info {
            display: flex;
            align-items: center;
            gap: 15px
        }

        .res-logo {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: var(--card3);
            border: 1px solid var(--border);
            overflow: hidden
        }

            .res-logo img {
                width: 100%;
                height: 100%;
                object-fit: cover
            }

        .res-details h3 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 4px
        }

        .res-details p {
            color: var(--muted);
            font-size: 12px
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        .btn-sm {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s
        }

        .btn-copy {
            background: var(--card3);
            color: var(--g1);
            border-color: var(--border2)
        }

        .btn-dash {
            background: rgba(72,136,240,0.1);
            color: var(--blue);
            border-color: rgba(72,136,240,0.2)
        }

        .btn-del {
            background: rgba(232,64,80,0.1);
            color: var(--red);
            border-color: rgba(232,64,80,0.2);
            margin-right: auto
        }

        #tw {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999
        }

        .toast {
            background: var(--card2);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: var(--shadow);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s
        }

            .toast.show {
                opacity: 1;
                transform: translateY(0)
            }
    </style>
</head>
<body>
    <div id="tw"></div>
    <div class="container">
        <header class="header">
            <h1>ARGON SYSTEM</h1>
            <p>لوحة التحكم المركزية بالسوبر أدمن</p>
        </header>
        <div class="grid">
            <div class="card">
                <div class="form-group"><label>رقم المطعم (ID)</label><input type="text" id="resId" placeholder="مثال: 101"></div>
                <div class="form-group"><label>اسم المطعم</label><input type="text" id="resName" placeholder="أدخل اسم المطعم"></div>
                <div class="form-group"><label>رابط الشعار</label><input type="text" id="resLogo" placeholder="https://..."></div>
                <button class="btn-main" onclick="addRes()">حفظ وتثبيت المطعم <i class="fas fa-check-circle"></i></button>
            </div>
            <div class="main-list">
                <h2 style="margin-bottom:25px;font-size:22px">المطاعم النشطة</h2>
                <div id="list"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://argonforfun-source-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const host = window.location.origin;

        function addRes() {
            const id = document.getElementById('resId').value.trim();
            const name = document.getElementById('resName').value.trim();
            const logo = document.getElementById('resLogo').value.trim() || 'https://via.placeholder.com/100';
            if (!id || !name) { toast('❌ يرجى تعبئة كافة الحقول', 'err'); return; }

            // الإصلاح: الحفظ في مسار مستقل لكل ID لضمان عدم المسح
            db.ref('restaurants/' + id + '/settings').set({
                id: id, name: name, logo: logo, status: 'open', joinDate: new Date().toLocaleDateString()
            }).then(() => {
                toast('✅ تم تثبيت المطعم بنجاح', 'ok');
                document.getElementById('resId').value = ''; document.getElementById('resName').value = ''; document.getElementById('resLogo').value = '';
            });
        }

        // الإصلاح: عرض المطاعم من جميع الـ IDs الموجودة في Firebase
        db.ref('restaurants').on('value', (snap) => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            const data = snap.val();
            if (!data) {
                list.innerHTML = '<p style="text-align:center;color:var(--muted)">لا توجد مطاعم نشطة حالياً</p>';
                return;
            }

            Object.keys(data).forEach(id => {
                const res = data[id].settings;
                if (!res) return;
                const mUrl = host + '/index.html?id=' + id;
                const dUrl = host + '/dashboard.html?id=' + id;

                list.innerHTML += `
                        <div class="res-card">
                            <div class="res-info">
                                <div class="res-logo"><img src="${res.logo}"></div>
                                <div class="res-details"><h3>${res.name}</h3><p>ID: ${id}</p></div>
                            </div>
                            <div class="actions">
                                <button class="btn-sm btn-copy" onclick="cp('${mUrl}')"><i class="fas fa-link"></i> منيو</button>
                                <button class="btn-sm btn-dash" onclick="window.open('${dUrl}')"><i class="fas fa-external-link-alt"></i> لوحة</button>
                                <button class="btn-sm btn-copy" onclick="printQR('${res.name}','${mUrl}')"><i class="fas fa-qrcode"></i> QR</button>
                                <button class="btn-sm btn-del" onclick="delRes('${id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
            });
        });

        function delRes(id) { if (confirm('هل أنت متأكد من حذف المطعم نهائياً؟')) db.ref('restaurants/' + id).remove(); }
        function cp(t) { navigator.clipboard.writeText(t).then(() => toast('✅ تم النسخ', 'ok')); }
        function toast(m, type) {
            const tw = document.getElementById('tw');
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = m;
            tw.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        function printQR(name, url) {
            const v = document.createElement('div');
            new QRCode(v, { text: url, width: 256, height: 256 });
            setTimeout(() => {
                const cv = v.querySelector('canvas');
                const w = window.open('', '_blank');
                w.document.write(`<html><head><title>Print QR</title><style>body{text-align:center;padding:50px;font-family:Cairo}img{width:250px}</style></head><body><h1>\${name}</h1><img src="\${cv.toDataURL()}"><p>\${url}</p><script>window.onload=()=>window.print()<\/script></body></html>`);
                w.document.close();
            }, 500);
        }
    </script>
</body>
</html>
