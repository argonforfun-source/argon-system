<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGON OS — المركز الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --g1: #d4a843;
            --g2: #f5cc6a;
            --g3: #a07820;
            --bg: #06060f;
            --card: #0d0d1a;
            --card2: #131320;
            --card3: #0a0a16;
            --border: #1c1c2e;
            --text: #ede8f5;
            --muted: #5a5470;
            --red: #e84050;
            --green: #28c070;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex
        }

        /* Login Page */
        #loginPage {
            position: fixed;
            inset: 0;
            background: #02020a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: 0.5s
        }

        .l-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 360px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5)
        }

        .l-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--g1), var(--g3));
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #000
        }

        .l-input {
            width: 100%;
            background: var(--card2);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
            font-family: inherit
        }

        .l-btn {
            width: 100%;
            background: linear-gradient(to right, var(--g1), var(--g2));
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            color: #000
        }

        /* Sidebar */
        .side {
            width: 280px;
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 25px
        }

        .s-logo {
            font-weight: 900;
            font-size: 22px;
            color: var(--g1);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .s-nav {
            flex: 1
        }

        .si {
            padding: 14px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.3s;
            color: var(--muted)
        }

            .si.on {
                background: var(--card2);
                color: var(--g1);
                box-shadow: 0 4px 15px rgba(0,0,0,0.2)
            }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden
        }

        .top {
            height: 80px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(6,6,15,0.8);
            backdrop-filter: blur(10px)
        }

        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto
        }

        /* Sections */
        .sec {
            display: none
        }

            .sec.on {
                display: block
            }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px
        }

        .res-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s
        }

            .res-card:hover {
                border-color: var(--g1);
                transform: translateY(-5px)
            }

        .rc-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px
        }

        .rc-img {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: var(--card2);
            object-fit: cover
        }

        .rc-name {
            font-weight: 700;
            font-size: 17px
        }

        .rc-id {
            font-size: 12px;
            color: var(--muted)
        }

        .rc-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        .ac-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600
        }

            .ac-btn.secondary {
                border-color: var(--g1);
                color: var(--g1)
            }

        /* Form */
        .f-group {
            margin-bottom: 20px
        }

        .f-label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 14px
        }

        .f-input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            color: #fff;
            outline: none
        }

            .f-input:focus {
                border-color: var(--g1)
            }

        /* Toast */
        #tw {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .toast {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateX(120%);
            transition: 0.4s
        }

            .toast.show {
                transform: translateX(0)
            }

            .toast.ok {
                border-right: 4px solid var(--green)
            }

            .toast.err {
                border-right: 4px solid var(--red)
            }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="l-card">
            <div class="l-logo"><i class="fas fa-shield-alt"></i></div>
            <h2 style="margin-bottom: 10px">ARGON OS</h2>
            <p style="color: var(--muted); margin-bottom: 30px; font-size: 14px">الإدارة العليا للنظام</p>
            <input type="text" id="u" class="l-input" placeholder="اسم المستخدم" autocomplete="off">
            <input type="password" id="p" class="l-input" placeholder="كلمة المرور">
            <button class="l-btn" onclick="doLogin()">تسجيل الدخول</button>
        </div>
    </div>

    <div class="side">
        <div class="s-logo"><i class="fas fa-layer-group"></i> ARGON CENTRAL</div>
        <div class="s-nav">
            <div class="si on" onclick="pg('all', this)"><i class="fas fa-store"></i> المطاعم النشطة</div>
            <div class="si" onclick="pg('add', this)"><i class="fas fa-plus-circle"></i> إضافة مطعم جديد</div>
        </div>
    </div>

    <div class="main">
        <div class="top">
            <h2 id="secTitle">المطاعم النشطة</h2>
            <div style="display: flex; gap: 15px">
                <input type="text" id="search" oninput="searchRes()" placeholder="بحث عن مطعم..." style="background: var(--card2); border: 1px solid var(--border); padding: 8px 15px; border-radius: 10px; color: #fff; outline: none">
            </div>
        </div>

        <div class="content">
            <div id="sec-all" class="sec on">
                <div class="grid" id="resGrid">
                    <div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--muted)">جاري تحميل البيانات...</div>
                </div>
            </div>

            <div id="sec-add" class="sec">
                <div style="max-width: 600px; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border)">
                    <h3 style="margin-bottom: 25px">إضافة مطعم جديد للنظام</h3>
                    <div class="f-group">
                        <label class="f-label">رقم تعريف المطعم (ID - بالإنجليزية فقط)</label>
                        <input type="text" id="nId" class="f-input" placeholder="مثلاً: burger-king-01">
                    </div>
                    <div class="f-group">
                        <label class="f-label">اسم المطعم</label>
                        <input type="text" id="nName" class="f-input" placeholder="مثلاً: برجر كينج">
                    </div>
                    <button class="l-btn" onclick="addRes()" style="margin-top: 10px">تفعيل المطعم فوراً</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tw"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ══ CONFIGURATION ══
        const firebaseConfig = {
            apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8",
            authDomain: "argon-system.firebaseapp.com",
            databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "argon-system",
            storageBucket: "argon-system.firebasestorage.app",
            messagingSenderId: "858120444233",
            appId: "1:858120444233:web:4bda38dfa451b9eb26e298"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ══ LOGIN LOGIC ══
        function doLogin() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;

            // البيانات حسب طلبك
            if (u === 'admin' && p === '123') {
                document.getElementById('loginPage').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginPage').style.display = 'none';
                    initApp();
                }, 500);
            } else {
                toast('⚠️ بيانات الدخول غير صحيحة', 'err');
            }
        }

        // ══ CORE FUNCTIONS ══
        function initApp() {
            db.ref('restaurants').on('value', snap => {
                const grid = document.getElementById('resGrid');
                grid.innerHTML = '';
                const data = snap.val();
                if (!data) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--muted)">لا يوجد مطاعم حالياً</div>';
                    return;
                }

                Object.entries(data).forEach(([id, val]) => {
                    const s = val.settings || {};
                    // توليد رابط المنيو تلقائياً
                    const baseUrl = window.location.href.split('superadmin.html')[0];
                    const mUrl = baseUrl + 'index.html?id=' + id;

                    const div = document.createElement('div');
                    div.className = 'res-card';
                    div.innerHTML = `
                            <div class="rc-top">
                                <img src="${s.logo || 'https://via.placeholder.com/60'}" class="rc-img">
                                <div class="rc-info">
                                    <div class="rc-name">${s.name || 'مطعم غير مسمى'}</div>
                                    <div class="rc-id">ID: ${id}</div>
                                </div>
                            </div>
                            <div class="rc-actions">
                                <button class="ac-btn" onclick="window.open('dashboard.html?id=${id}')">اللوحة</button>
                                <button class="ac-btn secondary" onclick="cp('${mUrl}')">المنيو</button>
                            </div>
                        `;
                    grid.appendChild(div);
                });
            });
        }

        function addRes() {
            const id = document.getElementById('nId').value.trim();
            const name = document.getElementById('nName').value.trim();
            if (!id || !name) return toast('يرجى تعبئة كافة الحقول', 'err');

            db.ref(`restaurants/${id}/settings`).set({
                id, name, status: 'open',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                toast('✅ تم تفعيل المطعم بنجاح', 'ok');
                document.getElementById('nId').value = '';
                document.getElementById('nName').value = '';
                pg('all', document.querySelector('.si'));
            });
        }

        // ══ HELPERS ══
        function pg(name, el) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
            document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
            document.getElementById('sec-' + name).classList.add('on');
            el.classList.add('on');
            document.getElementById('secTitle').textContent = el.textContent;
        }

        function cp(t) {
            navigator.clipboard.writeText(t).then(() => toast('✅ تم نسخ رابط المنيو', 'ok'));
        }

        function toast(msg, type = 'info') {
            const w = document.getElementById('tw');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            w.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 400);
            }, 3000);
        }

        // Enter Key for Login
        document.getElementById('p').addEventListener('keypress', e => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
