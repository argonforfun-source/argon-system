<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أرغون OS | نظام الإدارة العليا</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
        }

        #superLoginPage {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-align: center;
        }

        #superWrapper {
            display: none;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: #0f172a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

            .nav-link.active {
                background: rgba(59, 130, 246, 0.1);
                color: var(--primary);
            }

        .restaurant-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-right: 5px solid var(--primary);
        }

        .form-control {
            background: #0f172a !important;
            border: 1px solid #334155 !important;
            color: #fff !important;
            border-radius: 10px;
        }

        .section {
            display: none;
        }

            .section.active {
                display: block;
            }
    </style>
</head>
<body>

    <div id="superLoginPage">
        <div class="login-box">
            <h2 class="fw-black text-primary mb-4">ARGON OS</h2>
            <input type="text" id="adminUser" class="form-control mb-3" placeholder="اسم المستخدم (admin)">
            <input type="password" id="adminPass" class="form-control mb-4" placeholder="كلمة المرور (123456)">
            <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill" onclick="accessSuperAdmin()">دخول النظام</button>
        </div>
    </div>

    <div id="superWrapper">
        <div class="sidebar">
            <h3 class="text-primary fw-black text-center mb-5">ARGON</h3>
            <div class="nav-link active" onclick="showSection('active-sec', this)">المطاعم النشطة</div>
            <div class="nav-link" onclick="showSection('add-sec', this)">إضافة مطعم</div>
            <div class="nav-link text-danger mt-auto" onclick="location.reload()">تسجيل خروج</div>
        </div>
        <div class="main-content">
            <div id="active-sec" class="section active">
                <h3 class="mb-4">إدارة المطاعم</h3>
                <div id="activeList"></div>
            </div>
            <div id="add-sec" class="section">
                <h3 class="mb-4">إضافة مطعم جديد</h3>
                <div style="max-width: 400px">
                    <input type="text" id="newId" class="form-control mb-2" placeholder="ID المطعم">
                    <input type="text" id="newName" class="form-control mb-2" placeholder="اسم المطعم">
                    <input type="text" id="newPass" class="form-control mb-3" value="123456">
                    <button class="btn btn-primary w-100" onclick="createNewRestaurant()">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8lbF8ipYTA8E0NtthMRHj9apPLseBNB8",
            authDomain: "argon-system.firebaseapp.com",
            projectId: "argon-system",
            storageBucket: "argon-system.firebasestorage.app",
            messagingSenderId: "858120444233",
            appId: "1:858120444233:web:4bda38dfa451b9eb26e298",
            databaseURL: "https://argon-system-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function accessSuperAdmin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;

            // جرب الدخول بـ admin و 123456
            if (u === "admin" && p === "123456") {
                document.getElementById('superLoginPage').style.display = "none";
                document.getElementById('superWrapper').style.display = "flex";
                loadData();
            } else {
                alert("البيانات غير صحيحة. استخدم admin و 123456");
            }
        }

        function loadData() {
            db.ref('restaurants').on('value', (snap) => {
                const list = document.getElementById('activeList');
                list.innerHTML = "";
                snap.forEach((child) => {
                    const id = child.key;
                    const val = child.val().settings || {};
                    list.innerHTML += `
                            <div class="restaurant-card">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div><b>${val.name || 'بدون اسم'}</b> <br> <small>ID: ${id}</small></div>
                                    <div>
                                        <button class="btn btn-sm btn-info text-white" onclick="window.open('dashboard.html?id=${id}', '_blank')">اللوحة</button>
                                        <button class="btn btn-sm btn-danger" onclick="db.ref('restaurants/${id}').remove()">حذف</button>
                                    </div>
                                </div>
                            </div>`;
                });
            });
        }

        function createNewRestaurant() {
            const id = document.getElementById('newId').value;
            const name = document.getElementById('newName').value;
            const password = document.getElementById('newPass').value;
            if (id && name) {
                db.ref('restaurants/' + id + '/settings').set({ name, password, status: "active" })
                    .then(() => { alert("تمت الإضافة"); showSection('active-sec', document.querySelector('.nav-link')); });
            }
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
