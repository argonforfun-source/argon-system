<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أرغون — بدون إنترنت</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#1e3a8a,#3b82f6);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;color:#fff}
    .box{max-width:360px}
    .icon{font-size:80px;margin-bottom:20px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    h1{font-size:1.6rem;font-weight:900;margin-bottom:10px}
    p{opacity:0.8;margin-bottom:28px;line-height:1.7;font-size:0.95rem}
    .btn{background:#fff;color:#1e3a8a;border:none;padding:14px 32px;border-radius:14px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .2s;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
    .btn:hover{transform:translateY(-2px)}
    .tips{margin-top:28px;padding:16px;background:rgba(255,255,255,0.1);border-radius:14px;font-size:0.82rem;text-align:right}
    .tips li{list-style:none;margin-bottom:6px;opacity:0.85}
    .tips li::before{content:'✓ ';font-weight:800}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تأكد من اتصالك بالشبكة للوصول إلى قائمة الطعام وإرسال طلبك</p>
    <button class="btn" onclick="window.location.reload()">🔄 إعادة المحاولة</button>
    <div class="tips">
      <li>تحقق من الواي فاي</li>
      <li>تحقق من بيانات الهاتف</li>
      <li>انتظر لحظة ثم حاول مجدداً</li>
    </div>
  </div>
</body>
</html>
